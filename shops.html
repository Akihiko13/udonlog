<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お店を選ぶ — うどんログ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #BA7517;
      --amber-dark: #8A5510;
      --amber-light: #FFF8EE;
      --amber-mid: #FAEEDA;
      --text: #111;
      --text-sub: #666;
      --text-muted: #999;
      --border: #E8E8E2;
      --bg: #FAFAF7;
      --white: #fff;
    }

    body {
      font-family: 'Noto Sans JP', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250,250,247,0.94);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1.5rem;
      height: 54px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--text-sub);
      text-decoration: none;
    }

    .nav-back:hover { color: var(--text); }

    .nav-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .nav-count {
      margin-left: auto;
      font-size: 13px;
      color: var(--amber);
    }

    .nav-count::after {
      content: ' ›';
      font-size: 16px;
      font-weight: 700;
    }

    /* SEARCH BAR */
    .search-bar {
      background: var(--white);
      border-bottom: 0.5px solid var(--border);
      padding: 1rem 1.5rem;
    }

    .search-wrap {
      position: relative;
      max-width: 600px;
      margin: 0 auto;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 18px;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 11px 14px 11px 42px;
      border: 0.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
    }

    .search-input:focus {
      border-color: var(--amber);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(186,117,23,0.1);
    }

    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 17px;
      padding: 0;
      display: none;
    }

    /* FILTERS */
    .filters {
      background: var(--white);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      flex-shrink: 0;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-sub);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }

    .filter-btn.active {
      color: var(--amber);
      border-bottom-color: var(--amber);
    }

    .filter-btn:hover:not(.active) { color: var(--text); }

    /* TYPE PILLS */
    .type-filters {
      padding: 12px 1.5rem;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg);
    }

    .type-filters::-webkit-scrollbar { display: none; }

    .type-pill {
      flex-shrink: 0;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      border: 0.5px solid var(--border);
      border-radius: 99px;
      cursor: pointer;
      background: var(--white);
      color: var(--text-sub);
      font-family: inherit;
      transition: all 0.15s;
    }

    .type-pill.active {
      background: var(--amber);
      border-color: var(--amber);
      color: var(--white);
    }

    /* GRID */
    .grid-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem 4rem;
    }

    .result-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .shops-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }

    /* SHOP CARD */
    .shop-card {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }

    .shop-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.07);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .shop-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .type-badge {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .type-badge.self { background: #EEF5FC; color: #185FA5; }
    .type-badge.general { background: #EAF3DE; color: #3B6D11; }
    .type-badge.seimen { background: var(--amber-mid); color: #633806; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .card-meta i { font-size: 13px; }

    .btn-detail {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 100%;
      background: transparent;
      color: var(--amber);
      border: 1px solid var(--amber);
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      margin-top: 12px;
      margin-bottom: 6px;
    }

    .btn-detail:hover { background: #FFF8EE; }

    .btn-taberu {
      width: 100%;
      background: var(--amber);
      color: var(--white);
      border: none;
      padding: 9px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .btn-taberu:hover { background: var(--amber-dark); }

    .btn-taberu.done {
      background: #5BAD6F;
    }

    .btn-taberu.done:hover { background: #4A9A5E; }

    /* EMPTY STATE */
    .empty {
      display: none;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
    }

    .empty i { font-size: 40px; margin-bottom: 1rem; display: block; }
    .empty p { font-size: 15px; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #111;
      color: #fff;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 99px;
      pointer-events: none;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      white-space: nowrap;
      z-index: 999;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 600px) {
      .shops-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 400px) {
      .shops-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-back">
      <i class="ti ti-arrow-left" aria-hidden="true"></i>
      もどる
    </a>
    <span class="nav-title">お店を選ぶ</span>
    <a href="mypage.html" class="nav-count" id="nav-count" style="text-decoration:none;display:flex;align-items:center;gap:5px;"></a>
  </nav>

  <div class="search-bar">
    <div class="search-wrap">
      <i class="ti ti-search search-icon" aria-hidden="true"></i>
      <input type="text" class="search-input" id="search" placeholder="店名で検索..." autocomplete="off">
      <button class="search-clear" id="search-clear" aria-label="クリア">
        <i class="ti ti-x"></i>
      </button>
    </div>
  </div>

  <div class="filters" id="area-filters">
    <button class="filter-btn active" data-area="全て">全て</button>
    <button class="filter-btn" data-area="高松市">高松市</button>
    <button class="filter-btn" data-area="丸亀市">丸亀市</button>
    <button class="filter-btn" data-area="坂出市">坂出市</button>
    <button class="filter-btn" data-area="善通寺市">善通寺市</button>
    <button class="filter-btn" data-area="綾川町">綾川町</button>
    <button class="filter-btn" data-area="琴平町">琴平町</button>
    <button class="filter-btn" data-area="まんのう町">まんのう町</button>
    <button class="filter-btn" data-area="三豊市">三豊市</button>
    <button class="filter-btn" data-area="観音寺市">観音寺市</button>
    <button class="filter-btn" data-area="さぬき市">さぬき市</button>
    <button class="filter-btn" data-area="三木町">三木町</button>
    <button class="filter-btn" data-area="東かがわ市">東かがわ市</button>
    <button class="filter-btn" data-area="多度津町">多度津町</button>
  </div>

  <div class="type-filters" id="type-filters">
    <button class="type-pill active" data-type="全て">すべての種類</button>
    <button class="type-pill" data-type="セルフ">セルフ式</button>
    <button class="type-pill" data-type="一般">一般店</button>
    <button class="type-pill" data-type="製麺所">製麺所系</button>
  </div>

  <div class="grid-wrap">
    <div class="result-label" id="result-label"></div>
    <div class="shops-grid" id="shops-grid"></div>
    <div class="empty" id="empty">
      <i class="ti ti-mood-empty" aria-hidden="true"></i>
      <p>該当するお店が見つかりませんでした</p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="shops-data.js"></script>
  <script>

    let currentArea = '全て';
    let currentType = '全て';
    let searchQuery = '';
    // 訪問ログから「店ごとの杯数」と「記録済み店舗」を集計
    const logs = JSON.parse(localStorage.getItem('logs') || '[]');
    const visitCount = {};
    logs.forEach(l => { visitCount[l.shopId] = (visitCount[l.shopId] || 0) + 1; });
    // logsがあればそれを優先、無ければ旧visitedを使う
    const visited = new Set(
      logs.length > 0 ? logs.map(l => l.shopId) : JSON.parse(localStorage.getItem('visited') || '[]')
    );

    function saveVisited() {
      localStorage.setItem('visited', JSON.stringify([...visited]));
    }

    function typeBadge(type) {
      if (type === 'セルフ') return '<span class="type-badge self">セルフ</span>';
      if (type === '一般') return '<span class="type-badge general">一般店</span>';
      return '<span class="type-badge seimen">製麺所</span>';
    }

    function render() {
      const q = searchQuery.trim();
      const filtered = SHOPS.filter(s => {
        const matchArea = currentArea === '全て' || s.city === currentArea;
        const matchType = currentType === '全て' || s.type === currentType;
        const matchQ = !q || s.name.includes(q) || s.city.includes(q) || s.dish.includes(q);
        return matchArea && matchType && matchQ;
      });

      const grid = document.getElementById('shops-grid');
      const empty = document.getElementById('empty');
      const label = document.getElementById('result-label');
      const navCount = document.getElementById('nav-count');

      navCount.textContent = `${visited.size}店 / ${logs.length}杯`;
      label.textContent = `${filtered.length}件のお店`;

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      grid.innerHTML = filtered.map(s => {
        const done = visited.has(s.id);
        return `
          <div class="shop-card">
            <div class="card-top">
              <div class="shop-name">${s.name}</div>
              ${typeBadge(s.type)}
            </div>
            <div class="card-meta">
              <i class="ti ti-map-pin" aria-hidden="true"></i>
              ${s.city}
            </div>
            <a class="btn-detail" href="shop-detail.html?id=${s.id}"><i class="ti ti-info-circle" aria-hidden="true"></i> 詳細</a>
            <a class="btn-taberu ${done ? 'done' : ''}" href="record.html?id=${s.id}&name=${encodeURIComponent(s.name)}&city=${encodeURIComponent(s.city)}&type=${encodeURIComponent(s.type)}">
              ${done
                ? `<i class="ti ti-plus" aria-hidden="true"></i> もう一杯！（${visitCount[s.id] || 0}杯）`
                : '<i class="ti ti-plus" aria-hidden="true"></i> 食べた！'}
            </a>
          </div>
        `;
      }).join('');
    }

    function toggleVisit(id, btn) {
      const shop = SHOPS.find(s => s.id === id);
      // 記録済み → 削除してリンクに戻す
      visited.delete(id);
      const a = document.createElement('a');
      a.className = 'btn-taberu';
      a.href = `record.html?name=${encodeURIComponent(shop.name)}&city=${encodeURIComponent(shop.city)}&type=${encodeURIComponent(shop.type)}`;
      a.innerHTML = '<i class="ti ti-plus" aria-hidden="true"></i> 食べた！';
      btn.replaceWith(a);
      showToast(`「${shop.name}」の記録を削除しました`);
      saveVisited();
      document.getElementById('nav-count').textContent = `${visited.size}店舗 記録済み`;
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // area filter
    document.getElementById('area-filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentArea = btn.dataset.area;
      render();
    });

    // type filter
    document.getElementById('type-filters').addEventListener('click', e => {
      const pill = e.target.closest('.type-pill');
      if (!pill) return;
      document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentType = pill.dataset.type;
      render();
    });

    // search
    const searchInput = document.getElementById('search');
    const searchClear = document.getElementById('search-clear');

    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value;
      searchClear.style.display = searchQuery ? 'block' : 'none';
      render();
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchQuery = '';
      searchClear.style.display = 'none';
      searchInput.focus();
      render();
    });

    render();
  </script>

</body>
</html>
