<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お店を選ぶ — うどログ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tabler-icons.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #BA7517;
      --amber-dark: #8A5510;
       --amber-darker: #6F440C;
      --amber-light: #FFF8EE;
      --amber-mid: #FAEEDA;
      --text: #111;
      --text-sub: #666;
      --text-muted: #999;
      --border: #E8E8E2;
      --bg: #FAFAF7;
      --white: #fff;
    }

    body {
      font-family: 'Noto Sans JP', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 54px;
      z-index: 100;
      background: rgba(250,250,247,0.94);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1.5rem;
      height: 54px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--text-sub);
      text-decoration: none;
    }

    .nav-back:hover { color: var(--text); }

    .nav-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .nav-count {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
      text-decoration: none;
    }
    .nav-count-text {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 1.15;
    }
    .nav-count-label { font-size: 10px; color: var(--text-sub); font-weight: 600; }
    .nav-count-val { font-size: 13px; color: var(--amber); font-weight: 700; }

    /* SEARCH BAR */
    /* ランキングへの導線バナー */
    .rank-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 600px;
      margin: 12px auto 0;
      padding: 12px 16px;
      background: linear-gradient(135deg, #BA7517 0%, #D89030 100%);
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      box-shadow: 0 2px 8px rgba(186,117,23,0.25);
    }
    .rank-banner > span { flex: 1; }
    .rank-banner .ti { font-size: 20px; }
    .rank-banner .rank-banner-arrow { font-size: 18px; opacity: 0.85; }
    @media (max-width: 640px) { .rank-banner { margin: 12px 1rem 0; } }

    .search-bar {
      background: var(--white);
      border-bottom: 0.5px solid var(--border);
      padding: 1rem 1.5rem;
    }

    .search-wrap {
      position: relative;
      max-width: 600px;
      margin: 0 auto;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 18px;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 11px 14px 11px 42px;
      border: 0.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
    }

    .search-input:focus {
      border-color: var(--amber);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(186,117,23,0.1);
    }

    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 17px;
      padding: 0;
      display: none;
    }

    /* FILTERS */
    .filters {
      background: var(--white);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      flex-shrink: 0;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-sub);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }

    .filter-btn.active {
      color: var(--amber);
      border-bottom-color: var(--amber);
    }

    .filter-btn:hover:not(.active) { color: var(--text); }

    /* TYPE PILLS */
    .type-filters {
      padding: 12px 1.5rem;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg);
    }

    .type-filters::-webkit-scrollbar { display: none; }

    .type-pill {
      flex-shrink: 0;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      border: 0.5px solid var(--border);
      border-radius: 99px;
      cursor: pointer;
      background: var(--white);
      color: var(--text-sub);
      font-family: inherit;
      transition: all 0.15s;
    }

    .type-pill.active {
      background: var(--amber);
      border-color: var(--amber);
      color: var(--white);
    }

    /* CONDITION PILLS（こだわり条件・複数トグル可） */
    .cond-filters {
      padding: 0 1.5rem 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg);
    }
    .cond-filters::-webkit-scrollbar { display: none; }
    .cond-label {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
    }
    .cond-pill {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 13px;
      font-size: 12px;
      font-weight: 500;
      border: 0.5px solid var(--border);
      border-radius: 99px;
      cursor: pointer;
      background: var(--white);
      color: var(--text-sub);
      font-family: inherit;
      transition: all 0.15s;
    }
    .cond-pill i { font-size: 14px; }
    .cond-pill.active {
      background: var(--amber-light);
      border-color: var(--amber);
      color: var(--amber-dark);
      font-weight: 700;
    }

    /* 営業中フィルタの注意書き（目安である旨） */
    .cond-note {
      display: none;
      max-width: 900px;
      margin: 0 auto;
      padding: 8px 1.5rem 0;
      font-size: 11.5px;
      line-height: 1.5;
      color: var(--text-muted);
    }
    .cond-note.show { display: block; }
    .cond-note i { font-size: 13px; vertical-align: -2px; margin-right: 3px; }

    /* GRID */
    .grid-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem 4rem;
    }

    .result-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 1rem;
    }

    .result-label {
      font-size: 13px;
      color: var(--text-muted);
    }

    .sort-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 99px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sort-btn {
      background: #fff;
      border: none;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-sub);
      cursor: pointer;
      font-family: inherit;
    }

    .sort-btn.active {
      background: var(--amber);
      color: #fff;
      font-weight: 600;
    }

    .sort-btn i { font-size: 13px; vertical-align: -1px; margin-right: 2px; }

    /* 現在地からの距離チップ（近い順のとき表示） */
    .dist-chip {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      font-weight: 700;
      color: var(--amber-dark);
      background: var(--amber-light);
      border: 0.5px solid var(--amber-border, #F0D9C0);
      padding: 2px 8px;
      border-radius: 99px;
    }
    .dist-chip i { font-size: 12px; }

    .shops-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }

    /* SHOP CARD */
    .shop-card {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }

    .shop-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.07);
    }

    .shop-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .type-badge {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .type-badge.self { background: #EEF5FC; color: #185FA5; }
    .type-badge.general { background: #EAF3DE; color: #3B6D11; }
    .type-badge.seimen { background: var(--amber-mid); color: #633806; }

    /* 営業中/時間外バッジ（目安） */
    .open-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      line-height: 1;
    }
    .open-badge::before {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }
    .open-badge.open { background: #E6F4EA; color: #1E7B39; }
    .open-badge.closed { background: #F0F0EE; color: #8A8A82; }
    /* 営業中バッジをエリア行の右端側へ（種類バッジの左隣に並べる） */
    .card-meta .open-badge { margin-left: auto; }
    .card-meta .open-badge + .type-badge { margin-left: 0; }

    /* 記録済みバッジ（ログイン中・訪問した店） */
    .done-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      background: #DFF3E6;
      color: #1E7B39;
    }
    .done-badge .chk { font-weight: 900; }
    /* 記録済みカードは一目で分かるようにうっすら色分け */
    .shop-card.done { background: #F6FBF7; border-color: #CFE9D7; }

    /* スポットから近い順で探す */
    .spot-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 1.5rem;
      background: var(--white);
      border-bottom: 0.5px solid var(--border);
    }
    .spot-bar-label {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      font-weight: 700;
      color: var(--amber-dark);
    }
    .spot-bar-label i { font-size: 15px; }
    .spot-select {
      flex: 1;
      min-width: 0;
      max-width: 340px;
      padding: 9px 12px;
      border: 0.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .spot-select:focus { border-color: var(--amber); background: var(--white); }
    /* 選択中スポットのバナー */
    .spot-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 1.5rem;
      background: var(--amber-light);
      border-bottom: 0.5px solid var(--amber-border, #F0D9C0);
      font-size: 13px;
      color: var(--amber-darker);
    }
    .spot-banner i { font-size: 16px; color: var(--amber); flex-shrink: 0; }
    .spot-banner > span { flex: 1; min-width: 0; }
    .spot-banner strong { font-weight: 700; }
    .spot-reset {
      flex-shrink: 0;
      background: var(--white);
      border: 0.5px solid var(--amber-border, #F0D9C0);
      color: var(--amber-dark);
      font-size: 12px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 99px;
      cursor: pointer;
      font-family: inherit;
    }
    .spot-reset:hover { background: #fbf3e6; }
    @media (max-width: 600px) {
      .spot-bar { flex-wrap: wrap; row-gap: 8px; }
      .spot-select { max-width: none; width: 100%; }
    }

    .card-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      row-gap: 4px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .card-meta i { font-size: 13px; flex-shrink: 0; }
    /* 市名はチップで押されても縦に割れないよう1語扱い */
    .card-meta .card-city { white-space: nowrap; }
    /* 種類バッジはエリア行の右端に寄せる（店名は1行めに全幅で置く） */
    .card-meta .type-badge { margin-left: auto; }

    /* ボタン群はカード下端に固定（店名の行数が違ってもボタン位置を揃える） */
    .card-actions {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn-detail {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 100%;
      background: transparent;
      color: var(--amber-dark);
      border: 1px solid var(--amber);
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
    }

    .btn-detail:hover { background: #FFF8EE; }

    .btn-taberu {
      width: 100%;
      background: var(--amber-dark);
      color: var(--white);
      border: none;
      padding: 9px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      line-height: 1.35;
      transition: background 0.15s;
    }
    .taberu-text { text-align: center; }

    .btn-taberu:hover { background: var(--amber-darker); }

    .btn-taberu.done {
      background: #5BAD6F;
    }

    .btn-taberu.done:hover { background: #4A9A5E; }

    /* EMPTY STATE */
    .empty {
      display: none;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
    }

    .empty i { font-size: 40px; margin-bottom: 1rem; display: block; }
    .empty p { font-size: 15px; }

    /* 店追加リクエスト枠 */
    .shop-request {
      max-width: 520px;
      margin: 1.5rem auto 0;
      background: var(--amber-light, #FFF8EE);
      border: 0.5px solid var(--amber-border, #F0D9C0);
      border-radius: 14px;
      padding: 1.25rem 1.25rem 1.4rem;
      text-align: center;
    }
    .shop-request-title { font-size: 15px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
    .shop-request-desc { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 1rem; }
    .shop-request-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .shop-request-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border-radius: 99px;
      font-size: 13px; font-weight: 600; text-decoration: none;
    }
    .shop-request-btn i { font-size: 15px; }
    .shop-request-btn.x { background: #000; color: #fff; }
    .shop-request-btn.x:hover { opacity: 0.85; }
    .shop-request-btn.mail {
      background: #fff; color: #8A5510; border: 0.5px solid #F0D9C0;
    }
    .shop-request-btn.mail:hover { background: #fbf3e6; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #111;
      color: #fff;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 99px;
      pointer-events: none;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      white-space: nowrap;
      z-index: 999;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 600px) {
      /* スマホは2カラム（密度を上げる）。左右余白とカード余白を詰めて幅を稼ぐ */
      .shops-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .grid-wrap { padding-left: 1rem; padding-right: 1rem; }
      .shop-card { padding: 0.9rem 1rem; }
      /* 狭い2カラムではバッジが1行に収まらないので折り返し＆左詰めに */
      .card-meta { flex-wrap: wrap; row-gap: 5px; }
      .card-meta .open-badge, .card-meta .open-badge + .type-badge { margin-left: 0; }
      .open-badge { padding: 2px 7px; }
      /* 並び替えが3つになり幅が要るので、結果バーは折り返し可に */
      .result-bar { flex-wrap: wrap; row-gap: 8px; }
      .sort-toggle { margin-left: auto; }
      .sort-btn { padding: 6px 11px; }
      /* 記録済みボタンは狭いので「もう一杯！／（記録数：N杯）」の2行に。
         2行目は小さめにして、未記録の「食べた！」ボタンとの高さ差を抑える */
      .btn-taberu .taberu-count { display: block; font-size: 11px; font-weight: 600; }
    }

    /* ごく狭い端末（旧SE等）だけ1カラムに戻す */
    @media (max-width: 340px) {
      .shops-grid { grid-template-columns: 1fr; }
    }
  </style>

<body>

  <nav>
    <a href="/" class="nav-back">
      <i class="ti ti-arrow-left" aria-hidden="true"></i>
      もどる
    </a>
    <span class="nav-title">お店を選ぶ</span>
    <a href="mypage.html" class="nav-count" id="nav-count"></a>
  </nav>

  <a href="ranking.html" class="rank-banner">
    <i class="ti ti-award" aria-hidden="true"></i>
    <span>香川県のさぬきうどんランキングを見る</span>
    <i class="ti ti-chevron-right rank-banner-arrow" aria-hidden="true"></i>
  </a>

  <div class="search-bar">
    <div class="search-wrap">
      <i class="ti ti-search search-icon" aria-hidden="true"></i>
      <input type="text" class="search-input" id="search" placeholder="店名で検索..." autocomplete="off">
      <button class="search-clear" id="search-clear" aria-label="クリア">
        <i class="ti ti-x"></i>
      </button>
    </div>
  </div>

  <div class="filters" id="area-filters">
    <button class="filter-btn active" data-area="全て">全て</button>
    <button class="filter-btn" data-area="高松市">高松市</button>
    <button class="filter-btn" data-area="丸亀市">丸亀市</button>
    <button class="filter-btn" data-area="坂出市">坂出市</button>
    <button class="filter-btn" data-area="善通寺市">善通寺市</button>
    <button class="filter-btn" data-area="綾川町">綾川町</button>
    <button class="filter-btn" data-area="琴平町">琴平町</button>
    <button class="filter-btn" data-area="まんのう町">まんのう町</button>

    <button class="filter-btn" data-area="観音寺市">観音寺市</button>
    <button class="filter-btn" data-area="さぬき市">さぬき市</button>
    <button class="filter-btn" data-area="三木町">三木町</button>
    <button class="filter-btn" data-area="東かがわ市">東かがわ市</button>
    <button class="filter-btn" data-area="多度津町">多度津町</button>
  </div>

  <div class="type-filters" id="type-filters">
    <button class="type-pill active" data-type="全て">すべての種類</button>
    <button class="type-pill" data-type="セルフ">セルフ式</button>

  <div class="cond-filters" id="cond-filters">

    <button class="cond-pill" data-cond="open"><i class="ti ti-clock" aria-hidden="true"></i>今営業中</button>

  <!-- 記録の有無で絞り込み（ログイン中のみ表示） -->
  <div class="cond-filters" id="visit-filters" style="display:none;">
    <span class="cond-label">記録</span>
    <button class="cond-pill" data-visit="undone">まだ行ってない</button>
    <button class="cond-pill" data-visit="done"><span class="chk">✓</span>記録済み</button>
  </div>

  <p class="cond-note show" id="cond-note">
    <i class="ti ti-info-circle" aria-hidden="true"></i>「営業中／時間外」は営業時間・定休日からの<strong>目安</strong>です。売り切れ終了・臨時休業・祝日は反映されません。お出かけ前に各店の情報をご確認ください。
  </p>

  <!-- 観光地・駅から近い順で探す -->
  <div class="spot-bar" id="spot-bar" style="display:none;">
    <label class="spot-bar-label" for="spot-select"><i class="ti ti-map-pin" aria-hidden="true"></i>スポットから探す</label>
    <select class="spot-select" id="spot-select" aria-label="観光地・駅から近い順で探す">
      <option value="">観光地・駅を選ぶ…</option>
    </select>
  </div>
  <div class="spot-banner" id="spot-banner" style="display:none;">
    <i class="ti ti-map-pin" aria-hidden="true"></i>

    <button type="button" class="spot-reset" id="spot-reset">解除</button>
  </div>

  <div class="grid-wrap">
    <div class="result-bar">
      <div class="result-label" id="result-label"></div>
      <div class="sort-toggle" id="sort-toggle">
        <button class="sort-btn active" data-sort="kana">五十音順</button>
        <button class="sort-btn" data-sort="near"><i class="ti ti-map-pin" aria-hidden="true"></i>近い順</button>
      </div>
    </div>
    <div class="shops-grid" id="shops-grid"></div>
    <div class="empty" id="empty">
      <img src="images/udomaru-hungry.svg" alt="うどまる" width="110" height="110" style="display:block;margin:0 auto 6px;">
      <p>該当するお店が見つかりませんでした</p>
    </div>

    <!-- 店追加リクエスト（探している店が一覧に無いとき） -->
    <div class="shop-request">
      <div class="shop-request-title">探しているお店が見つからない？</div>
      <div class="shop-request-desc">まだ掲載していないお店は、店名とエリアを教えていただければ追加します。<br>公式XのDM、またはメールからお気軽にどうぞ。</div>
      <div class="shop-request-actions">
        <a class="shop-request-btn x" href="https://x.com/udolog_com" target="_blank" rel="noopener">
          <i class="ti ti-brand-x"></i>XのDMでリクエスト
        </a>
        <a class="shop-request-btn mail" href="mailto:info@udolog.com?subject=%E3%81%8A%E5%BA%97%E3%81%AE%E8%BF%BD%E5%8A%A0%E3%83%AA%E3%82%AF%E3%82%A8%E3%82%B9%E3%83%88&body=%E5%BA%97%E5%90%8D%EF%BC%9A%0A%E3%82%A8%E3%83%AA%E3%82%A2%EF%BC%88%E5%B8%82%E7%94%BA%EF%BC%89%EF%BC%9A%0A%EF%BC%88%E3%82%8F%E3%81%8B%E3%82%8C%E3%81%B0%E6%89%80%E5%9C%A8%E5%9C%B0%E3%82%84URL%EF%BC%89%EF%BC%9A%0A">
          <i class="ti ti-mail"></i>メールでリクエスト
        </a>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="shops-data.js"></script>
  <script src="landmarks.js"></script>
  <script>

    let currentArea = '全て';
    let currentType = '全て';
    let searchQuery = '';
    let currentSort = 'kana';   // 既定は五十音順。'kana'（五十音順）/ 'near'（近い順）
    let condOpen = false;       // 今営業中（目安）で絞り込み
    let condParking = false;    // 駐車場あり で絞り込み
    let condVisit = 'all';      // 記録の有無で絞り込み 'all'/'undone'(まだ)/'done'(記録済み)。ログイン中のみ
    let userPos = null;         // 現在地 {lat,lng}（近い順で許可を得た時だけ入る・保存しない）
    let nearRef = null;         // 近い順の基準点 {lat,lng,label}。現在地 or 観光地

    // 2点間の距離(km)：Haversine
    function distanceKm(a, b) {
      const R = 6371;
      const dLat = (b.lat - a.lat) * Math.PI / 180;
      const dLng = (b.lng - a.lng) * Math.PI / 180;
      const la1 = a.lat * Math.PI / 180, la2 = b.lat * Math.PI / 180;
      const h = Math.sin(dLat / 2) ** 2 + Math.cos(la1) * Math.cos(la2) * Math.sin(dLng / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(h));
    }
    function formatDistance(km) {
      if (km < 1) return `約${Math.round(km * 1000 / 50) * 50}m`;
      if (km < 10) return `約${km.toFixed(1)}km`;
      return `約${Math.round(km)}km`;
    }

    // --- 「駐車場あり」判定：parking が「なし〜」で始まらなければ有りとみなす ---
    function hasParking(p) {
      if (!p) return false;
      return !/^\s*なし/.test(p);
    }

    // --- 「今営業中（目安）」判定 -------------------------------------------
    // 営業時間(hours)と定休日(closed)は自由記述のため、あくまで目安。
    // 売り切れ終了・臨時休・祝日例外は判定できない。
    const WD = ['日', '月', '火', '水', '木', '金', '土'];

    // その月の第何週の曜日か（1〜5）
    function nthWeekOfMonth(d) { return Math.floor((d.getDate() - 1) / 7) + 1; }

    // 今日が定休日か（曜日休のみ判定。「第2・第4水曜」等の週指定にも対応）
    function isClosedToday(closedRaw, now) {
      if (!closedRaw) return false;
      if (closedRaw.includes('無休')) return false;   // 年中無休
      const wd = WD[now.getDay()];
      if (!closedRaw.includes(wd)) return false;
      // 「第N」指定が今日の曜日に付いていれば、その週だけ休み
      const m = closedRaw.match(new RegExp('((?:第[1-5][・･]?)+)' + wd + '曜'));
      if (m) {
        const weeks = (m[1].match(/[1-5]/g) || []).map(Number);
        return weeks.includes(nthWeekOfMonth(now));
      }
      return true;   // 週指定なし＝毎週その曜日が定休
    }

    // 現在が営業時間内か（true/false）。判定不能なら null
    function isWithinHours(hoursRaw, now) {
      if (!hoursRaw) return null;
      const h = hoursRaw.replace(/[（(][^）)]*[）)]/g, '');   // 補足（売り切れ次第終了）等を除去
      const re = /(\d{1,2}):(\d{2})\s*[〜～~\-]\s*(\d{1,2}):(\d{2})/g;
      const cur = now.getHours() * 60 + now.getMinutes();
      let found = false, open = false, m;
      while ((m = re.exec(h))) {
        found = true;
        const start = (+m[1]) * 60 + (+m[2]);
        let end = (+m[3]) * 60 + (+m[4]);
        if (end <= start) end += 1440;   // 日跨ぎ
        if ((cur >= start && cur < end) || (cur + 1440 >= start && cur + 1440 < end)) open = true;
      }
      return found ? open : null;
    }

    // 総合判定：'open' / 'closed' / 'unknown'
    function openState(shop, now) {
      if (isClosedToday(shop.closed, now)) return 'closed';
      const within = isWithinHours(shop.hours, now);
      if (within === true) return 'open';
      if (within === false) return 'closed';
      return 'unknown';   // 時間が読めない店は「営業中」と断定しない
    }

    // 営業中/時間外バッジのHTML（unknownは空＝出さない）
    function openBadge(shop, now) {
      const st = openState(shop, now);
      if (st === 'open') return '<span class="open-badge open">営業中</span>';
      if (st === 'closed') {
        const label = isClosedToday(shop.closed, now) ? '定休日' : '時間外';
        return `<span class="open-badge closed">${label}</span>`;
      }
      return '';
    }
    // 訪問記録（ログイン時にサーバーから取得して「店ごとの杯数」「記録済み店舗」を集計）
    let logs = [];
    let visitCount = {};
    let visited = new Set();

    function typeBadge(type) {
      if (type === 'セルフ') return '<span class="type-badge self">セルフ</span>';
      if (type === '一般') return '<span class="type-badge general">一般店</span>';
      return '<span class="type-badge seimen">製麺所</span>';
    }

    function render() {
      const q = searchQuery.trim();
      const now = new Date();
      const filtered = SHOPS.filter(s => {
        if (s.status === '閉店') return false;   // 閉店した店は一覧・検索に出さない
        const matchArea = currentArea === '全て' || s.city === currentArea;
        const matchType = currentType === '全て' || s.type === currentType;
        const matchQ = !q || s.name.includes(q) || (s.kana && s.kana.includes(q)) || s.city.includes(q) || s.dish.includes(q);
        const matchParking = !condParking || hasParking(s.parking);
        const matchOpen = !condOpen || openState(s, now) === 'open';
        const matchVisit = condVisit === 'all'
          || (condVisit === 'done' && visited.has(s.id))
          || (condVisit === 'undone' && !visited.has(s.id));
        return matchArea && matchType && matchQ && matchParking && matchOpen && matchVisit;
      });

      // あいうえお順：よみ(kana)で日本語ソート。kanaが無ければ店名で代用
      if (currentSort === 'kana') {
        filtered.sort((a, b) =>
          (a.kana || a.name).localeCompare(b.kana || b.name, 'ja')
        );
      } else if (currentSort === 'near' && nearRef) {
        // 近い順：基準点（現在地 or 観光地）からの距離を計算して昇順。座標が無い店は末尾へ
        filtered.forEach(s => {
          s._dist = (s.lat != null && s.lng != null) ? distanceKm(nearRef, s) : Infinity;
        });
        filtered.sort((a, b) => a._dist - b._dist);
      }
      const showDist = currentSort === 'near' && nearRef;

      // 観光地スポット選択中はバナー表示（現在地の時は出さない）
      const spotBanner = document.getElementById('spot-banner');
      if (currentSort === 'near' && nearRef && nearRef.label && nearRef.label !== '現在地') {
        document.getElementById('spot-banner-label').textContent = nearRef.label;
        spotBanner.style.display = 'flex';
      } else {
        spotBanner.style.display = 'none';
      }

      const grid = document.getElementById('shops-grid');
      const empty = document.getElementById('empty');
      const label = document.getElementById('result-label');
      const navCount = document.getElementById('nav-count');

      if (API.isLoggedIn && API.isLoggedIn()) {
        navCount.innerHTML =
          `<span class="nav-count-text">` +
            `<span class="nav-count-label">あなたの記録</span>` +
            `<span class="nav-count-val">${visited.size}店 / ${logs.length}杯</span>` +
          `</span><i class="ti ti-chevron-right" style="color:#ccc;font-size:16px;"></i>`;
      } else {
        navCount.innerHTML =
          `<span class="nav-count-text"><span class="nav-count-val">マイページ</span></span>` +
          `<i class="ti ti-chevron-right" style="color:#ccc;font-size:16px;"></i>`;
      }
      label.textContent = `${filtered.length}件のお店`;

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      grid.innerHTML = filtered.map(s => {
        const done = visited.has(s.id);
        return `
          <div class="shop-card ${done ? 'done' : ''}">
            <div class="shop-name">${s.name}</div>
            <div class="card-meta">
              <i class="ti ti-map-pin" aria-hidden="true"></i>
              <span class="card-city">${s.city}</span>
              ${done ? '<span class="done-badge"><span class="chk">✓</span>記録済み</span>' : ''}
              ${showDist && s._dist !== Infinity ? `<span class="dist-chip"><i class="ti ti-map-pin" aria-hidden="true"></i>${formatDistance(s._dist)}</span>` : ''}
              ${openBadge(s, now)}
              ${typeBadge(s.type)}
            </div>
            <div class="card-actions">
              <a class="btn-detail" href="shops/${s.slug || ('shop' + s.id)}"><i class="ti ti-info-circle" aria-hidden="true"></i> 詳細</a>
              <a class="btn-taberu ${done ? 'done' : ''}" href="record.html?id=${s.id}&slug=${encodeURIComponent(s.slug || '')}&name=${encodeURIComponent(s.name)}&city=${encodeURIComponent(s.city)}&type=${encodeURIComponent(s.type)}">
                ${done
                  ? `<i class="ti ti-plus" aria-hidden="true"></i><span class="taberu-text">もう一杯！<span class="taberu-count">（記録数：${visitCount[s.id] || 0}杯）</span></span>`
                  : '<i class="ti ti-plus" aria-hidden="true"></i> 食べた！'}
              </a>
            </div>
          </div>
        `;
      }).join('');
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // area filter
    document.getElementById('area-filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentArea = btn.dataset.area;
      render();
    });

    // sort toggle（あいうえお順／近い順）
    function setActiveSort(btn, sort) {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSort = sort;
      // 近い順以外に切り替えたらスポット選択を解除
      if (sort !== 'near') {
        const ss = document.getElementById('spot-select');
        if (ss) ss.value = '';
        if (nearRef && nearRef.label !== '現在地') nearRef = null;
      }
      render();
    }

    // 近い順：現在地の許可を得てから並べ替え（拒否・非対応時は元の並びのまま）
    function selectNearSort(btn) {
      // 座標がまだ1件も無い（ジオコーディング前）は位置情報を求めず案内だけ
      if (!SHOPS.some(s => s.lat != null && s.lng != null)) {
        showToast('店舗の位置情報を準備中です。もう少しお待ちください');
        return;
      }
      document.getElementById('spot-select').value = '';   // スポット選択を解除して現在地基準へ
      if (userPos) {                                        // 取得済みなら再利用
        nearRef = { lat: userPos.lat, lng: userPos.lng, label: '現在地' };
        setActiveSort(btn, 'near');
        return;
      }
      if (!navigator.geolocation) {
        showToast('お使いの端末では現在地を取得できません');
        return;
      }
      showToast('現在地を取得しています…');
      navigator.geolocation.getCurrentPosition(
        pos => {
          userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          nearRef = { lat: userPos.lat, lng: userPos.lng, label: '現在地' };
          setActiveSort(btn, 'near');
          showToast('現在地から近い順に並べました');
        },
        err => {
          showToast(err.code === err.PERMISSION_DENIED
            ? '現在地の利用が許可されませんでした'
            : '現在地を取得できませんでした');
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 }
      );
    }

    document.getElementById('sort-toggle').addEventListener('click', e => {
      const btn = e.target.closest('.sort-btn');
      if (!btn) return;
      if (btn.dataset.sort === 'near') { selectNearSort(btn); return; }
      setActiveSort(btn, btn.dataset.sort);
    });

    // === スポット（観光地・駅）から近い順で探す ===
    // 座標付きの観光地だけを選択肢に出す（未取得なら選択UIごと隠す）
    (function populateSpots() {
      if (typeof LANDMARKS === 'undefined') return;
      const withCoord = LANDMARKS.filter(l => l.lat != null && l.lng != null);
      if (!withCoord.length) return;
      const sel = document.getElementById('spot-select');
      const addGroup = (label, items) => {
        if (!items.length) return;
        const og = document.createElement('optgroup');
        og.label = label;
        items.forEach(l => {
          const o = document.createElement('option');
          o.value = String(l.id);
          o.textContent = l.name;
          og.appendChild(o);
        });
        sel.appendChild(og);
      };
      addGroup('観光スポット', withCoord.filter(l => l.category === '観光'));
      addGroup('駅・空港・港', withCoord.filter(l => l.category !== '観光'));
      document.getElementById('spot-bar').style.display = 'flex';
    })();

    // スポットを選ぶ → その地点を基準に近い順
    document.getElementById('spot-select').addEventListener('change', e => {
      const id = parseInt(e.target.value);
      if (!id) return;   // 「選ぶ…」に戻したときは何もしない（解除は解除ボタンで）
      const lm = (typeof LANDMARKS !== 'undefined') ? LANDMARKS.find(l => l.id === id) : null;
      if (!lm || lm.lat == null || lm.lng == null) { showToast('この地点は準備中です'); return; }
      nearRef = { lat: lm.lat, lng: lm.lng, label: lm.name };
      setActiveSort(document.querySelector('.sort-btn[data-sort="near"]'), 'near');
      showToast(`${lm.name}から近い順に並べました`);
    });

    // スポット解除 → 五十音順に戻す
    document.getElementById('spot-reset').addEventListener('click', () => {
      nearRef = null;
      document.getElementById('spot-select').value = '';
      setActiveSort(document.querySelector('.sort-btn[data-sort="kana"]'), 'kana');
    });

    // type filter
    document.getElementById('type-filters').addEventListener('click', e => {
      const pill = e.target.closest('.type-pill');
      if (!pill) return;
      document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentType = pill.dataset.type;
      render();
    });

    // condition filters（複数トグル可）
    document.getElementById('cond-filters').addEventListener('click', e => {
      const pill = e.target.closest('.cond-pill');
      if (!pill) return;
      const on = pill.classList.toggle('active');
      if (pill.dataset.cond === 'open') condOpen = on;
      if (pill.dataset.cond === 'parking') condParking = on;
      render();
    });

    // 記録の有無フィルタ（まだ行ってない／記録済み・排他トグル）
    document.getElementById('visit-filters').addEventListener('click', e => {
      const pill = e.target.closest('.cond-pill');
      if (!pill) return;
      const v = pill.dataset.visit;
      condVisit = (condVisit === v) ? 'all' : v;   // 同じものを再タップで解除
      document.querySelectorAll('#visit-filters .cond-pill').forEach(p =>
        p.classList.toggle('active', condVisit !== 'all' && p.dataset.visit === condVisit));
      render();
    });

    // search
    const searchInput = document.getElementById('search');
    const searchClear = document.getElementById('search-clear');

    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value;
      searchClear.style.display = searchQuery ? 'block' : 'none';
      render();
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchQuery = '';
      searchClear.style.display = 'none';
      searchInput.focus();
      render();
    });

    // === 初期化：ログイン中ならサーバーの記録を取得して反映（未ログインでも一覧は見られる）===
    (async function init() {
      try { await API.refresh(); } catch (e) {}
      if (API.isLoggedIn && API.isLoggedIn()) {
        try {
          const data = await API.get('my_logs.php');
          logs = data.logs || [];
          visitCount = {};
          visited = new Set();
          logs.forEach(l => {
            visitCount[l.shopId] = (visitCount[l.shopId] || 0) + 1;
            visited.add(l.shopId);
          });
          // 記録の有無フィルタはログイン中だけ出す
          document.getElementById('visit-filters').style.display = 'flex';
        } catch (e) {}
      }
      render();
    })();
  </script>

</body>
