<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お店を選ぶ — うどログ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tabler-icons.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #BA7517;
      --amber-dark: #8A5510;
       --amber-darker: #6F440C;
      --amber-light: #FFF8EE;
      --amber-mid: #FAEEDA;
      --text: #111;
      --text-sub: #666;
      --text-muted: #999;
      --border: #E8E8E2;
      --bg: #FAFAF7;
      --white: #fff;
    }

    body {
      font-family: 'Noto Sans JP', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 54px;
      z-index: 100;
      background: rgba(250,250,247,0.94);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1.5rem;
      height: 54px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--text-sub);
      text-decoration: none;
    }

    .nav-back:hover { color: var(--text); }

    .nav-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .nav-count {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
      text-decoration: none;
    }
    .nav-count-text {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 1.15;
    }
    .nav-count-label { font-size: 10px; color: var(--text-sub); font-weight: 600; }
    .nav-count-val { font-size: 13px; color: var(--amber); font-weight: 700; }

    /* SEARCH BAR */
    /* ランキングへの導線バナー */
    .rank-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 600px;
      margin: 12px auto 0;
      padding: 12px 16px;
      background: linear-gradient(135deg, #BA7517 0%, #D89030 100%);
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      box-shadow: 0 2px 8px rgba(186,117,23,0.25);
    }
    .rank-banner > span { flex: 1; }
    .rank-banner .ti { font-size: 20px; }
    .rank-banner .rank-banner-arrow { font-size: 18px; opacity: 0.85; }
    @media (max-width: 640px) { .rank-banner { margin: 12px 1rem 0; } }

    .search-bar {
      background: var(--white);
      border-bottom: 0.5px solid var(--border);
      padding: 1rem 1.5rem;
    }

    .search-wrap {
      position: relative;
      max-width: 600px;
      margin: 0 auto;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 18px;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 11px 14px 11px 42px;
      border: 0.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
    }

    .search-input:focus {
      border-color: var(--amber);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(186,117,23,0.1);
    }

    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 17px;
      padding: 0;
      display: none;
    }

    /* FILTERS */
    .filters {
      background: var(--white);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      flex-shrink: 0;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-sub);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }

    .filter-btn.active {
      color: var(--amber);
      border-bottom-color: var(--amber);
    }

    .filter-btn:hover:not(.active) { color: var(--text); }

    /* TYPE PILLS */
    .type-filters {
      padding: 12px 1.5rem;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg);
    }

    .type-filters::-webkit-scrollbar { display: none; }

    .type-pill {
      flex-shrink: 0;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      border: 0.5px solid var(--border);
      border-radius: 99px;
      cursor: pointer;
      background: var(--white);
      color: var(--text-sub);
      font-family: inherit;
      transition: all 0.15s;
    }

    .type-pill.active {
      background: var(--amber);
      border-color: var(--amber);
      color: var(--white);
    }

    /* GRID */
    .grid-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem 4rem;
    }

    .result-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 1rem;
    }

    .result-label {
      font-size: 13px;
      color: var(--text-muted);
    }

    .sort-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 99px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sort-btn {
      background: #fff;
      border: none;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-sub);
      cursor: pointer;
      font-family: inherit;
    }

    .sort-btn.active {
      background: var(--amber);
      color: #fff;
      font-weight: 600;
    }

    .shops-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }

    /* SHOP CARD */
    .shop-card {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }

    .shop-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.07);
    }

    .shop-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .type-badge {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .type-badge.self { background: #EEF5FC; color: #185FA5; }
    .type-badge.general { background: #EAF3DE; color: #3B6D11; }
    .type-badge.seimen { background: var(--amber-mid); color: #633806; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .card-meta i { font-size: 13px; }
    /* 種類バッジはエリア行の右端に寄せる（店名は1行めに全幅で置く） */
    .card-meta .type-badge { margin-left: auto; }

    /* ボタン群はカード下端に固定（店名の行数が違ってもボタン位置を揃える） */
    .card-actions {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn-detail {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 100%;
      background: transparent;
      color: var(--amber-dark);
      border: 1px solid var(--amber);
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
    }

    .btn-detail:hover { background: #FFF8EE; }

    .btn-taberu {
      width: 100%;
      background: var(--amber-dark);
      color: var(--white);
      border: none;
      padding: 9px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .btn-taberu:hover { background: var(--amber-darker); }

    .btn-taberu.done {
      background: #5BAD6F;
    }

    .btn-taberu.done:hover { background: #4A9A5E; }

    /* EMPTY STATE */
    .empty {
      display: none;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
    }

    .empty i { font-size: 40px; margin-bottom: 1rem; display: block; }
    .empty p { font-size: 15px; }

    /* 店追加リクエスト枠 */
    .shop-request {
      max-width: 520px;
      margin: 1.5rem auto 0;
      background: var(--amber-light, #FFF8EE);
      border: 0.5px solid var(--amber-border, #F0D9C0);
      border-radius: 14px;
      padding: 1.25rem 1.25rem 1.4rem;
      text-align: center;
    }
    .shop-request-title { font-size: 15px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
    .shop-request-desc { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 1rem; }
    .shop-request-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .shop-request-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border-radius: 99px;
      font-size: 13px; font-weight: 600; text-decoration: none;
    }
    .shop-request-btn i { font-size: 15px; }
    .shop-request-btn.x { background: #000; color: #fff; }
    .shop-request-btn.x:hover { opacity: 0.85; }
    .shop-request-btn.mail {
      background: #fff; color: #8A5510; border: 0.5px solid #F0D9C0;
    }
    .shop-request-btn.mail:hover { background: #fbf3e6; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #111;
      color: #fff;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 99px;
      pointer-events: none;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      white-space: nowrap;
      z-index: 999;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 600px) {
      /* スマホは2カラム（密度を上げる）。左右余白とカード余白を詰めて幅を稼ぐ */
      .shops-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .grid-wrap { padding-left: 1rem; padding-right: 1rem; }
      .shop-card { padding: 0.9rem 1rem; }
    }

    /* ごく狭い端末（旧SE等）だけ1カラムに戻す */
    @media (max-width: 340px) {
      .shops-grid { grid-template-columns: 1fr; }
    }
  </style>

  <script src="shops-data.js"></script>
  <script>

    let currentArea = '全て';
    let currentType = '全て';
    let searchQuery = '';
    let currentSort = 'kana';   // 既定は五十音順。'area'（id順）/ 'kana'（五十音順）
    // 訪問記録（ログイン時にサーバーから取得して「店ごとの杯数」「記録済み店舗」を集計）
    let logs = [];
    let visitCount = {};
    let visited = new Set();

    function typeBadge(type) {
      if (type === 'セルフ') return '<span class="type-badge self">セルフ</span>';
      if (type === '一般') return '<span class="type-badge general">一般店</span>';
      return '<span class="type-badge seimen">製麺所</span>';
    }

    function render() {
      const q = searchQuery.trim();
      const filtered = SHOPS.filter(s => {
        if (s.status === '閉店') return false;   // 閉店した店は一覧・検索に出さない
        const matchArea = currentArea === '全て' || s.city === currentArea;
        const matchType = currentType === '全て' || s.type === currentType;
        const matchQ = !q || s.name.includes(q) || (s.kana && s.kana.includes(q)) || s.city.includes(q) || s.dish.includes(q);
        return matchArea && matchType && matchQ;
      });

      // あいうえお順：よみ(kana)で日本語ソート。kanaが無ければ店名で代用
      if (currentSort === 'kana') {
        filtered.sort((a, b) =>
          (a.kana || a.name).localeCompare(b.kana || b.name, 'ja')
        );
      }

      const grid = document.getElementById('shops-grid');
      const empty = document.getElementById('empty');
      const label = document.getElementById('result-label');
      const navCount = document.getElementById('nav-count');

      if (API.isLoggedIn && API.isLoggedIn()) {
        navCount.innerHTML =
          `<span class="nav-count-text">` +
            `<span class="nav-count-label">あなたの記録</span>` +
            `<span class="nav-count-val">${visited.size}店 / ${logs.length}杯</span>` +
          `</span><i class="ti ti-chevron-right" style="color:#ccc;font-size:16px;"></i>`;
      } else {
        navCount.innerHTML =
          `<span class="nav-count-text"><span class="nav-count-val">マイページ</span></span>` +
          `<i class="ti ti-chevron-right" style="color:#ccc;font-size:16px;"></i>`;
      }
      label.textContent = `${filtered.length}件のお店`;

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      grid.innerHTML = filtered.map(s => {
        const done = visited.has(s.id);
        return `
          <div class="shop-card">
            <div class="shop-name">${s.name}</div>
            <div class="card-meta">
              <i class="ti ti-map-pin" aria-hidden="true"></i>
              ${s.city}
              ${typeBadge(s.type)}
            </div>
            <div class="card-actions">
              <a class="btn-detail" href="shops/${s.slug || ('shop' + s.id)}"><i class="ti ti-info-circle" aria-hidden="true"></i> 詳細</a>
              <a class="btn-taberu ${done ? 'done' : ''}" href="record.html?id=${s.id}&slug=${encodeURIComponent(s.slug || '')}&name=${encodeURIComponent(s.name)}&city=${encodeURIComponent(s.city)}&type=${encodeURIComponent(s.type)}">
                ${done
                  ? `<i class="ti ti-plus" aria-hidden="true"></i> もう一杯！（${visitCount[s.id] || 0}杯）`
                  : '<i class="ti ti-plus" aria-hidden="true"></i> 食べた！'}
              </a>
            </div>
          </div>
        `;
      }).join('');
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // area filter
    document.getElementById('area-filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentArea = btn.dataset.area;
      render();
    });

    // sort toggle（エリア順／あいうえお順）
    document.getElementById('sort-toggle').addEventListener('click', e => {
      const btn = e.target.closest('.sort-btn');
      if (!btn) return;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSort = btn.dataset.sort;
      render();
    });

    // type filter
    document.getElementById('type-filters').addEventListener('click', e => {
      const pill = e.target.closest('.type-pill');
      if (!pill) return;
      document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentType = pill.dataset.type;
      render();
    });

    // search
    const searchInput = document.getElementById('search');
    const searchClear = document.getElementById('search-clear');

    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value;
      searchClear.style.display = searchQuery ? 'block' : 'none';
      render();
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchQuery = '';
      searchClear.style.display = 'none';
      searchInput.focus();
      render();
    });

    // === 初期化：ログイン中ならサーバーの記録を取得して反映（未ログインでも一覧は見られる）===
    (async function init() {
      try { await API.refresh(); } catch (e) {}
      if (API.isLoggedIn && API.isLoggedIn()) {
        try {
          const data = await API.get('my_logs.php');
          logs = data.logs || [];
          visitCount = {};
          visited = new Set();
          logs.forEach(l => {
            visitCount[l.shopId] = (visitCount[l.shopId] || 0) + 1;
            visited.add(l.shopId);
          });
        } catch (e) {}
      }
      render();
    })();
  </script>

</body>
</html>
