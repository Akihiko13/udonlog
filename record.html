<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>うどん記録を投稿 — うどログ</title>
  <link rel="stylesheet" href="tabler-icons.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: #FAFAF8;
      color: #1a1a1a;
      line-height: 1.7;
      font-size: 16px;
      min-height: 100vh;
      padding: 2rem 1.25rem 4rem;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
    }

    /* ヘッダー */
    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #fff;
      border: 0.5px solid #e5e5e0;
      color: #444;
      text-decoration: none;
      font-size: 18px;
      flex-shrink: 0;
    }

    .back-btn:hover { background: #f5f5f0; }

    .page-title {
      font-size: 18px;
      font-weight: 500;
    }

    /* カード */
    .card {
      background: #fff;
      border: 0.5px solid #e5e5e0;
      border-radius: 16px;
      padding: 1.75rem 1.5rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* お店情報バッジ */
    .shop-badge {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #FFF8EE;
      border: 0.5px solid #F0D9C0;
      border-radius: 12px;
      padding: 14px 16px;
    }

    .shop-icon {
      width: 44px;
      height: 44px;
      background: #BA7517;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .shop-icon img { width: 78%; height: 78%; object-fit: contain; }
    .shop-icon i { color: #fff; font-size: 22px; line-height: 1; }

    .shop-info-name {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .shop-info-meta {
      font-size: 13px;
      color: #888;
      display: flex;
      gap: 8px;
    }

    .shop-type-badge {
      background: #FAEEDA;
      color: #BA7517;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
    }

    .change-shop {
      margin-left: auto;
      font-size: 13px;
      color: #8A5510;
      text-decoration: none;
      flex-shrink: 0;
      /* タップ領域を広げる（右端に寄せているので上下と左に余白） */
      padding: 10px 4px 10px 12px;
      margin-right: -4px;
    }

    .change-shop:hover { text-decoration: underline; }

    /* フォーム */
    .form-group { margin-bottom: 1.25rem; }
    .form-group:last-child { margin-bottom: 0; }

    label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }

    .optional {
      font-size: 11px;
      color: #888;
      font-weight: 400;
    }
    .required {
      font-size: 11px;
      color: #fff;
      font-weight: 600;
      background: #d9534f;
      border-radius: 99px;
      padding: 1px 8px;
      margin-left: 4px;
    }

    input[type="text"],
    input[type="date"],
    textarea,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 0.5px solid #d0d0ca;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #BA7517;
      box-shadow: 0 0 0 3px rgba(186, 117, 23, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 88px;
      line-height: 1.6;
    }

    /* 写真アップロード */
    .photo-upload {
      border: 1.5px dashed #d0d0ca;
      border-radius: 12px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .photo-upload:hover {
      border-color: #BA7517;
      background: #FDFAF5;
    }

    .photo-upload input { display: none; }

    .upload-icon {
      font-size: 32px;
      color: #ccc;
      margin-bottom: 8px;
    }

    .upload-text {
      font-size: 14px;
      color: #888;
      margin-bottom: 4px;
    }

    .upload-sub { font-size: 12px; color: #bbb; }

    .photo-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .photo-preview-item {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
    }

    .photo-preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-preview-item .remove-photo {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 20px;
      height: 20px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* メニュー選択チップ */
    .menu-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .menu-chip {
      border: 1px solid #d0d0ca;
      background: #fff;
      color: #555;
      border-radius: 99px;
      padding: 9px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.12s;
      user-select: none;
    }

    .menu-chip:hover { border-color: #BA7517; }

    .menu-chip.selected {
      background: #BA7517;
      border-color: #BA7517;
      color: #fff;
      font-weight: 600;
    }

    /* 公開設定 */
    .visibility-options {
      display: flex;
      gap: 10px;
    }

    .visibility-option {
      flex: 1;
      border: 1.5px solid #e5e5e0;
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: center;
    }

    .visibility-option.selected {
      border-color: #BA7517;
      background: #FFF8EE;
    }

    .visibility-option input { display: none; }

    .visibility-icon { font-size: 20px; margin-bottom: 4px; }

    .visibility-label {
      font-size: 13px;
      font-weight: 500;
      color: #333;
    }

    .visibility-sub {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .visibility-note {
      display: flex;
      gap: 6px;
      align-items: flex-start;
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.5;
      color: #888;
    }
    .visibility-note i { color: #BA7517; font-size: 14px; margin-top: 1px; flex-shrink: 0; }

    /* 投稿ボタン */
    .btn-post {
      width: 100%;
      background: #8A5510;
      color: #fff;
      border: none;
      padding: 15px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 1.5rem;
      transition: background 0.15s;
    }

    .btn-post:hover { background: #6F440C; }
    .btn-post:disabled { background: #b79a6a; cursor: default; }

    /* 送信中のスピナー */
    @keyframes ulog-spin { to { transform: rotate(360deg); } }
    .btn-post .spin { display: inline-block; animation: ulog-spin 0.7s linear infinite; }

    /* 投稿完了＆シェアモーダル */
    .share-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }

    .share-overlay.show { display: flex; }

    .share-modal {
      background: #fff;
      border-radius: 16px;
      padding: 2rem 1.5rem 1.5rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    /* 記録できた瞬間の「うどまる（食べた表情）」。常に見える状態を基本にし、
       動きは reduced-motion でない時だけ（透明化はせずポップだけ） */
    .share-udomaru {
      display: block;
      width: 96px;
      height: 96px;
      margin: 0 auto 0.75rem;
    }
    @media (prefers-reduced-motion: no-preference) {
      .share-overlay.show .share-udomaru {
        animation: udomaru-pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
    }
    @keyframes udomaru-pop {
      from { transform: scale(0.5); }
      to   { transform: scale(1); }
    }

    .share-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .share-desc { font-size: 14px; color: #666; margin-bottom: 1.5rem; }

    .share-x {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: #000;
      color: #fff;
      border: none;
      padding: 13px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 10px;
    }

    .share-x:hover { background: #222; }
    .share-x svg { width: 18px; height: 18px; fill: #fff; flex-shrink: 0; }

    .share-skip {
      display: inline-block;
      font-size: 14px;
      color: #888;
      text-decoration: none;
      padding: 6px;
    }

    .share-skip:hover { color: #555; }

    /* トースト */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      color: #fff;
      padding: 12px 20px;
      border-radius: 99px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
  <!-- ファビコン -->
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#BA7517">
  <script src="api.js"></script>
  <script src="shops-data.js"></script>
  <meta name="description" content="食べたうどんを記録してスタンプを集めよう。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="うどログ">
  <meta property="og:title" content="うどんを記録｜うどログ">
  <meta property="og:description" content="食べたうどんを記録してスタンプを集めよう。">
  <meta property="og:url" content="https://udolog.com/record.html">
  <meta property="og:image" content="https://udolog.com/images/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@udolog_com">
  <meta name="twitter:title" content="うどんを記録｜うどログ">
  <meta name="twitter:description" content="食べたうどんを記録してスタンプを集めよう。">
  <meta name="twitter:image" content="https://udolog.com/images/og-image.png">
  <script src="header.js"></script>
  <script src="analytics.js"></script>
</head>
<body>

  <div class="container">

    <!-- ヘッダー -->
    <div class="page-header">
      <a href="shops.html" class="back-btn" id="backBtn">
        <i class="ti ti-arrow-left"></i>
      </a>
      <h1 class="page-title" id="pageTitle">うどん記録を投稿</h1>
    </div>

    <!-- お店情報 -->
    <div class="card">
      <div class="card-title">お店</div>
      <div class="shop-badge">
        <div class="shop-icon"><i class="ti ti-bowl-chopsticks"></i></div>
        <div>
          <div class="shop-info-name" id="shopName">—</div>
          <div class="shop-info-meta">
            <span id="shopCity">—</span>
            <span class="shop-type-badge" id="shopType">—</span>
          </div>
        </div>
        <a href="shops.html" class="change-shop">変更</a>
      </div>
    </div>

    <!-- 記録フォーム -->
    <div class="card">
      <div class="card-title">記録内容</div>

      <!-- メニュー（選択式・複数選択可） -->
      <div class="form-group">
        <label>
          <i class="ti ti-bowl" style="color:#BA7517"></i>
          食べたメニュー
          <span class="required">必須</span>
          <span class="optional">複数選択可</span>
        </label>
        <div class="menu-chips" id="menuChips"></div>
        <input type="text" id="menuOther" placeholder="その他（自由入力）" maxlength="30" style="margin-top:10px;">
      </div>

      <!-- 感想 -->
      <div class="form-group">
        <label for="comment">
          <i class="ti ti-message" style="color:#BA7517"></i>
          ひとこと感想
          <span class="optional">任意</span>
        </label>
        <textarea id="comment" placeholder="おいしかった！天ぷらがサクサクで最高でした。" maxlength="140" oninput="document.getElementById('commentCount').textContent=this.value.length"></textarea>
        <div style="font-size:12px;color:#888;text-align:right;margin-top:4px;"><span id="commentCount">0</span> / 140</div>
      </div>

      <!-- 訪問日 -->
      <div class="form-group">
        <label for="visitDate">
          <i class="ti ti-calendar" style="color:#BA7517"></i>
          訪問日
        </label>
        <input type="date" id="visitDate">
      </div>
    </div>

    <!-- 写真 -->
    <div class="card">
      <div class="card-title">写真 <span style="font-size:11px;color:#888;font-weight:400;" id="photoNote">任意・1枚</span></div>
      <label class="photo-upload" for="photoInput" id="photoUploadArea">
        <input type="file" id="photoInput" accept="image/*" onchange="handlePhotos(event)">
        <div class="upload-icon"><i class="ti ti-camera"></i></div>
        <div class="upload-text">写真を追加</div>
        <div class="upload-sub">タップして選択</div>
      </label>
      <div class="photo-preview" id="photoPreview"></div>
    </div>

    <!-- 公開設定 -->
    <div class="card">
      <div class="card-title">公開設定</div>
      <div class="visibility-options">
        <label class="visibility-option selected" id="opt-public" onclick="setVisibility('public')">
          <input type="radio" name="visibility" value="public" checked>
          <div class="visibility-icon"><i class="ti ti-world"></i></div>
          <div class="visibility-label">全体公開</div>
          <div class="visibility-sub">みんなに見える</div>
        </label>
        <label class="visibility-option" id="opt-private" onclick="setVisibility('private')">
          <input type="radio" name="visibility" value="private">
          <div class="visibility-icon"><i class="ti ti-lock"></i></div>
          <div class="visibility-label">自分のみ</div>
          <div class="visibility-sub">自分だけが見える</div>
        </label>
      </div>
      <p class="visibility-note">
        <i class="ti ti-info-circle"></i>
        「自分のみ」にした記録は、公開プロフィールのみんなの投稿・スタンプ・バッジ・制覇率には反映されません（あなたのマイページには反映されます）。
      </p>
    </div>

    <!-- 投稿ボタン -->
    <button class="btn-post" onclick="submitRecord()">
      <i class="ti ti-send" id="submitBtnIcon"></i>
      <span id="submitBtnText">記録を投稿する</span>
    </button>

  </div>

  <!-- 投稿完了＆Xシェア -->
  <div class="share-overlay" id="shareOverlay">
    <div class="share-modal">
      <img class="share-udomaru" src="images/udomaru-eaten.svg" alt="うどまる" width="96" height="96">
      <div class="share-title">記録を投稿しました！</div>
      <div class="share-desc">この記録をXでシェアできます。</div>
      <button class="share-x" onclick="shareToX()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.74l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        Xでシェア
      </button>
      <a class="share-skip" href="mypage.html">シェアせずにマイページへ</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let photos = [];
    let visibility = 'public';

    // 写真の枚数上限（会員種別で変わる）
    // ※ B（会員機能）実装後は isPremium をログイン中の会員情報から判定する
    const isPremium = false;                 // 無料会員=false / 有料会員=true
    const MAX_PHOTOS = isPremium ? 4 : 1;

    // メニュー選択肢（集計しやすいよう表記を統一）
    const MENU_OPTIONS = [
      'かけ', 'ひやかけ', 'ぶっかけ', '肉ぶっかけ', '釜玉', '釜あげ',
      '釜かけ', '釜ぶっかけ', '釜バター', 'ざる', '冷やし', '湯だめ',
      'しょうゆ', 'おろし', '月見', '肉うどん', 'きつね', 'カレーうどん',
      'しっぽくうどん', '天ぷら', 'わかめ',
    ];
    const selectedMenus = new Set();

    // チップを描画
    (function renderMenuChips() {
      const wrap = document.getElementById('menuChips');
      wrap.innerHTML = MENU_OPTIONS.map(m =>
        `<span class="menu-chip" data-menu="${m}" onclick="toggleMenu('${m}', this)">${m}</span>`
      ).join('');
    })();

    function toggleMenu(menu, el) {
      if (selectedMenus.has(menu)) {
        selectedMenus.delete(menu);
        el.classList.remove('selected');
      } else {
        selectedMenus.add(menu);
        el.classList.add('selected');
      }
    }

    // URLパラメータからお店情報を取得（編集モードでは後で記録から上書き）
    const params = new URLSearchParams(location.search);
    const editId = parseInt(params.get('edit'), 10);
    const isEdit = !isNaN(editId) && editId > 0;

    let shopId = parseInt(params.get('id'));
    let shopSlug = params.get('slug') || '';
    let shopName = params.get('name') || '未選択';
    let shopCity = params.get('city') || '';
    let shopType = params.get('type') || '';

    // 編集モード用：既存写真の状態
    let existingPhotoUrl = null;
    let removeExistingPhoto = false;

    function applyShopBadge() {
      document.getElementById('shopName').textContent = shopName;
      document.getElementById('shopCity').textContent = shopCity;
      document.getElementById('shopType').textContent = shopType;
    }
    applyShopBadge();

    // 今日の日付をデフォルト設定（未来日は選べないよう上限も今日に）
    (function () {
      const today = new Date().toISOString().split('T')[0];
      const vd = document.getElementById('visitDate');
      vd.value = today;
      vd.max = today;
    })();

    // 戻るボタン（編集はマイページへ、新規はお店一覧へ）
    document.getElementById('backBtn').href = isEdit ? 'mypage.html' : 'shops.html';

    // 編集モードの見た目（見出し・ボタン・「変更」リンク非表示）
    if (isEdit) {
      document.title = 'うどん記録を編集 — うどログ';
      document.getElementById('pageTitle').textContent = 'うどん記録を編集';
      document.getElementById('submitBtnText').textContent = '更新する';
      const changeLink = document.querySelector('.change-shop');
      if (changeLink) changeLink.style.display = 'none';   // 編集ではお店は変えない
    }

    // ログイン必須＋（編集なら）既存の記録を読み込んでフォームに反映
    (async function init() {
      try {
        await API.refresh();
        if (!API.isLoggedIn()) {
          location.href = 'login.html?next=' + encodeURIComponent(location.pathname + location.search);
          return;
        }
      } catch (e) { return; /* API不達時は何もしない */ }

      if (!isEdit) return;

      let data;
      try {
        data = await API.get('log_get.php?id=' + editId);
      } catch (e) {
        showToast('記録の読み込みに失敗しました');
        return;
      }
      const log = data.log;
      shopId = log.shopId;
      const s = (typeof SHOPS !== 'undefined' ? SHOPS : []).find(x => x.id === log.shopId);
      if (s) { shopName = s.name; shopCity = s.city; shopType = s.type; shopSlug = s.slug || ''; }
      applyShopBadge();

      // メニュー：定番チップは選択状態に、それ以外は自由入力欄へ
      const others = [];
      (log.menus || []).forEach(m => {
        if (MENU_OPTIONS.indexOf(m) >= 0) {
          selectedMenus.add(m);
          const chip = document.querySelector('.menu-chip[data-menu="' + (window.CSS && CSS.escape ? CSS.escape(m) : m) + '"]');
          if (chip) chip.classList.add('selected');
        } else {
          others.push(m);
        }
      });
      if (others.length) document.getElementById('menuOther').value = others.join('・');

      // 感想・文字数カウント
      const c = document.getElementById('comment');
      c.value = log.comment || '';
      document.getElementById('commentCount').textContent = c.value.length;

      // 訪問日
      if (log.visitDate) document.getElementById('visitDate').value = log.visitDate;

      // 公開設定
      setVisibility(log.isPublic ? 'public' : 'private');

      // 既存の写真
      if (log.photoUrl) { existingPhotoUrl = log.photoUrl; renderPhotos(); }
    })();

    // 写真の枚数表示・複数選択可否を会員種別に合わせる
    document.getElementById('photoNote').textContent =
      isPremium ? `任意・最大${MAX_PHOTOS}枚` : '任意・1枚';
      // 有料会員制を導入したら下記に戻す:
      // isPremium ? `任意・最大${MAX_PHOTOS}枚` : '任意・1枚（有料会員は複数枚）';
    if (isPremium) {
      document.getElementById('photoInput').setAttribute('multiple', '');
    }

    // 写真
    function handlePhotos(e) {
      const files = Array.from(e.target.files);
      const usedExisting = (existingPhotoUrl && !removeExistingPhoto) ? 1 : 0;
      const remaining = MAX_PHOTOS - photos.length - usedExisting;
      files.slice(0, remaining).forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
          photos.push({ file: file, url: ev.target.result });   // 実ファイルとプレビュー用URLを保持
          renderPhotos();
        };
        reader.readAsDataURL(file);
      });
      if (files.length > remaining) {
        showToast(`写真は${MAX_PHOTOS}枚までです`);
        // 有料会員制を導入したら下記に戻す:
        // showToast(isPremium
        //   ? `写真は最大${MAX_PHOTOS}枚までです`
        //   : '複数枚の写真は有料会員でアップできます');
      }
    }

    function renderPhotos() {
      const preview = document.getElementById('photoPreview');
      let html = '';
      // 編集モードの既存写真（消されていなければ表示）
      if (existingPhotoUrl && !removeExistingPhoto) {
        html += `
          <div class="photo-preview-item">
            <img src="${existingPhotoUrl}" alt="現在の写真">
            <button type="button" class="remove-photo" onclick="removeExistingPhotoFn()">×</button>
          </div>`;
      }
      html += photos.map((p, i) => `
        <div class="photo-preview-item">
          <img src="${p.url}" alt="写真${i+1}">
          <button type="button" class="remove-photo" onclick="removePhoto(${i})">×</button>
        </div>
      `).join('');
      preview.innerHTML = html;

      const used = photos.length + ((existingPhotoUrl && !removeExistingPhoto) ? 1 : 0);
      document.getElementById('photoUploadArea').style.display = used >= MAX_PHOTOS ? 'none' : 'block';
    }

    function removePhoto(idx) {
      photos.splice(idx, 1);
      renderPhotos();
    }

    // 編集モード：既存写真を削除対象にする
    function removeExistingPhotoFn() {
      removeExistingPhoto = true;
      renderPhotos();
    }

    // 公開設定
    function setVisibility(val) {
      visibility = val;
      document.getElementById('opt-public').classList.toggle('selected', val === 'public');
      document.getElementById('opt-private').classList.toggle('selected', val === 'private');
    }

    // 投稿（サーバーに保存）
    async function submitRecord() {
      if (shopName === '未選択' || isNaN(shopId)) {
        showToast('お店を選んでください');
        return;
      }

      // 選択したメニュー＋その他（自由入力）をまとめる
      const otherMenu = document.getElementById('menuOther').value.trim();
      const menus = [...selectedMenus];
      if (otherMenu) menus.push(otherMenu);

      // 食べたうどんは最低1つ必須（チップ選択 or 自由入力）
      if (menus.length === 0) {
        showToast('食べたうどんを選んでください');
        document.getElementById('menuChips').scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }

      // 送信中の状態表示（ボタンを無効化＋スピナー＋文言変更で二重送信を防ぐ）
      const btn = document.querySelector('.btn-post');
      const btnTextEl = document.getElementById('submitBtnText');
      const btnIconEl = document.getElementById('submitBtnIcon');
      const origText = btnTextEl ? btnTextEl.textContent : '';
      function setLoading(on) {
        if (btn) btn.disabled = on;
        if (btnTextEl) btnTextEl.textContent = on ? (isEdit ? '更新中…' : '投稿中…') : origText;
        if (btnIconEl) btnIconEl.className = on ? 'ti ti-loader-2 spin' : 'ti ti-send';
      }
      setLoading(true);
      try {
        await API.refresh();
        if (!API.isLoggedIn()) {
          location.href = 'login.html?next=' + encodeURIComponent(location.pathname + location.search);
          return;
        }

        if (isEdit) {
          // === 編集：既存の記録を更新 ===
          await API.post('log_update.php', {
            id: editId,
            menus: menus,
            comment: document.getElementById('comment').value.trim(),
            visit_date: document.getElementById('visitDate').value,
            is_public: visibility === 'public' ? 1 : 0,
          });
          // 写真：新しく選んだら差し替え、無くて既存を消したなら削除
          if (photos.length) {
            try {
              const fd = new FormData();
              fd.append('log_id', editId);
              fd.append('photo', photos[0].file);
              await API.upload('log_photo.php', fd);
            } catch (e) {
              showToast('記録は更新しましたが、写真の保存に失敗しました');
            }
          } else if (removeExistingPhoto && existingPhotoUrl) {
            try { await API.post('log_photo_delete.php', { log_id: editId }); } catch (_) {}
          }
          location.href = 'mypage.html';
          return;
        }

        // === 新規：記録を追加（同じ店でも何度でも＝杯数になる）===
        const res = await API.post('log_add.php', {
          shop_id: shopId,
          menus: menus,
          comment: document.getElementById('comment').value.trim(),
          visit_date: document.getElementById('visitDate').value,
          photo_count: photos.length,
          is_public: visibility === 'public' ? 1 : 0,
        });
        // 写真があればアップロード（記録IDに紐付け）。失敗しても記録自体は成功扱い。
        if (photos.length && res.log && res.log.id) {
          try {
            const fd = new FormData();
            fd.append('log_id', res.log.id);
            fd.append('photo', photos[0].file);
            await API.upload('log_photo.php', fd);
          } catch (e) {
            showToast('記録は保存しましたが、写真の保存に失敗しました');
          }
        }
        // シェア用に今回の記録内容を保持し、完了モーダルを表示
        lastRecord = { name: shopName, city: shopCity, menus: menus };
        // その日2杯目以降は「満腹うどまる」＋「今日◯杯目！」でお祝い
        const dayCount = res.dayCount || 1;
        const isFull = dayCount >= 2;
        document.querySelector('.share-udomaru').src =
          isFull ? 'images/udomaru-full.svg' : 'images/udomaru-eaten.svg';
        document.querySelector('.share-title').textContent =
          isFull ? `今日${dayCount}杯目！` : '記録を投稿しました！';
        document.getElementById('shareOverlay').classList.add('show');
      } catch (err) {
        showToast(err.message || (isEdit ? '更新に失敗しました' : '記録に失敗しました'));
        setLoading(false);
      }
    }

    // 直近の記録（Xシェア用）
    let lastRecord = null;

    // Xでシェア（APIや課金は不要。投稿インテントURLを開くだけ）
    function shareToX() {
      if (!lastRecord) return;
      const menuText = lastRecord.menus.length ? lastRecord.menus.join('・') + 'を' : '';
      const text = `🥢${lastRecord.name}（${lastRecord.city}）で${menuText}食べました！\n#うどログ`;
      // 店舗詳細ページの絶対URL（現在のホストに合わせて生成）
      const shopPath = shopSlug ? ('shops/' + shopSlug) : ('shop-detail.html?id=' + shopId);
      const shopUrl = new URL(shopPath, location.href).href;
      const intent = 'https://twitter.com/intent/tweet?text='
        + encodeURIComponent(text) + '&url=' + encodeURIComponent(shopUrl);
      window.open(intent, '_blank', 'noopener');
      // シェア画面を開いたらマイページへ
      setTimeout(() => { location.href = 'mypage.html'; }, 500);
    }

    // トースト
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>

</body>
</html>
