<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>うどん記録を投稿 — うどログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: #FAFAF8;
      color: #1a1a1a;
      line-height: 1.7;
      font-size: 16px;
      min-height: 100vh;
      padding: 2rem 1.25rem 4rem;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
    }

    /* ヘッダー */
    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #fff;
      border: 0.5px solid #e5e5e0;
      color: #444;
      text-decoration: none;
      font-size: 18px;
      flex-shrink: 0;
    }

    .back-btn:hover { background: #f5f5f0; }

    .page-title {
      font-size: 18px;
      font-weight: 500;
    }

    /* カード */
    .card {
      background: #fff;
      border: 0.5px solid #e5e5e0;
      border-radius: 16px;
      padding: 1.75rem 1.5rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* お店情報バッジ */
    .shop-badge {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #FFF8EE;
      border: 0.5px solid #F0D9C0;
      border-radius: 12px;
      padding: 14px 16px;
    }

    .shop-icon {
      width: 44px;
      height: 44px;
      background: #BA7517;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .shop-icon img { width: 78%; height: 78%; object-fit: contain; }
    .shop-icon i { color: #fff; font-size: 22px; line-height: 1; }

    .shop-info-name {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .shop-info-meta {
      font-size: 13px;
      color: #888;
      display: flex;
      gap: 8px;
    }

    .shop-type-badge {
      background: #FAEEDA;
      color: #BA7517;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
    }

    .change-shop {
      margin-left: auto;
      font-size: 13px;
      color: #BA7517;
      text-decoration: none;
      flex-shrink: 0;
    }

    .change-shop:hover { text-decoration: underline; }

    /* フォーム */
    .form-group { margin-bottom: 1.25rem; }
    .form-group:last-child { margin-bottom: 0; }

    label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }

    .optional {
      font-size: 11px;
      color: #aaa;
      font-weight: 400;
    }

    input[type="text"],
    input[type="date"],
    textarea,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 0.5px solid #d0d0ca;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #BA7517;
      box-shadow: 0 0 0 3px rgba(186, 117, 23, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 88px;
      line-height: 1.6;
    }

    /* 写真アップロード */
    .photo-upload {
      border: 1.5px dashed #d0d0ca;
      border-radius: 12px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .photo-upload:hover {
      border-color: #BA7517;
      background: #FDFAF5;
    }

    .photo-upload input { display: none; }

    .upload-icon {
      font-size: 32px;
      color: #ccc;
      margin-bottom: 8px;
    }

    .upload-text {
      font-size: 14px;
      color: #888;
      margin-bottom: 4px;
    }

    .upload-sub { font-size: 12px; color: #bbb; }

    .photo-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .photo-preview-item {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
    }

    .photo-preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-preview-item .remove-photo {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 20px;
      height: 20px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* メニュー選択チップ */
    .menu-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .menu-chip {
      border: 1px solid #d0d0ca;
      background: #fff;
      color: #555;
      border-radius: 99px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.12s;
      user-select: none;
    }

    .menu-chip:hover { border-color: #BA7517; }

    .menu-chip.selected {
      background: #BA7517;
      border-color: #BA7517;
      color: #fff;
      font-weight: 600;
    }

    /* 公開設定 */
    .visibility-options {
      display: flex;
      gap: 10px;
    }

    .visibility-option {
      flex: 1;
      border: 1.5px solid #e5e5e0;
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: center;
    }

    .visibility-option.selected {
      border-color: #BA7517;
      background: #FFF8EE;
    }

    .visibility-option input { display: none; }

    .visibility-icon { font-size: 20px; margin-bottom: 4px; }

    .visibility-label {
      font-size: 13px;
      font-weight: 500;
      color: #333;
    }

    .visibility-sub {
      font-size: 11px;
      color: #aaa;
      margin-top: 2px;
    }

    /* 投稿ボタン */
    .btn-post {
      width: 100%;
      background: #BA7517;
      color: #fff;
      border: none;
      padding: 15px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 1.5rem;
      transition: background 0.15s;
    }

    .btn-post:hover { background: #9A6010; }

    /* 投稿完了＆シェアモーダル */
    .share-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }

    .share-overlay.show { display: flex; }

    .share-modal {
      background: #fff;
      border-radius: 16px;
      padding: 2rem 1.5rem 1.5rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .share-check {
      width: 56px;
      height: 56px;
      margin: 0 auto 1rem;
      background: #F0FAF3;
      border: 0.5px solid #A8D9B5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #5BAD6F;
    }

    .share-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .share-desc { font-size: 14px; color: #666; margin-bottom: 1.5rem; }

    .share-x {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: #000;
      color: #fff;
      border: none;
      padding: 13px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 10px;
    }

    .share-x:hover { background: #222; }
    .share-x svg { width: 18px; height: 18px; fill: #fff; flex-shrink: 0; }

    .share-skip {
      display: inline-block;
      font-size: 14px;
      color: #888;
      text-decoration: none;
      padding: 6px;
    }

    .share-skip:hover { color: #555; }

    /* トースト */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      color: #fff;
      padding: 12px 20px;
      border-radius: 99px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
  <!-- ファビコン -->
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#BA7517">
  <script src="api.js?v=2"></script>
</head>
<body>

  <div class="container">

    <!-- ヘッダー -->
    <div class="page-header">
      <a href="shops.html" class="back-btn" id="backBtn">
        <i class="ti ti-arrow-left"></i>
      </a>
      <h1 class="page-title">うどん記録を投稿</h1>
    </div>

    <!-- お店情報 -->
    <div class="card">
      <div class="card-title">お店</div>
      <div class="shop-badge">
        <div class="shop-icon"><i class="ti ti-bowl-chopsticks"></i></div>
        <div>
          <div class="shop-info-name" id="shopName">—</div>
          <div class="shop-info-meta">
            <span id="shopCity">—</span>
            <span class="shop-type-badge" id="shopType">—</span>
          </div>
        </div>
        <a href="shops.html" class="change-shop">変更</a>
      </div>
    </div>

    <!-- 記録フォーム -->
    <div class="card">
      <div class="card-title">記録内容</div>

      <!-- メニュー（選択式・複数選択可） -->
      <div class="form-group">
        <label>
          <i class="ti ti-bowl" style="color:#BA7517"></i>
          食べたメニュー
          <span class="optional">複数選択可</span>
        </label>
        <div class="menu-chips" id="menuChips"></div>
        <input type="text" id="menuOther" placeholder="その他（自由入力）" maxlength="30" style="margin-top:10px;">
      </div>

      <!-- 感想 -->
      <div class="form-group">
        <label for="comment">
          <i class="ti ti-message" style="color:#BA7517"></i>
          ひとこと感想
          <span class="optional">任意</span>
        </label>
        <textarea id="comment" placeholder="おいしかった！天ぷらがサクサクで最高でした。" maxlength="200"></textarea>
      </div>

      <!-- 訪問日 -->
      <div class="form-group">
        <label for="visitDate">
          <i class="ti ti-calendar" style="color:#BA7517"></i>
          訪問日
        </label>
        <input type="date" id="visitDate">
      </div>
    </div>

    <!-- 写真 -->
    <div class="card">
      <div class="card-title">写真 <span style="font-size:11px;color:#aaa;font-weight:400;" id="photoNote">任意・1枚</span></div>
      <label class="photo-upload" for="photoInput" id="photoUploadArea">
        <input type="file" id="photoInput" accept="image/*" onchange="handlePhotos(event)">
        <div class="upload-icon"><i class="ti ti-camera"></i></div>
        <div class="upload-text">写真を追加</div>
        <div class="upload-sub">タップして選択</div>
      </label>
      <div class="photo-preview" id="photoPreview"></div>
    </div>

    <!-- 公開設定 -->
    <div class="card">
      <div class="card-title">公開設定</div>
      <div class="visibility-options">
        <label class="visibility-option selected" id="opt-public" onclick="setVisibility('public')">
          <input type="radio" name="visibility" value="public" checked>
          <div class="visibility-icon">🌐</div>
          <div class="visibility-label">全体公開</div>
          <div class="visibility-sub">みんなに見える</div>
        </label>
        <label class="visibility-option" id="opt-private" onclick="setVisibility('private')">
          <input type="radio" name="visibility" value="private">
          <div class="visibility-icon">🔒</div>
          <div class="visibility-label">自分のみ</div>
          <div class="visibility-sub">自分だけが見える</div>
        </label>
      </div>
    </div>

    <!-- 投稿ボタン -->
    <button class="btn-post" onclick="submitRecord()">
      <i class="ti ti-send"></i>
      記録を投稿する
    </button>

  </div>

  <!-- 投稿完了＆Xシェア -->
  <div class="share-overlay" id="shareOverlay">
    <div class="share-modal">
      <div class="share-check"><i class="ti ti-check"></i></div>
      <div class="share-title">記録を投稿しました！</div>
      <div class="share-desc">この記録をXでシェアできます。</div>
      <button class="share-x" onclick="shareToX()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.74l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        Xでシェア
      </button>
      <a class="share-skip" href="mypage.html">シェアせずにマイページへ</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let photos = [];
    let visibility = 'public';

    // 写真の枚数上限（会員種別で変わる）
    // ※ B（会員機能）実装後は isPremium をログイン中の会員情報から判定する
    const isPremium = false;                 // 無料会員=false / 有料会員=true
    const MAX_PHOTOS = isPremium ? 4 : 1;

    // メニュー選択肢（集計しやすいよう表記を統一）
    const MENU_OPTIONS = [
      'かけ', 'ひやかけ', 'ぶっかけ', '肉ぶっかけ', '釜玉', '釜あげ',
      '釜かけ', '釜ぶっかけ', '釜バター', 'ざる', '冷やし', '湯だめ',
      'しょうゆ', 'おろし', '月見', '肉うどん', 'きつね', 'カレーうどん',
      'しっぽくうどん', '天ぷら', 'わかめ',
    ];
    const selectedMenus = new Set();

    // チップを描画
    (function renderMenuChips() {
      const wrap = document.getElementById('menuChips');
      wrap.innerHTML = MENU_OPTIONS.map(m =>
        `<span class="menu-chip" data-menu="${m}" onclick="toggleMenu('${m}', this)">${m}</span>`
      ).join('');
    })();

    function toggleMenu(menu, el) {
      if (selectedMenus.has(menu)) {
        selectedMenus.delete(menu);
        el.classList.remove('selected');
      } else {
        selectedMenus.add(menu);
        el.classList.add('selected');
      }
    }

    // URLパラメータからお店情報を取得
    const params = new URLSearchParams(location.search);
    const shopId = parseInt(params.get('id'));
    const shopName = params.get('name') || '未選択';
    const shopCity = params.get('city') || '';
    const shopType = params.get('type') || '';

    document.getElementById('shopName').textContent = shopName;
    document.getElementById('shopCity').textContent = shopCity;
    document.getElementById('shopType').textContent = shopType;

    // 今日の日付をデフォルト設定
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('visitDate').value = today;

    // ログイン必須：未ログインならログインページへ誘導（戻り先を保持）
    (async function requireLogin() {
      try {
        await API.refresh();
        if (!API.isLoggedIn()) {
          location.href = 'login.html?next=' + encodeURIComponent(location.pathname + location.search);
        }
      } catch (e) { /* API不達時は何もしない */ }
    })();

    // 戻るボタンのリンクをshops.htmlに設定
    document.getElementById('backBtn').href = 'shops.html';

    // 写真の枚数表示・複数選択可否を会員種別に合わせる
    document.getElementById('photoNote').textContent =
      isPremium ? `任意・最大${MAX_PHOTOS}枚` : '任意・1枚';
      // 有料会員制を導入したら下記に戻す:
      // isPremium ? `任意・最大${MAX_PHOTOS}枚` : '任意・1枚（有料会員は複数枚）';
    if (isPremium) {
      document.getElementById('photoInput').setAttribute('multiple', '');
    }

    // 写真
    function handlePhotos(e) {
      const files = Array.from(e.target.files);
      const remaining = MAX_PHOTOS - photos.length;
      files.slice(0, remaining).forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
          photos.push(ev.target.result);
          renderPhotos();
        };
        reader.readAsDataURL(file);
      });
      if (files.length > remaining) {
        showToast(`写真は${MAX_PHOTOS}枚までです`);
        // 有料会員制を導入したら下記に戻す:
        // showToast(isPremium
        //   ? `写真は最大${MAX_PHOTOS}枚までです`
        //   : '複数枚の写真は有料会員でアップできます');
      }
    }

    function renderPhotos() {
      const preview = document.getElementById('photoPreview');
      preview.innerHTML = photos.map((src, i) => `
        <div class="photo-preview-item">
          <img src="${src}" alt="写真${i+1}">
          <button class="remove-photo" onclick="removePhoto(${i})">×</button>
        </div>
      `).join('');

      const uploadArea = document.getElementById('photoUploadArea');
      uploadArea.style.display = photos.length >= MAX_PHOTOS ? 'none' : 'block';
    }

    function removePhoto(idx) {
      photos.splice(idx, 1);
      renderPhotos();
    }

    // 公開設定
    function setVisibility(val) {
      visibility = val;
      document.getElementById('opt-public').classList.toggle('selected', val === 'public');
      document.getElementById('opt-private').classList.toggle('selected', val === 'private');
    }

    // 投稿（サーバーに保存）
    async function submitRecord() {
      if (shopName === '未選択' || isNaN(shopId)) {
        showToast('お店を選んでください');
        return;
      }

      // 選択したメニュー＋その他（自由入力）をまとめる
      const otherMenu = document.getElementById('menuOther').value.trim();
      const menus = [...selectedMenus];
      if (otherMenu) menus.push(otherMenu);

      const btn = document.querySelector('.btn-post');
      if (btn) btn.disabled = true;
      try {
        await API.refresh();
        if (!API.isLoggedIn()) {
          location.href = 'login.html?next=' + encodeURIComponent(location.pathname + location.search);
          return;
        }
        // 同じ店でも何度でも記録できる（＝杯数になる）
        await API.post('log_add.php', {
          shop_id: shopId,
          menus: menus,
          comment: document.getElementById('comment').value.trim(),
          visit_date: document.getElementById('visitDate').value,
          photo_count: photos.length,
          is_public: visibility === 'public' ? 1 : 0,
        });
        // シェア用に今回の記録内容を保持し、完了モーダルを表示
        lastRecord = { name: shopName, city: shopCity, menus: menus };
        document.getElementById('shareOverlay').classList.add('show');
      } catch (err) {
        showToast(err.message || '記録に失敗しました');
        if (btn) btn.disabled = false;
      }
    }

    // 直近の記録（Xシェア用）
    let lastRecord = null;

    // Xでシェア（APIや課金は不要。投稿インテントURLを開くだけ）
    function shareToX() {
      if (!lastRecord) return;
      const menuText = lastRecord.menus.length ? lastRecord.menus.join('・') + 'を' : '';
      const text = `🥢${lastRecord.name}（${lastRecord.city}）で${menuText}食べました！\n#うどログ`;
      // 店舗詳細ページの絶対URL（現在のホストに合わせて生成）
      const shopUrl = new URL('shop-detail.html?id=' + shopId, location.href).href;
      const intent = 'https://twitter.com/intent/tweet?text='
        + encodeURIComponent(text) + '&url=' + encodeURIComponent(shopUrl);
      window.open(intent, '_blank', 'noopener');
      // シェア画面を開いたらマイページへ
      setTimeout(() => { location.href = 'mypage.html'; }, 500);
    }

    // トースト
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>

  <script src="header.js?v=2"></script>
</body>
</html>
