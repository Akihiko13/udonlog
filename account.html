<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アカウント設定 — うどログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --amber: #BA7517;
      --amber-dark: #8A5510;
      --amber-darker: #6F440C;
      --amber-light: #FFF8EE;
      --amber-border: #F0D9C0;
      --bg: #FAFAF8;
      --white: #fff;
      --border: #e5e5e0;
      --text: #1a1a1a;
      --text-sub: #666;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 16px;
      min-height: 100vh;
      padding-bottom: 4rem;
    }
    .page-header {
      position: sticky;
      top: 54px;
      background: rgba(250,250,248,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1.25rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
    }
    .back-btn {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--white); border: 0.5px solid var(--border);
      color: #444; text-decoration: none; font-size: 18px; flex-shrink: 0;
    }
    .back-btn:hover { background: #f5f5f0; }
    .header-title { font-size: 16px; font-weight: 500; }

    .container { max-width: 560px; margin: 0 auto; padding: 1.5rem 1.25rem; }

    /* フォーム */
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .form-group input[type="password"] {
      width: 100%; padding: 12px 14px;
      border: 0.5px solid var(--border); border-radius: 12px;
      font-size: 16px; font-family: inherit; background: var(--white); color: var(--text);
      -webkit-appearance: none; appearance: none;
    }
    .form-group input:focus {
      outline: none; border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(186, 117, 23, 0.1);
    }
    .field-note { font-size: 12px; color: #888; margin-top: 4px; }

    .state-box { text-align: center; color: var(--text-sub); font-size: 15px; padding: 3rem 1rem; }

    /* セクション（区切り） */
    .section {
      margin-bottom: 2.5rem; padding-bottom: 2.5rem; border-bottom: 0.5px solid var(--border);
    }
    .section:last-child { border-bottom: none; }
    .section-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }

    .email-box {
      padding: 12px 14px; border: 0.5px solid var(--border); border-radius: 12px;
      background: #f6f6f3; color: var(--text-sub); font-size: 15px; word-break: break-all;
    }

    .pw-change-btn {
      width: 100%; background: var(--white); color: var(--amber-dark);
      border: 0.5px solid var(--amber); padding: 13px; border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .pw-change-btn:hover { background: var(--amber-light); }
    .pw-change-btn:disabled { opacity: 0.5; cursor: default; }

    /* 退会（危険ゾーン） */
    .danger-title { font-size: 14px; font-weight: 700; color: #c0392b; margin-bottom: 6px; }
    .danger-desc { font-size: 13px; color: var(--text-sub); line-height: 1.6; margin-bottom: 12px; }
    .danger-link {
      font-size: 13px; color: #c0392b; cursor: pointer; text-decoration: underline; font-weight: 600;
    }
    .danger-panel {
      display: none; margin-top: 12px;
      background: #fdf3f2; border: 0.5px solid #f0c8c4; border-radius: 12px; padding: 1rem;
    }
    .danger-panel p { font-size: 13px; color: var(--text); margin-bottom: 10px; line-height: 1.6; }
    .danger-panel input[type="password"], .danger-panel input[type="text"] {
      width: 100%; padding: 11px 13px; border: 0.5px solid var(--border);
      border-radius: 10px; font-size: 16px; font-family: inherit; margin-bottom: 10px;
      -webkit-appearance: none; appearance: none;
    }
    .danger-panel input:focus {
      outline: none; border-color: #c0392b;
      box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.1);
    }
    .danger-actions { display: flex; gap: 10px; }
    .danger-btn {
      flex: 1; background: #c0392b; color: #fff; border: none;
      padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .danger-btn:hover { background: #a93226; }
    .danger-btn:disabled { opacity: 0.5; cursor: default; }
    .danger-cancel {
      flex: 1; background: var(--white); color: var(--text-sub); border: 0.5px solid var(--border);
      padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
    }
  </style>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#BA7517">
  <meta name="robots" content="noindex">
  <script src="api.js"></script>
  <script src="header.js"></script>
  <script src="analytics.js"></script>
</head>
<body>

  <div class="page-header">
    <a href="mypage.html" class="back-btn"><i class="ti ti-arrow-left"></i></a>
    <div class="header-title">アカウント設定</div>
  </div>

  <div class="container">
    <div id="stateBox" class="state-box">読み込み中…</div>

    <div id="content" style="display:none;">

      <!-- 登録メールアドレス -->
      <div class="section">
        <div class="section-title">登録メールアドレス</div>
        <div class="email-box" id="accountEmail">—</div>
        <div class="field-note">ログインに使うメールアドレスです。変更はできません。</div>
      </div>

      <!-- パスワードの変更 -->
      <div class="section" id="pwSection">
        <div class="section-title">パスワードの変更</div>
        <div class="form-group">
          <label>現在のパスワード</label>
          <input type="password" id="curPassword" autocomplete="current-password" placeholder="今のパスワード">
        </div>
        <div class="form-group">
          <label>新しいパスワード</label>
          <input type="password" id="newPassword" autocomplete="new-password" placeholder="8文字以上">
        </div>
        <div class="form-group">
          <label>新しいパスワード（確認）</label>
          <input type="password" id="newPassword2" autocomplete="new-password" placeholder="もう一度入力">
        </div>
        <button type="button" class="pw-change-btn" id="pwChangeBtn">パスワードを変更する</button>
      </div>

      <!-- Googleのみログインの人向けの案内（パスワードが無い場合に表示） -->
      <div class="section" id="googleOnlyNote" style="display:none;">
        <div class="section-title">パスワード</div>
        <div class="field-note">Googleログインでご利用中のため、うどログ側のパスワードはありません（パスワード変更は不要です）。</div>
      </div>

      <!-- 退会 -->
      <div class="section">
        <div class="danger-title">アカウントの削除（退会）</div>
        <div class="danger-desc">
          退会すると、あなたの記録・スタンプ・プロフィール・写真はすべて削除され、元に戻せません。
        </div>
        <a class="danger-link" id="dangerOpen">退会する</a>

        <div class="danger-panel" id="dangerPanel">
          <p id="dangerText">本当に退会しますか？確認のため、ログインパスワードを入力してください。</p>
          <input type="password" id="deletePassword" placeholder="パスワード" autocomplete="current-password">
          <div class="danger-actions">
            <button type="button" class="danger-cancel" id="dangerCancel">キャンセル</button>
            <button type="button" class="danger-btn" id="dangerConfirm">退会する</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // === パスワード変更 ===
    function setupPasswordChange() {
      const btn = document.getElementById('pwChangeBtn');
      const cur = document.getElementById('curPassword');
      const pw1 = document.getElementById('newPassword');
      const pw2 = document.getElementById('newPassword2');

      btn.addEventListener('click', async () => {
        if (!cur.value) { alert('現在のパスワードを入力してください'); return; }
        if (pw1.value.length < 8) { alert('新しいパスワードは8文字以上にしてください'); return; }
        if (pw1.value !== pw2.value) { alert('新しいパスワード（確認）が一致しません'); return; }

        btn.disabled = true;
        btn.textContent = '変更中…';
        try {
          await API.refresh();
          await API.post('password_change.php', {
            current_password: cur.value,
            new_password: pw1.value,
          });
          alert('パスワードを変更しました。');
          cur.value = ''; pw1.value = ''; pw2.value = '';
        } catch (e) {
          alert(e.message || 'パスワードの変更に失敗しました');
        } finally {
          btn.disabled = false;
          btn.textContent = 'パスワードを変更する';
        }
      });
    }

    // === 退会 ===
    function setupDelete() {
      const open = document.getElementById('dangerOpen');
      const panel = document.getElementById('dangerPanel');
      const cancel = document.getElementById('dangerCancel');
      const confirmBtn = document.getElementById('dangerConfirm');
      const pwd = document.getElementById('deletePassword');
      // パスワードを持つ人はパスワード確認、Google連携のみの人は「削除」入力で確認
      const hasPassword = !!(API.user && API.user.hasPassword);

      open.addEventListener('click', () => {
        panel.style.display = 'block';
        open.style.display = 'none';
        pwd.focus();
      });
      cancel.addEventListener('click', () => {
        panel.style.display = 'none';
        open.style.display = 'inline';
        pwd.value = '';
      });

      confirmBtn.addEventListener('click', async () => {
        if (hasPassword) {
          if (!pwd.value) { alert('パスワードを入力してください'); return; }
        } else {
          if (pwd.value.trim() !== '削除') { alert('確認のため「削除」と入力してください'); return; }
        }
        if (!confirm('本当に退会しますか？\nすべてのデータが削除され、元に戻せません。')) return;
        confirmBtn.disabled = true;
        confirmBtn.textContent = '処理中…';
        try {
          await API.refresh();
          await API.post('account_delete.php', { password: hasPassword ? pwd.value : '' });
          alert('退会が完了しました。ご利用ありがとうございました。');
          location.href = '/';
        } catch (e) {
          alert(e.message || '退会に失敗しました');
          confirmBtn.disabled = false;
          confirmBtn.textContent = '退会する';
        }
      });
    }

    // === 初期化：ログイン必須 ===
    (async function init() {
      try {
        await API.refresh();
      } catch (e) {
        document.getElementById('stateBox').textContent = 'サーバーに接続できませんでした。時間をおいて再度お試しください。';
        return;
      }
      if (!API.isLoggedIn()) {
        location.href = 'login.html?next=' + encodeURIComponent(location.pathname);
        return;
      }
      document.getElementById('accountEmail').textContent = API.user.email || '（未設定）';

      // Google連携のみ（パスワードなし）の人向けにUIを調整
      if (!API.user.hasPassword) {
        document.getElementById('pwSection').style.display = 'none';        // パスワード変更欄は隠す
        document.getElementById('googleOnlyNote').style.display = 'block';  // 代わりに案内を表示
        document.getElementById('dangerText').textContent =
          '本当に退会しますか？確認のため、下に「削除」と入力してください。';
        const pwd = document.getElementById('deletePassword');
        pwd.type = 'text';
        pwd.placeholder = '削除 と入力';
        pwd.removeAttribute('autocomplete');
      }

      setupPasswordChange();
      setupDelete();

      document.getElementById('stateBox').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    })();
  </script>

</body>
</html>
