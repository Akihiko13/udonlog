<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードの再設定 — うどんログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: #FAFAF8;
      color: #1a1a1a;
      line-height: 1.7;
      font-size: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .card {
      background: #fff;
      border: 0.5px solid #e5e5e0;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-link { text-decoration: none; color: inherit; }
    .logo-title { font-size: 22px; font-weight: 500; color: #1a1a1a; margin-bottom: 4px; }
    .logo-sub { font-size: 14px; color: #888; }

    .section-title {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .section-desc {
      font-size: 14px;
      color: #666;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .form-group { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }

    input[type="email"] {
      width: 100%;
      padding: 10px 12px;
      border: 0.5px solid #d0d0ca;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: #BA7517;
      box-shadow: 0 0 0 3px rgba(186, 117, 23, 0.1);
    }

    .btn-submit {
      width: 100%;
      background: #BA7517;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
    }

    .btn-submit:hover { background: #9A6010; }

    .back-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 14px;
    }

    .back-link a {
      color: #BA7517;
      text-decoration: none;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .back-link a:hover { text-decoration: underline; }

    /* 送信完了パネル */
    .done-panel { display: none; text-align: center; }

    .done-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.25rem;
      background: #F0FAF3;
      border: 0.5px solid #A8D9B5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: #5BAD6F;
    }

    .done-title { font-size: 18px; font-weight: 600; margin-bottom: 0.75rem; }

    .done-desc {
      font-size: 14px;
      color: #666;
      line-height: 1.7;
      margin-bottom: 0.5rem;
    }

    .done-email {
      font-weight: 600;
      color: #1a1a1a;
      word-break: break-all;
    }

    .hint {
      background: #FFF8EE;
      border: 0.5px solid #F0D9C0;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #8a6a3a;
      margin-top: 1.25rem;
      text-align: left;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- 入力フォーム -->
    <div id="formPanel">
      <h1 class="section-title">パスワードの再設定</h1>
      <p class="section-desc">
        ご登録のメールアドレスを入力してください。<br>
        パスワード再設定用のリンクをお送りします。
      </p>

      <form onsubmit="handleReset(event)">
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" placeholder="example@email.com" required>
        </div>
        <button type="submit" class="btn-submit">再設定メールを送る</button>
      </form>

      <div class="back-link">
        <a href="login.html"><i class="ti ti-arrow-left"></i> ログインにもどる</a>
      </div>
    </div>

    <!-- 送信完了 -->
    <div class="done-panel" id="donePanel">
      <div class="done-icon"><i class="ti ti-mail-check"></i></div>
      <div class="done-title">メールを送信しました</div>
      <p class="done-desc">
        <span class="done-email" id="sentEmail"></span><br>
        宛に再設定用リンクをお送りしました。<br>
        メールの案内にしたがってパスワードを再設定してください。
      </p>
      <div class="hint">
        <i class="ti ti-info-circle"></i>
        メールが届かない場合は、迷惑メールフォルダをご確認ください。数分待っても届かない場合は、メールアドレスが正しいかご確認のうえ、もう一度お試しください。
      </div>
      <div class="back-link">
        <a href="login.html"><i class="ti ti-arrow-left"></i> ログインにもどる</a>
      </div>
    </div>
  </div>

  <script>
    function handleReset(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      // ※ 実際のメール送信はサーバー（PHP）実装後に行う。現在は表示のみ。
      document.getElementById('sentEmail').textContent = email;
      document.getElementById('formPanel').style.display = 'none';
      document.getElementById('donePanel').style.display = 'block';
    }
  </script>

  <script src="header.js"></script>
</body>
</html>
