<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ — うどログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #BA7517;
      --amber-light: #FFF8EE;
      --amber-border: #F0D9C0;
      --bg: #FAFAF8;
      --white: #fff;
      --border: #e5e5e0;
      --text: #1a1a1a;
      --text-sub: #666;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 16px;
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    /* ヘッダー */
    .page-header {
      position: sticky;
      top: 54px;
      background: rgba(250,250,248,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1.25rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--white);
      border: 0.5px solid var(--border);
      color: #444;
      text-decoration: none;
      font-size: 18px;
      flex-shrink: 0;
    }

    .back-btn:hover { background: #f5f5f0; }

    .header-title { font-size: 16px; font-weight: 500; }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem;
    }

    /* プロフィール */
    .profile {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .profile-avatar {
      width: 64px;
      height: 64px;
      background: var(--amber);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      flex-shrink: 0;
    }

    .profile-name { font-size: 20px; font-weight: 700; }
    .profile-sub { font-size: 13px; color: var(--text-sub); }

    /* うどんアイコン画像 */
    .profile-avatar img,
    .visited-icon img { width: 80%; height: 80%; object-fit: contain; }
    .udon-inline {
      width: 1.2em; height: 1.2em;
      object-fit: contain;
      vertical-align: -0.25em;
    }
    .stamp-icon img { width: 40px; height: 40px; object-fit: contain; vertical-align: middle; }
    .slot.filled img { width: 26px; height: 26px; object-fit: contain; }

    /* うどんアイコンを Tabler アイコン(ti-bowl-chopsticks)で表示する場合のスタイル */
    .udon-i { font-size: 1.05em; vertical-align: -0.08em; line-height: 1; }
    .profile-avatar i { color: #fff; font-size: 34px; line-height: 1; }
    .visited-icon i { color: var(--amber); font-size: 20px; line-height: 1; }
    .slot.filled i { color: var(--amber); font-size: 22px; line-height: 1; }

    /* うどん杯数パネル */
    .bowl-panel {
      background: linear-gradient(135deg, #BA7517 0%, #D89030 100%);
      border-radius: 16px;
      padding: 1.25rem 1.25rem 1.4rem;
      margin-bottom: 1rem;
      color: #fff;
    }

    .bowl-panel-title {
      font-size: 13px;
      font-weight: 600;
      opacity: 0.95;
      margin-bottom: 0.9rem;
    }

    .bowl-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .bowl-item {
      text-align: center;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 0.75rem 0.25rem;
    }

    .bowl-num {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.1;
    }

    .bowl-label {
      font-size: 11px;
      opacity: 0.9;
      margin-top: 2px;
    }

    /* 統計バー */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      text-align: center;
    }

    .stat-num {
      font-size: 28px;
      font-weight: 700;
      color: var(--amber);
      line-height: 1.2;
    }

    .stat-label { font-size: 12px; color: var(--text-sub); }

    /* 全店舗の制覇率パネル */
    .conquer-panel {
      background: var(--white);
      border: 0.5px solid var(--amber-border);
      border-radius: 16px;
      padding: 1.1rem 1.25rem 1.25rem;
      margin-bottom: 1rem;
    }

    .conquer-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .conquer-title { font-size: 14px; font-weight: 700; }

    .conquer-frac { font-size: 14px; color: var(--text-sub); }

    .conquer-frac b {
      font-size: 24px;
      font-weight: 800;
      color: var(--amber);
    }

    .conquer-track {
      height: 12px;
      background: #ece8e0;
      border-radius: 99px;
      overflow: hidden;
    }

    .conquer-fill {
      height: 100%;
      background: linear-gradient(90deg, #BA7517 0%, #D89030 100%);
      border-radius: 99px;
      transition: width 0.5s;
    }

    .conquer-pct {
      text-align: right;
      font-size: 12px;
      font-weight: 700;
      color: var(--amber);
      margin-top: 6px;
    }

    /* セクションタイトル */
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 17px;
      font-weight: 700;
    }

    .section-count {
      font-size: 13px;
      color: var(--text-sub);
    }

    /* スタンプ帳（1軒=1スタンプ） */
    .stamp-book {
      background: linear-gradient(160deg, #FFFDF8 0%, #FBF3E6 100%);
      border: 0.5px solid var(--amber-border);
      border-radius: 16px;
      padding: 1.5rem 1.25rem;
      margin-bottom: 2rem;
    }

    .book-card {
      margin-bottom: 1.5rem;
    }

    .book-card:last-child { margin-bottom: 0; }

    .book-card-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 600;
      color: var(--amber);
      margin-bottom: 10px;
    }

    .book-card-label .complete-tag {
      background: var(--amber);
      color: #fff;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 99px;
    }

    .stamp-slots {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .slot {
      aspect-ratio: 1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      position: relative;
    }

    .slot.empty {
      border: 2px dashed #d8cdb8;
      color: #d8cdb8;
      font-size: 13px;
      font-weight: 600;
    }

    .slot.filled {
      background: var(--white);
      border: 2px solid var(--amber);
      box-shadow: 0 1px 4px rgba(186,117,23,0.15);
      animation: stampPop 0.3s ease;
    }

    @keyframes stampPop {
      0% { transform: scale(0); }
      70% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .slot .slot-num {
      position: absolute;
      bottom: -2px;
      right: -2px;
      background: var(--amber);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .book-empty {
      text-align: center;
      color: #b0a690;
      font-size: 14px;
      padding: 1rem 0;
    }

    /* スタンプカードグリッド */
    .stamp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 2rem;
    }

    .stamp-card {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s;
    }

    .stamp-card.earned {
      border-color: var(--amber-border);
      background: linear-gradient(160deg, #FFFDF8 0%, #FFF4E4 100%);
    }

    .stamp-card.earned::after {
      content: '✓ 獲得';
      position: absolute;
      top: 10px;
      right: -28px;
      background: var(--amber);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 30px;
      transform: rotate(45deg);
    }

    .stamp-card.locked { opacity: 0.55; }

    .stamp-icon {
      font-size: 40px;
      margin-bottom: 8px;
      line-height: 1;
      filter: grayscale(0);
    }

    .stamp-card.locked .stamp-icon { filter: grayscale(1); opacity: 0.6; }

    .stamp-name {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .stamp-desc {
      font-size: 11px;
      color: var(--text-sub);
      line-height: 1.4;
      margin-bottom: 10px;
      min-height: 30px;
    }

    /* 進捗バー */
    .progress-track {
      height: 6px;
      background: #ece8e0;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .progress-fill {
      height: 100%;
      background: var(--amber);
      border-radius: 99px;
      transition: width 0.4s;
    }

    .progress-text { font-size: 11px; color: #aaa; }

    .stamp-card.earned .progress-text {
      color: var(--amber);
      font-weight: 600;
    }

    /* エリア制覇バッジ */
    .area-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 2rem;
    }

    .area-card {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 1rem 1.1rem 1.1rem;
    }

    .area-card.complete {
      border-color: var(--amber-border);
      background: linear-gradient(160deg, #FFFDF8 0%, #FFF4E4 100%);
    }

    .area-card-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .area-name { font-size: 15px; font-weight: 700; }

    .area-name .crown { font-size: 13px; margin-left: 4px; }

    .area-count { font-size: 12px; color: var(--text-sub); }

    .area-pct {
      font-size: 12px;
      font-weight: 700;
      color: var(--amber);
      margin-bottom: 8px;
    }

    .area-tiers {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .tier-dot {
      flex: 1;
      aspect-ratio: 1;
      max-width: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      border: 1.5px dashed #d8cdb8;
      color: #c2b69c;
      background: #faf8f4;
    }

    .tier-dot.on {
      border: 1.5px solid var(--amber);
      background: var(--amber);
      color: #fff;
      box-shadow: 0 1px 4px rgba(186,117,23,0.2);
    }

    /* 空状態 */
    .empty-note {
      background: var(--amber-light);
      border: 0.5px solid var(--amber-border);
      border-radius: 12px;
      padding: 1.25rem;
      text-align: center;
      font-size: 14px;
      color: var(--text-sub);
      margin-bottom: 1.5rem;
    }

    .empty-note a {
      color: var(--amber);
      font-weight: 600;
      text-decoration: none;
    }

    /* CTAボタン */
    .btn-go-shops {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--amber);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
    }

    .btn-go-shops:hover { background: #9A6010; }

    /* 訪問店舗リスト */
    .visited-list { margin-bottom: 2rem; }

    .visited-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      text-decoration: none;
      color: inherit;
    }

    .visited-item:hover { background: #faf8f4; }

    .visited-icon {
      width: 40px;
      height: 40px;
      background: var(--amber-light);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .visited-name { font-size: 15px; font-weight: 600; }
    .visited-meta { font-size: 12px; color: var(--text-sub); }
    .visited-arrow { margin-left: auto; color: #ccc; font-size: 18px; }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <div class="page-header">
    <a href="index.html" class="back-btn"><i class="ti ti-arrow-left"></i></a>
    <div class="header-title">マイページ</div>
  </div>

  <div class="container">

    <!-- プロフィール -->
    <div class="profile">
      <div class="profile-avatar"><i class="ti ti-bowl-chopsticks"></i></div>
      <div>
        <div class="profile-name">うどん好きさん</div>
        <div class="profile-sub">香川のさぬきうどんを記録中</div>
      </div>
    </div>

    <!-- うどん杯数（期間集計） -->
    <div class="bowl-panel">
      <div class="bowl-panel-title"><i class="ti ti-bowl-chopsticks udon-i"></i> 食べたうどん</div>
      <div class="bowl-grid">
        <div class="bowl-item">
          <div class="bowl-num" id="cntWeek">0</div>
          <div class="bowl-label">今週</div>
        </div>
        <div class="bowl-item">
          <div class="bowl-num" id="cntMonth">0</div>
          <div class="bowl-label">今月</div>
        </div>
        <div class="bowl-item">
          <div class="bowl-num" id="cntYear">0</div>
          <div class="bowl-label">今年</div>
        </div>
        <div class="bowl-item">
          <div class="bowl-num" id="cntTotal">0</div>
          <div class="bowl-label">これまで</div>
        </div>
      </div>
    </div>

    <!-- 全店舗の制覇率 -->
    <div class="conquer-panel">
      <div class="conquer-head">
        <span class="conquer-title"><i class="ti ti-bowl-chopsticks udon-i"></i> 香川のうどん屋 制覇</span>
        <span class="conquer-frac"><b id="conqVisited">0</b> / <span id="conqTotal">0</span>軒</span>
      </div>
      <div class="conquer-track"><div class="conquer-fill" id="conqFill" style="width:0%"></div></div>
      <div class="conquer-pct" id="conqPct">0%</div>
    </div>

    <!-- 統計 -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-num" id="statVisited">0</div>
        <div class="stat-label">記録した店</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statStamps">0</div>
        <div class="stat-label">獲得バッジ</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statAreas">0</div>
        <div class="stat-label">制覇エリア</div>
      </div>
    </div>

    <!-- スタンプ帳（1軒=1スタンプ） -->
    <div class="section-head">
      <div class="section-title">📖 スタンプ帳</div>
      <div class="section-count" id="bookCount">0個</div>
    </div>
    <div class="stamp-book" id="stampBook"></div>

    <!-- 達成バッジ -->
    <div class="section-head">
      <div class="section-title">🏅 達成バッジ</div>
      <div class="section-count" id="stampCount">0 / 0 獲得</div>
    </div>

    <div id="emptyNote" class="empty-note" style="display:none;">
      まだ記録がありません。<br>
      <a href="shops.html">お店一覧</a>から「食べた！」を記録してスタンプを集めよう！
    </div>

    <div class="stamp-grid" id="stampGrid"></div>

    <!-- エリア制覇バッジ -->
    <div class="section-head">
      <div class="section-title">🗺️ エリア制覇バッジ</div>
      <div class="section-count" id="areaBadgeCount">0個 獲得</div>
    </div>
    <div class="area-grid" id="areaGrid"></div>

    <!-- 訪問した店舗 -->
    <div class="section-head">
      <div class="section-title"><i class="ti ti-bowl-chopsticks udon-i"></i> 記録したお店</div>
      <div class="section-count" id="visitedCount">0軒</div>
    </div>
    <div class="visited-list" id="visitedList"></div>

    <a href="shops.html" class="btn-go-shops">
      <i class="ti ti-plus"></i> お店を記録する
    </a>

  </div>

  <script src="shops-data.js"></script>
  <script>

    // === スタンプカード定義 ===
    // 各スタンプは「条件を満たした店舗数 / 目標数」で進捗を判定する。
    // check(visitedShops) は { current, goal } を返す。
    // この定義部分はB（会員DB版）でもそのまま再利用できる。
    // 営業中の店舗から「総数」を算出（バッジ目標を店舗数に合わせて自動調整する）
    const isOpenShop = s => s.status !== '閉店';
    const TOTAL_SHOPS  = SHOPS.filter(isOpenShop).length;
    const TOTAL_CITIES = new Set(SHOPS.filter(isOpenShop).map(s => s.city)).size;

    // 軒数マイルストーン用ヘルパー（v=記録したユニーク店舗）
    const countBadge = (v, goal) => ({ current: Math.min(v.length, goal), goal });
    const typeBadge2 = (v, type, goal) => {
      const c = v.filter(s => s.type === type).length;
      return { current: Math.min(c, goal), goal };
    };

    // 難易度は将来の500店規模を想定して設定。100軒以上は店舗が増えるほど現実的になる。
    const STAMPS = [
      {
        id: 'beginner', icon: '🥢', name: 'うどんビギナー',
        desc: '初めてのうどんを記録',
        check: (v) => countBadge(v, 1),
      },
      {
        id: 'm10', icon: '🍜', name: 'うどん10軒',
        desc: '10軒のお店を記録',
        check: (v) => countBadge(v, 10),
      },
      {
        id: 'm30', icon: '🥉', name: 'うどん30軒',
        desc: '30軒のお店を記録',
        check: (v) => countBadge(v, 30),
      },
      {
        id: 'm50', icon: '🥈', name: 'うどん50軒',
        desc: '50軒のお店を記録',
        check: (v) => countBadge(v, 50),
      },
      {
        id: 'm100', icon: '🥇', name: 'うどん100軒',
        desc: '100軒のお店を記録',
        check: (v) => countBadge(v, 100),
      },
      {
        id: 'm200', icon: '🔥', name: 'うどん200軒',
        desc: '200軒のお店を記録',
        check: (v) => countBadge(v, 200),
      },
      {
        id: 'seimenjo', icon: '🏭', name: '製麺所ハンター',
        desc: '製麺所スタイルを15軒記録',
        check: (v) => typeBadge2(v, '製麺所', 15),
      },
      {
        id: 'self', icon: '🥡', name: 'セルフの達人',
        desc: 'セルフ式を15軒記録',
        check: (v) => typeBadge2(v, 'セルフ', 15),
      },
      {
        id: 'allarea', icon: '🗺️', name: '全エリア制覇',
        desc: `${TOTAL_CITIES}の市町すべてで記録`,
        check: (v) => {
          const cities = new Set(v.filter(isOpenShop).map(s => s.city));
          return { current: Math.min(cities.size, TOTAL_CITIES), goal: TOTAL_CITIES };
        },
      },
      {
        id: 'king', icon: '👑', name: 'さぬきうどん王',
        desc: `全${TOTAL_SHOPS}軒を制覇`,
        check: (v) => {
          const c = v.filter(isOpenShop).length;
          return { current: Math.min(c, TOTAL_SHOPS), goal: TOTAL_SHOPS };
        },
      },
    ];

    // === localStorageから訪問ログを読み込む（B版ではここをDB取得に差し替える）===
    // logs = 訪問1回ごとのエントリ配列。同じ店の複数回記録もそれぞれ1件。
    function loadLogs() {
      let logs = JSON.parse(localStorage.getItem('logs') || '[]');

      // 旧データ（logs導入前にvisitedだけで記録していた分）を1回だけ移行する
      if (logs.length === 0) {
        const oldIds = JSON.parse(localStorage.getItem('visited') || '[]');
        if (oldIds.length > 0) {
          const oldRecords = JSON.parse(localStorage.getItem('records') || '{}');
          logs = oldIds.map(id => {
            const shop = SHOPS.find(s => s.id === id);
            const r = oldRecords[id] || {};
            return shop ? {
              logId: id,
              shopId: id,
              name: shop.name, city: shop.city, type: shop.type,
              menu: r.menu || '', rating: r.rating || 0, comment: r.comment || '',
              visitDate: r.visitDate || '', savedAt: r.savedAt || '',
            } : null;
          }).filter(Boolean);
          localStorage.setItem('logs', JSON.stringify(logs));
        }
      }
      return logs;
    }

    // ログ → 店舗マスタを補完（cityやtypeが欠けていてもSHOPSから引く）
    function shopOf(log) {
      return SHOPS.find(s => s.id === log.shopId) || log;
    }

    // === 期間ごとの杯数を集計 ===
    function countByPeriod(logs) {
      const now = new Date();
      const startOfDay = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());
      // 今週（月曜始まり）
      const dow = (now.getDay() + 6) % 7;          // 月=0 ... 日=6
      const weekStart = startOfDay(new Date(now)); weekStart.setDate(weekStart.getDate() - dow);
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
      const yearStart  = new Date(now.getFullYear(), 0, 1);

      let week = 0, month = 0, year = 0;
      logs.forEach(l => {
        if (!l.visitDate) return;
        const d = new Date(l.visitDate);
        if (isNaN(d)) return;
        if (d >= yearStart)  year++;
        if (d >= monthStart) month++;
        if (d >= weekStart)  week++;
      });
      return { week, month, year, total: logs.length };
    }

    // 1枚のスタンプカードあたりのマス数
    const SLOTS_PER_CARD = 10;

    // スタンプ帳を描画（記録した順に1杯=1スタンプ）
    function renderBook(logs) {
      const total = logs.length;
      document.getElementById('bookCount').textContent = `${total}個`;
      const book = document.getElementById('stampBook');

      if (total === 0) {
        book.innerHTML = '<div class="book-empty">うどんを記録すると、ここにスタンプが1杯ごとに押されます <i class="ti ti-bowl-chopsticks udon-i"></i></div>';
        return;
      }

      const cardCount = Math.floor(total / SLOTS_PER_CARD) + (total % SLOTS_PER_CARD === 0 ? 0 : 1);
      let html = '';

      for (let c = 0; c < cardCount; c++) {
        const startNum = c * SLOTS_PER_CARD;
        const filledInCard = Math.min(total - startNum, SLOTS_PER_CARD);
        const isComplete = filledInCard === SLOTS_PER_CARD;

        let slots = '';
        for (let i = 0; i < SLOTS_PER_CARD; i++) {
          const stampIndex = startNum + i;
          if (stampIndex < total) {
            const log = logs[stampIndex];
            const shop = shopOf(log);
            slots += `
              <div class="slot filled" title="${shop.name}（${shop.city}）">
                <i class="ti ti-bowl-chopsticks"></i><span class="slot-num">${stampIndex + 1}</span>
              </div>`;
          } else {
            slots += `<div class="slot empty">${stampIndex + 1}</div>`;
          }
        }

        html += `
          <div class="book-card">
            <div class="book-card-label">
              <span>カード ${c + 1}（${filledInCard} / ${SLOTS_PER_CARD}）</span>
              ${isComplete ? '<span class="complete-tag">✓ コンプリート</span>' : ''}
            </div>
            <div class="stamp-slots">${slots}</div>
          </div>`;
      }

      book.innerHTML = html;
    }

    // === エリア制覇バッジ ===
    // 各エリア（市町）の店舗のうち、何%を記録したかで段階バッジを点灯する。
    const AREA_TIERS = [20, 40, 60, 80, 100];

    function renderAreaBadges(uniqueShops) {
      // 閉店した店は分母・分子の両方から除外する（達成率の母数は「営業中の店」）
      const isOpen = s => s.status !== '閉店';

      // SHOPSから「エリアごとの営業中の総店舗数」を集計（登場順を保持）
      const totalByCity = {};
      const order = [];
      SHOPS.filter(isOpen).forEach(s => {
        if (!(s.city in totalByCity)) { totalByCity[s.city] = 0; order.push(s.city); }
        totalByCity[s.city]++;
      });

      // 記録済みのユニーク店舗（営業中のみ）をエリアごとに集計
      const visitedByCity = {};
      uniqueShops.filter(isOpen).forEach(s => {
        visitedByCity[s.city] = (visitedByCity[s.city] || 0) + 1;
      });

      // エリアごとのデータを作成
      const areas = order.map(city => {
        const total = totalByCity[city];
        const visited = visitedByCity[city] || 0;
        const ratio = visited / total;                 // 0〜1
        const tiersOn = AREA_TIERS.filter(t => ratio >= t / 100 - 1e-9).length;
        return { city, total, visited, ratio, tiersOn };
      });

      // 達成率が高い順、同率なら店舗数が多い順に並べる
      areas.sort((a, b) => (b.ratio - a.ratio) || (b.total - a.total));

      // 獲得バッジ総数（全エリアの点灯段階の合計）
      const earnedBadges = areas.reduce((sum, a) => sum + a.tiersOn, 0);
      document.getElementById('areaBadgeCount').textContent = `${earnedBadges}個 獲得`;

      document.getElementById('areaGrid').innerHTML = areas.map(a => {
        const pct = Math.round(a.ratio * 100);
        const complete = a.ratio >= 1;
        const dots = AREA_TIERS.map(t =>
          `<div class="tier-dot ${a.ratio >= t / 100 - 1e-9 ? 'on' : ''}">${t}%</div>`
        ).join('');
        return `
          <div class="area-card ${complete ? 'complete' : ''}">
            <div class="area-card-head">
              <div class="area-name">${a.city}${complete ? '<span class="crown">👑</span>' : ''}</div>
              <div class="area-count">${a.visited} / ${a.total}軒</div>
            </div>
            <div class="area-pct">達成率 ${pct}%</div>
            <div class="progress-track">
              <div class="progress-fill" style="width:${pct}%"></div>
            </div>
            <div class="area-tiers">${dots}</div>
          </div>`;
      }).join('');
    }

    function render() {
      const logs = loadLogs();

      // ユニークな訪問店舗（バッジ・店舗一覧で使用）
      const uniqueShops = [...new Map(logs.map(l => [l.shopId, shopOf(l)])).values()];
      const cities = new Set(uniqueShops.map(s => s.city));

      // 期間ごとの杯数
      const period = countByPeriod(logs);
      document.getElementById('cntWeek').textContent  = period.week;
      document.getElementById('cntMonth').textContent = period.month;
      document.getElementById('cntYear').textContent  = period.year;
      document.getElementById('cntTotal').textContent = period.total;

      // 全店舗の制覇率（営業中の店が母数。閉店した店は除外）
      const openShops = SHOPS.filter(s => s.status !== '閉店');
      const totalShops = openShops.length;
      const visitedOpen = uniqueShops.filter(s => s.status !== '閉店').length;
      const conqPct = totalShops ? Math.round((visitedOpen / totalShops) * 100) : 0;
      document.getElementById('conqVisited').textContent = visitedOpen;
      document.getElementById('conqTotal').textContent = totalShops;
      document.getElementById('conqFill').style.width = conqPct + '%';
      document.getElementById('conqPct').textContent = conqPct + '%';

      // 統計（上段カード）
      document.getElementById('statVisited').textContent = uniqueShops.length;
      document.getElementById('statAreas').textContent = cities.size;

      // スタンプ帳（1杯=1スタンプ）
      renderBook(logs);

      // 達成バッジ判定（ユニーク店舗ベース）
      let earnedCount = 0;
      const grid = document.getElementById('stampGrid');
      grid.innerHTML = STAMPS.map(stamp => {
        const { current, goal } = stamp.check(uniqueShops);
        const earned = current >= goal;
        if (earned) earnedCount++;
        const pct = Math.round((current / goal) * 100);
        return `
          <div class="stamp-card ${earned ? 'earned' : 'locked'}">
            <div class="stamp-icon">${stamp.icon}</div>
            <div class="stamp-name">${stamp.name}</div>
            <div class="stamp-desc">${stamp.desc}</div>
            <div class="progress-track">
              <div class="progress-fill" style="width:${pct}%"></div>
            </div>
            <div class="progress-text">${earned ? '達成！' : `${current} / ${goal}`}</div>
          </div>
        `;
      }).join('');

      document.getElementById('statStamps').textContent = earnedCount;
      document.getElementById('stampCount').textContent = `${earnedCount} / ${STAMPS.length} 獲得`;

      // エリア制覇バッジ
      renderAreaBadges(uniqueShops);

      // 空状態
      document.getElementById('emptyNote').style.display = logs.length === 0 ? 'block' : 'none';

      // 訪問店舗リスト（同じ店は訪問回数をまとめて表示）
      const countByShop = {};
      logs.forEach(l => { countByShop[l.shopId] = (countByShop[l.shopId] || 0) + 1; });

      document.getElementById('visitedCount').textContent = `${uniqueShops.length}軒 / ${logs.length}杯`;
      const list = document.getElementById('visitedList');
      if (uniqueShops.length === 0) {
        list.innerHTML = '<p style="color:#aaa;font-size:14px;text-align:center;padding:1rem;">まだ記録がありません</p>';
      } else {
        list.innerHTML = uniqueShops.map(s => `
          <a href="shop-detail.html?id=${s.id}" class="visited-item">
            <div class="visited-icon"><i class="ti ti-bowl-chopsticks"></i></div>
            <div>
              <div class="visited-name">${s.name}</div>
              <div class="visited-meta">${s.city} ・ ${s.type}</div>
            </div>
            <span style="margin-left:auto;font-size:13px;font-weight:700;color:var(--amber);">${countByShop[s.id]}杯</span>
            <i class="ti ti-chevron-right visited-arrow" style="margin-left:8px;"></i>
          </a>
        `).join('');
      }
    }

    render();
  </script>

  <script src="header.js"></script>
</body>
</html>
