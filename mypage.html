<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ — うどログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #BA7517;
      --amber-dark: #8A5510;
      --amber-darker: #6F440C;
      --amber-light: #FFF8EE;
      --amber-border: #F0D9C0;
      --bg: #FAFAF8;
      --white: #fff;
      --border: #e5e5e0;
      --text: #1a1a1a;
      --text-sub: #666;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 16px;
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    /* ヘッダー */
    .page-header {
      position: sticky;
      top: 54px;
      background: rgba(250,250,248,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1.25rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--white);
      border: 0.5px solid var(--border);
      color: #444;
      text-decoration: none;
      font-size: 18px;
      flex-shrink: 0;
    }

    .back-btn:hover { background: #f5f5f0; }

    .header-title { font-size: 16px; font-weight: 500; }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem;
    }

    /* プロフィール */
    .profile {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .profile-avatar {
      width: 64px;
      height: 64px;
      background: var(--amber);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      flex-shrink: 0;
    }

    .profile-name { font-size: 20px; font-weight: 700; }
    .profile-sub { font-size: 13px; color: var(--text-sub); }

    /* プロフィール写真（表示のみ。編集はプロフィール編集ページで） */
    .profile-avatar { overflow: hidden; }
    .profile-avatar img.avatar-img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block;
    }
    /* 自己紹介文 */
    .profile-bio {
      font-size: 13px; color: var(--text); margin-top: 6px; line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
    }
    /* プロフィール下のリンク */
    .profile-links { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 8px; }
    /* フォロワー・フォロー中（一覧への入口） */
    .profile-stats { display: flex; gap: 18px; margin-top: 6px; font-size: 13px; color: var(--text-sub); }
    .profile-stats a { text-decoration: none; color: inherit; white-space: nowrap; }
    .profile-stats a:hover { text-decoration: underline; }
    .profile-stats b { color: var(--text); font-weight: 700; }
    .profile-links a { font-size: 12px; font-weight: 600; text-decoration: none; color: var(--amber-dark); }
    .profile-links a:hover { text-decoration: underline; }

    /* 推しのうどん屋 */
    .fav-list { display: grid; gap: 10px; }
    .fav-card {
      display: flex; align-items: center; gap: 12px;
      background: linear-gradient(160deg, #FFFDF8 0%, #FFF4E4 100%);
      border: 0.5px solid var(--amber-border); border-radius: 14px;
      padding: 12px 14px; text-decoration: none; color: inherit;
    }
    .fav-card:hover { background: #FFF0DC; }
    .fav-rank {
      width: 28px; height: 28px; flex-shrink: 0; border-radius: 50%;
      background: var(--amber); color: #fff; font-size: 14px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .fav-name { font-size: 15px; font-weight: 700; }
    .fav-meta { font-size: 12px; color: var(--text-sub); }

    /* うどんアイコン画像 */
    .visited-icon img { width: 80%; height: 80%; object-fit: contain; }
    .udon-inline {
      width: 1.2em; height: 1.2em;
      object-fit: contain;
      vertical-align: -0.25em;
    }
    .stamp-icon img { width: 40px; height: 40px; object-fit: contain; vertical-align: middle; }
    .slot.filled img { width: 26px; height: 26px; object-fit: contain; }

    /* うどんアイコンを Tabler アイコン(ti-bowl-chopsticks)で表示する場合のスタイル */
    .udon-i { font-size: 1.05em; vertical-align: -0.08em; line-height: 1; }
    .profile-avatar i { color: #fff; font-size: 34px; line-height: 1; }
    .visited-icon i { color: var(--amber); font-size: 20px; line-height: 1; }
    .slot.filled i { color: var(--amber); font-size: 22px; line-height: 1; }

    /* うどん杯数パネル */
    .bowl-panel {
      background: linear-gradient(135deg, #BA7517 0%, #D89030 100%);
      border-radius: 16px;
      padding: 1.25rem 1.25rem 1.4rem;
      margin-bottom: 1rem;
      color: #fff;
    }

    .bowl-panel-title {
      font-size: 13px;
      font-weight: 600;
      opacity: 0.95;
      margin-bottom: 0.9rem;
    }

    .bowl-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .bowl-item {
      text-align: center;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 0.75rem 0.25rem;
    }

    .bowl-num {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.1;
    }

    .bowl-label {
      font-size: 11px;
      opacity: 0.9;
      margin-top: 2px;
    }

    /* 統計バー */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      text-align: center;
    }

    .stat-num {
      font-size: 28px;
      font-weight: 700;
      color: var(--amber);
      line-height: 1.2;
    }

    .stat-label { font-size: 12px; color: var(--text-sub); }

    /* 全店舗の制覇率パネル */
    .conquer-panel {
      background: var(--white);
      border: 0.5px solid var(--amber-border);
      border-radius: 16px;
      padding: 1.1rem 1.25rem 1.25rem;
      margin-bottom: 1rem;
    }

    .conquer-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .conquer-title { font-size: 14px; font-weight: 700; }

    .conquer-frac { font-size: 14px; color: var(--text-sub); }

    .conquer-frac b {
      font-size: 24px;
      font-weight: 800;
      color: var(--amber);
    }

    .conquer-track {
      height: 12px;
      background: #ece8e0;
      border-radius: 99px;
      overflow: hidden;
      position: relative;
    }

    /* 10%ごとの目盛り線（バーの上に薄く重ねる） */
    .conquer-track::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: repeating-linear-gradient(
        to right,
        transparent 0,
        transparent calc(10% - 1px),
        rgba(255,255,255,0.65) calc(10% - 1px),
        rgba(255,255,255,0.65) 10%
      );
    }

    /* 目盛りの数字（0〜100%） */
    .conquer-scale {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #b0a690;
      margin-top: 4px;
    }

    .conquer-fill {
      height: 100%;
      background: linear-gradient(90deg, #BA7517 0%, #D89030 100%);
      border-radius: 99px;
      transition: width 0.5s;
    }

    .conquer-pct {
      text-align: right;
      font-size: 12px;
      font-weight: 700;
      color: var(--amber);
      margin-top: 6px;
    }

    /* セクションタイトル */
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 17px;
      font-weight: 700;
    }

    .section-count {
      font-size: 13px;
      color: var(--text-sub);
    }

    /* スタンプ帳（1軒=1スタンプ） */
    .stamp-book {
      padding: 1.5rem 0;
      margin-bottom: 2rem;
    }

    .book-card {
      margin-bottom: 1.5rem;
      background: #fff;
      border: 0.5px solid var(--amber-border);
      border-radius: 12px;
      padding: 14px 12px;
    }

    .book-card:last-child { margin-bottom: 0; }

    .book-card-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 600;
      color: var(--amber);
      margin-bottom: 10px;
      padding-left: 10px;
    }

    .book-card-label .complete-tag {
      background: var(--amber);
      color: #fff;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 99px;
    }

    .stamp-slots {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .slot {
      aspect-ratio: 1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      position: relative;
    }

    .slot.empty {
      border: 2px dashed #d8cdb8;
      color: #d8cdb8;
      font-size: 13px;
      font-weight: 600;
    }

    .slot.filled {
      background: var(--white);
      border: 2px solid var(--amber);
      box-shadow: 0 1px 4px rgba(186,117,23,0.15);
      animation: stampPop 0.3s ease;
    }

    @keyframes stampPop {
      0% { transform: scale(0); }
      70% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .slot .slot-num {
      position: absolute;
      bottom: -2px;
      right: -2px;
      background: var(--amber);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .book-empty {
      text-align: center;
      color: #b0a690;
      font-size: 14px;
      padding: 1rem 0;
    }

    /* 古いカードの折りたたみ */
    .book-older { margin-top: 14px; display: grid; gap: 10px; }
    .book-card-collapsed { border-top: 0.5px dashed var(--amber-border); padding-top: 12px; }
    .book-card-toggle {
      width: 100%; background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 13px; font-weight: 600; color: var(--amber); padding: 2px 0; font-family: inherit;
    }
    .book-card-toggle-right { display: flex; align-items: center; gap: 8px; }
    .book-chevron { font-size: 16px; transition: transform 0.15s; }

    /* 横スクロール（古い冊・案2ハイブリッド） */
    .book-current-head {
      font-size: 13px; font-weight: 600; color: var(--amber);
      margin-bottom: 8px;
    }
    .book-older-head {
      margin-top: 20px; padding-top: 14px;
      border-top: 0.5px dashed var(--amber-border);
      font-size: 13px; font-weight: 600; color: var(--amber);
      margin-bottom: 8px;
    }
    .book-nav {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-bottom: 10px;
    }
    .book-counter {
      font-size: 12px; font-weight: 600; color: var(--text-sub);
      min-width: 130px; text-align: center;
    }
    .book-nav-btn {
      width: 30px; height: 30px; flex: none; border-radius: 50%;
      border: 0.5px solid var(--amber-border); background: #fff;
      color: var(--amber); font-size: 18px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit; padding: 0; transition: opacity 0.15s;
    }
    .book-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .book-carousel {
      display: flex; gap: 12px; overflow-x: auto;
      scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
      padding: 0 4px 8px; scrollbar-width: none;
    }
    .book-carousel::-webkit-scrollbar { display: none; }
    .book-slide {
      flex: 0 0 86%; scroll-snap-align: center;
      background: #fff; border: 0.5px solid var(--amber-border);
      border-radius: 12px; padding: 14px 12px;
    }

    /* スタンプ（丸＋店名＋日付。横5個×2列） */
    .stamp-list { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px 4px; }
    .stamp-cell { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .stamp-cell .slot { width: 42px; height: 42px; aspect-ratio: auto; }
    .stamp-cap { margin-top: 5px; width: 100%; min-width: 0; }
    .stamp-cap-shop {
      font-size: 10px; font-weight: 600; line-height: 1.25; word-break: break-word;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .stamp-cap-date { font-size: 9px; color: var(--text-sub); margin-top: 1px; }

    /* スタンプの店名ポップアップ */
    .slot.filled { cursor: pointer; }
    .stamp-info {
      position: fixed; left: 50%; top: 72px; transform: translateX(-50%) translateY(-8px);
      background: #1a1a1a; color: #fff; padding: 10px 16px; border-radius: 10px;
      font-size: 13px; text-align: center; z-index: 1000; max-width: 80vw;
      opacity: 0; pointer-events: none; transition: opacity 0.15s, transform 0.15s;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }
    .stamp-info.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
    .stamp-info-name { font-weight: 700; }
    .stamp-info-meta { font-size: 11px; opacity: 0.85; margin-top: 2px; }

    /* スタンプカードグリッド */
    /* 達成バッジ：カテゴリごとのセクション */
    .stamp-group { margin-bottom: 1.5rem; }
    .stamp-group:last-child { margin-bottom: 2rem; }
    .stamp-group-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-sub);
      margin: 0 0 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stamp-group-title .grp-count { color: var(--text-muted); font-weight: 600; }

    .stamp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 10px;
    }

    .stamp-card {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 0.9rem 0.6rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s;
    }

    .stamp-card.earned {
      border-color: var(--amber-border);
      background: linear-gradient(160deg, #FFFDF8 0%, #FFF4E4 100%);
    }

    .stamp-card.earned::after {
      content: '✓ 獲得';
      position: absolute;
      top: 10px;
      right: -28px;
      background: var(--amber);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 30px;
      transform: rotate(45deg);
    }

    .stamp-card.locked { opacity: 0.55; }

    .stamp-icon {
      font-size: 32px;
      margin-bottom: 6px;
      line-height: 1;
      filter: grayscale(0);
    }

    .stamp-card.locked .stamp-icon { filter: grayscale(1); opacity: 0.6; }

    .stamp-name {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .stamp-desc {
      font-size: 11px;
      color: var(--text-sub);
      line-height: 1.4;
      margin-bottom: 10px;
      min-height: 30px;
    }

    /* 進捗バー */
    .progress-track {
      height: 6px;
      background: #ece8e0;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .progress-fill {
      height: 100%;
      background: var(--amber);
      border-radius: 99px;
      transition: width 0.4s;
    }

    .progress-text { font-size: 11px; color: #888; }

    .stamp-card.earned .progress-text {
      color: var(--amber);
      font-weight: 600;
    }

    /* エリア制覇バッジ */
    .area-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 2rem;
    }

    .area-card {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 1rem 1.1rem 1.1rem;
    }

    .area-card.complete {
      border-color: var(--amber-border);
      background: linear-gradient(160deg, #FFFDF8 0%, #FFF4E4 100%);
    }

    .area-card-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .area-name { font-size: 15px; font-weight: 700; }

    .area-name .crown { font-size: 13px; margin-left: 4px; }

    .area-count { font-size: 12px; color: var(--text-sub); }

    .area-pct {
      font-size: 12px;
      font-weight: 700;
      color: var(--amber);
      margin-bottom: 8px;
    }

    .area-tiers {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .tier-dot {
      flex: 1;
      aspect-ratio: 1;
      max-width: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      border: 1.5px dashed #d8cdb8;
      color: #c2b69c;
      background: #faf8f4;
    }

    .tier-dot.on {
      border: 1.5px solid var(--amber);
      background: var(--amber);
      color: #fff;
      box-shadow: 0 1px 4px rgba(186,117,23,0.2);
    }

    /* 空状態 */
    .empty-note {
      background: var(--amber-light);
      border: 0.5px solid var(--amber-border);
      border-radius: 12px;
      padding: 1.25rem;
      text-align: center;
      font-size: 14px;
      color: var(--text-sub);
      margin-bottom: 1.5rem;
    }

    .empty-note a {
      color: var(--amber-dark);
      font-weight: 600;
      text-decoration: none;
    }

    /* CTAボタン */
    .btn-go-shops {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--amber-dark);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
    }

    .btn-go-shops:hover { background: #6F440C; }

    /* 訪問店舗リスト */
    .visited-list { margin-bottom: 2rem; }

    .visited-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      text-decoration: none;
      color: inherit;
    }

    .visited-item:hover { background: #faf8f4; }

    .visited-icon {
      width: 40px;
      height: 40px;
      background: var(--amber-light);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .visited-name { font-size: 15px; font-weight: 600; }
    .visited-meta { font-size: 12px; color: var(--text-sub); }
    .visited-arrow { margin-left: auto; color: #ccc; font-size: 18px; }

    /* 記録の履歴 */
    .history-list { margin-bottom: 2rem; }
    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .history-photo { width: 48px; height: 48px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
    .history-main { min-width: 0; flex: 1; }
    .history-shop { font-size: 15px; font-weight: 600; color: #8A5510; text-decoration: none; }
    .history-shop:hover { text-decoration: underline; }
    .history-meta { font-size: 12px; color: var(--text-sub); }
    .history-likes { font-size: 12px; color: #999; font-weight: 600; margin-top: 3px; display: flex; align-items: center; gap: 3px; cursor: pointer; user-select: none; }
    .history-likes:hover { color: #e05a77; }
    .history-likes.liked { color: #e05a77; }
    /* いいね数＋コメントボタンを1行に並べる */
    .history-entry { margin-bottom: 8px; }
    .history-entry .history-item { margin-bottom: 0; }
    .history-social { display: flex; align-items: center; gap: 14px; margin-top: 3px; }
    .history-social .history-likes { margin-top: 0; }
    .history-del {
      flex-shrink: 0;
      background: none;
      border: none;
      color: #c9938f;
      font-size: 18px;
      cursor: pointer;
      padding: 6px;
      line-height: 1;

  <script>

    // === スタンプカード定義 ===
    // 各スタンプは「条件を満たした店舗数 / 目標数」で進捗を判定する。
    // check(visitedShops) は { current, goal } を返す。
    // この定義部分はB（会員DB版）でもそのまま再利用できる。
    // 営業中の店舗から「総数」を算出（バッジ目標を店舗数に合わせて自動調整する）
    const isOpenShop = s => s.status !== '閉店';
    const TOTAL_SHOPS  = SHOPS.filter(isOpenShop).length;
    const TOTAL_CITIES = new Set(SHOPS.filter(isOpenShop).map(s => s.city)).size;

    // 香川県内の実際のうどん店はおよそ500軒（うどログ収録は順次拡大）。
    const KAGAWA_TOTAL = 500;

    // === 達成バッジ定義 ===
    // 各バッジの check(c) は集計コンテキスト c を受け取り { current, goal } を返す。
    //   c.shops      : 記録したユニーク店舗（閉店含む）
    //   c.cups       : 総杯数（記録件数）
    //   c.photos     : 写真付き記録の件数
    //   c.likes      : もらったいいねの合計
    //   c.comments   : コメント付き記録の件数
    //   c.streakWeeks: 連続で記録した最大週数
    //   c.eve/newyear: 大晦日(12/31)/元旦(1/1) に記録があるか
    const mk = (current, goal) => ({ current: Math.min(current, goal), goal });
    const uniqOpen = shops => shops.filter(isOpenShop);

    // バッジのカテゴリ（表示順とセクション見出し）
    const BADGE_GROUPS = [
      { key:'breadth', label:'広さ — 巡ったお店' },
      { key:'depth',   label:'深さ — 食べた杯数' },
      { key:'style',   label:'スタイル' },
      { key:'social',  label:'行動・交流' },
      { key:'area',    label:'制覇' },
    ];

    const STAMPS = [
      // --- 広さ：訪れたお店の数（ユニーク店舗）---
      { id:'beginner', g:'breadth', icon:'🥢', name:'うどんビギナー', desc:'初めてのうどんを記録', check:c => mk(c.shops.length, 1) },
      { id:'m10',  g:'breadth', icon:'🍜', name:'うどん10軒',  desc:'10軒のお店を記録',  check:c => mk(c.shops.length, 10) },
      { id:'m30',  g:'breadth', icon:'🥉', name:'うどん30軒',  desc:'30軒のお店を記録',  check:c => mk(c.shops.length, 30) },
      { id:'m50',  g:'breadth', icon:'🥈', name:'うどん50軒',  desc:'50軒のお店を記録',  check:c => mk(c.shops.length, 50) },
      { id:'m100', g:'breadth', icon:'🥇', name:'うどん100軒', desc:'100軒のお店を記録', check:c => mk(c.shops.length, 100) },
      { id:'m200', g:'breadth', icon:'🏆', name:'うどん200軒', desc:'200軒のお店を記録', check:c => mk(c.shops.length, 200) },
      { id:'m300', g:'breadth', icon:'🌟', name:'うどん300軒', desc:'300軒のお店を記録', check:c => mk(c.shops.length, 300) },

      // --- 深さ：通い込んだ杯数（総記録数）---
      { id:'c10',   g:'depth', icon:'🥣', name:'うどん10杯',  desc:'通算10杯を記録',   check:c => mk(c.cups, 10) },
      { id:'c50',   g:'depth', icon:'🍲', name:'うどん50杯',  desc:'通算50杯を記録',   check:c => mk(c.cups, 50) },
      { id:'c100',  g:'depth', icon:'💯', name:'うどん100杯', desc:'通算100杯を記録',  check:c => mk(c.cups, 100) },
      { id:'c300',  g:'depth', icon:'🔥', name:'うどん300杯', desc:'通算300杯を記録',  check:c => mk(c.cups, 300) },
      { id:'c500',  g:'depth', icon:'⚡', name:'うどん500杯', desc:'通算500杯を記録',  check:c => mk(c.cups, 500) },
      { id:'c1000', g:'depth', icon:'🐉', name:'うどん仙人',  desc:'通算1000杯を記録', check:c => mk(c.cups, 1000) },

      // --- スタイル ---
      { id:'seimenjo', g:'style', icon:'🏭', name:'製麺所ハンター', desc:'製麺所スタイルを15軒記録', check:c => mk(c.shops.filter(s=>s.type==='製麺所').length, 15) },
      { id:'self',     g:'style', icon:'🥡', name:'セルフの達人',   desc:'セルフ式を15軒記録',       check:c => mk(c.shops.filter(s=>s.type==='セルフ').length, 15) },

      // --- 行動・交流 ---
      { id:'photo10', g:'social', icon:'📸', name:'フォトグラファー', desc:'写真付きの記録を10件',     check:c => mk(c.photos, 10) },
      { id:'photo30', g:'social', icon:'📷', name:'フォトマスター',   desc:'写真付きの記録を30件',     check:c => mk(c.photos, 30) },
      { id:'review',  g:'social', icon:'✍️', name:'レビュアー',       desc:'コメント付きの記録を20件', check:c => mk(c.comments, 20) },
      { id:'like50',  g:'social', icon:'❤️', name:'人気者',           desc:'もらったいいね50',         check:c => mk(c.likes, 50) },
      { id:'like100', g:'social', icon:'💖', name:'大人気',           desc:'もらったいいね100',        check:c => mk(c.likes, 100) },
      { id:'streak',  g:'social', icon:'📅', name:'皆勤賞',           desc:'4週連続で記録',           check:c => mk(c.streakWeeks, 4) },
      { id:'eve',     g:'social', icon:'🎍', name:'年越しうどん',     desc:'大晦日(12/31)に記録',      check:c => mk(c.eve ? 1 : 0, 1) },
      { id:'newyear', g:'social', icon:'🌅', name:'初うどん',         desc:'元旦(1/1)に記録',          check:c => mk(c.newyear ? 1 : 0, 1) },

      // --- 制覇（エリア・全店）---
      { id:'allarea', g:'area', icon:'🗺️', name:'全エリア制覇', desc:`${TOTAL_CITIES}の市町すべてで記録`,
        check:c => mk(new Set(uniqOpen(c.shops).map(s=>s.city)).size, TOTAL_CITIES) },
      { id:'king', g:'area', icon:'👑', name:'さぬきうどん王',
        desc:`うどログ収録の全${TOTAL_SHOPS}軒を制覇（香川には約${KAGAWA_TOTAL}軒）`,
        check:c => mk(uniqOpen(c.shops).length, TOTAL_SHOPS) },
    ];

    // ログ一覧＋ユニーク店舗 → バッジ集計コンテキストを作る
    function buildBadgeContext(logs, uniqueShops) {
      const hasPhoto   = l => (l.photoCount > 0) || !!l.photoUrl;
      const hasComment = l => (l.comment || '').trim() !== '';
      const isDay = (l, m, d) => {
        if (!l.visitDate) return false;
        const dt = new Date(l.visitDate); if (isNaN(dt)) return false;
        return dt.getMonth() === m && dt.getDate() === d;
      };
      // 連続週数：visitDate を週（月曜始まり）に丸め、連続している最大本数を数える
      const weekKeys = [...new Set(logs.map(l => weekKey(l.visitDate)).filter(Boolean))].sort();
      let streak = 0, best = 0, prev = null;
      weekKeys.forEach(k => {
        streak = (prev !== null && k === nextWeek(prev)) ? streak + 1 : 1;
        best = Math.max(best, streak); prev = k;
      });
      return {
        shops: uniqueShops,
        cups: logs.length,
        photos: logs.filter(hasPhoto).length,
        likes: logs.reduce((s, l) => s + (l.likeCount || 0), 0),
        comments: logs.filter(hasComment).length,
        streakWeeks: best,
        eve: logs.some(l => isDay(l, 11, 31)),
        newyear: logs.some(l => isDay(l, 0, 1)),
      };
    }

    // 週キー（その週の月曜を "YYYY-MM-DD" で）と翌週キー
    function weekKey(dateStr) {
      if (!dateStr) return null;
      const d = new Date(dateStr); if (isNaN(d)) return null;
      const day = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      const dow = (day.getDay() + 6) % 7;   // 月=0
      day.setDate(day.getDate() - dow);
      return `${day.getFullYear()}-${String(day.getMonth()+1).padStart(2,'0')}-${String(day.getDate()).padStart(2,'0')}`;
    }
    function nextWeek(key) {
      const d = new Date(key); d.setDate(d.getDate() + 7);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    // === localStorageから訪問ログを読み込む（B版ではここをDB取得に差し替える）===
    // logs = 訪問1回ごとのエントリ配列。同じ店の複数回記録もそれぞれ1件。
    function loadLogs() {
      let logs = JSON.parse(localStorage.getItem('logs') || '[]');

      // 旧データ（logs導入前にvisitedだけで記録していた分）を1回だけ移行する
      if (logs.length === 0) {
        const oldIds = JSON.parse(localStorage.getItem('visited') || '[]');
        if (oldIds.length > 0) {
          const oldRecords = JSON.parse(localStorage.getItem('records') || '{}');
          logs = oldIds.map(id => {
            const shop = SHOPS.find(s => s.id === id);
            const r = oldRecords[id] || {};
            return shop ? {
              logId: id,
              shopId: id,
              name: shop.name, city: shop.city, type: shop.type,
              menu: r.menu || '', rating: r.rating || 0, comment: r.comment || '',
              visitDate: r.visitDate || '', savedAt: r.savedAt || '',
            } : null;
          }).filter(Boolean);
          localStorage.setItem('logs', JSON.stringify(logs));
        }
      }
      return logs;
    }

    // ログ → 店舗マスタを補完（cityやtypeが欠けていてもSHOPSから引く）
    function shopOf(log) {
      return SHOPS.find(s => s.id === log.shopId) || log;
    }

    // === 期間ごとの杯数を集計 ===
    function countByPeriod(logs) {
      const now = new Date();
      const startOfDay = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());
      // 今週（月曜始まり）
      const dow = (now.getDay() + 6) % 7;          // 月=0 ... 日=6
      const weekStart = startOfDay(new Date(now)); weekStart.setDate(weekStart.getDate() - dow);
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
      const yearStart  = new Date(now.getFullYear(), 0, 1);

      let week = 0, month = 0, year = 0;
      logs.forEach(l => {
        if (!l.visitDate) return;
        const d = new Date(l.visitDate);
        if (isNaN(d)) return;
        if (d >= yearStart)  year++;
        if (d >= monthStart) month++;
        if (d >= weekStart)  week++;
      });
      return { week, month, year, total: logs.length };
    }

    // 1枚のスタンプカードあたりのマス数
    const SLOTS_PER_CARD = 10;

    // スタンプ帳を描画（記録した順に1杯=1スタンプ）
    function renderBook(logs) {
      const total = logs.length;
      document.getElementById('bookCount').textContent = `${total}個`;
      const book = document.getElementById('stampBook');

      if (total === 0) {
        book.innerHTML = '<div class="book-empty">うどんを記録すると、ここにスタンプが1杯ごとに押されます <i class="ti ti-bowl-chopsticks udon-i"></i></div>';
        return;
      }

      const cardCount = Math.floor(total / SLOTS_PER_CARD) + (total % SLOTS_PER_CARD === 0 ? 0 : 1);

      function slotsHtml(c) {
        const startNum = c * SLOTS_PER_CARD;
        const filled = Math.min(total - startNum, SLOTS_PER_CARD);
        let cells = '';
        for (let i = 0; i < SLOTS_PER_CARD; i++) {
          const stampIndex = startNum + i;
          if (i < filled) {
            const log = logs[stampIndex];
            const shop = shopOf(log);
            const d = fmtDateMy(log.visitDate || (log.savedAt ? log.savedAt.slice(0, 10) : ''));
            cells += `
              <div class="stamp-cell">
                <div class="slot filled"><i class="ti ti-bowl-chopsticks"></i><span class="slot-num">${stampIndex + 1}</span></div>
                <div class="stamp-cap">
                  <div class="stamp-cap-shop">${escMy(shop.name)}</div>
                  <div class="stamp-cap-date">${d || ''}</div>
                </div>
              </div>`;
          } else {
            cells += `
              <div class="stamp-cell">
                <div class="slot empty">${stampIndex + 1}</div>
              </div>`;
          }
        }
        return cells;
      }
      function meta(c) {
        const filled = Math.min(total - c * SLOTS_PER_CARD, SLOTS_PER_CARD);
        return { filled: filled, complete: filled === SLOTS_PER_CARD };
      }

      // ハイブリッド表示（案2）：最新カードは展開、古い冊は横スクロール
      const latest = cardCount - 1;
      const lm = meta(latest);
      let html = `
        <div class="book-current-head">現在のカード</div>
        <div class="book-card">
          <div class="book-card-label">
            <span>カード ${latest + 1}（${lm.filled} / ${SLOTS_PER_CARD}）</span>
            ${lm.complete ? '<span class="complete-tag">✓ コンプリート</span>' : ''}
          </div>
          <div class="stamp-list">${slotsHtml(latest)}</div>
        </div>`;

      // 古い冊：新しい順に横スクロール（スナップ＋冊カウント）
      if (cardCount > 1) {
        let slides = '';
        for (let c = latest - 1; c >= 0; c--) {
          const m = meta(c);
          slides += `
            <div class="book-slide" data-card="${c + 1}">
              <div class="book-card-label">
                <span>カード ${c + 1}（${m.filled} / ${SLOTS_PER_CARD}）</span>
                ${m.complete ? '<span class="complete-tag">✓ コンプリート</span>' : ''}
              </div>
              <div class="stamp-list">${slotsHtml(c)}</div>
            </div>`;
        }
        html += `
          <div class="book-older-head">これまでのカード</div>
          <div class="book-nav">
            <button type="button" class="book-nav-btn" id="bookPrev" aria-label="前のカード">‹</button>
            <span class="book-counter" id="bookCounter"></span>
            <button type="button" class="book-nav-btn" id="bookNext" aria-label="次のカード">›</button>
          </div>
          <div class="book-carousel" id="bookCarousel">${slides}</div>`;
      }

      book.innerHTML = html;

      // 古い冊カルーセルの冊カウント＋操作（矢印ボタン・ホイール横スクロール）
      const carousel = document.getElementById('bookCarousel');
      if (carousel) {
        const counter = document.getElementById('bookCounter');
        const prevBtn = document.getElementById('bookPrev');
        const nextBtn = document.getElementById('bookNext');
        const older = cardCount - 1;
        function step() {
          const sl = carousel.children[0];
          return sl ? sl.offsetWidth + 12 : carousel.clientWidth;
        }
        function updateCounter() {
          const center = carousel.scrollLeft + carousel.clientWidth / 2;
          let best = null, bestPos = 0, bestDist = Infinity, pos = 0;
          for (const sl of carousel.children) {
            pos++;
            const c = sl.offsetLeft + sl.offsetWidth / 2;
            const d = Math.abs(c - center);
            if (d < bestDist) { bestDist = d; best = sl; bestPos = pos; }
          }
          if (best) counter.textContent = `カード ${best.dataset.card}（${bestPos} / ${older}冊目）`;
          const maxScroll = carousel.scrollWidth - carousel.clientWidth - 1;
          prevBtn.disabled = carousel.scrollLeft <= 1;
          nextBtn.disabled = carousel.scrollLeft >= maxScroll;
        }
        prevBtn.addEventListener('click', () => carousel.scrollBy({ left: -step(), behavior: 'smooth' }));
        nextBtn.addEventListener('click', () => carousel.scrollBy({ left: step(), behavior: 'smooth' }));
        // 縦ホイールを横スクロールに変換（PC向け）
        carousel.addEventListener('wheel', (e) => {
          if (Math.abs(e.deltaY) <= Math.abs(e.deltaX)) return;
          e.preventDefault();
          carousel.scrollLeft += e.deltaY;
        }, { passive: false });
        carousel.addEventListener('scroll', () => window.requestAnimationFrame(updateCounter));
        updateCounter();
      }
    }

    // 折りたたんだ古いカードの開閉
    function toggleCard(c) {
      const body = document.getElementById('bookBody-' + c);
      const chev = document.getElementById('bookChevron-' + c);
      if (!body) return;
      const hidden = body.style.display === 'none';
      body.style.display = hidden ? 'grid' : 'none';
      if (chev) chev.style.transform = hidden ? 'rotate(180deg)' : '';
    }

    // スタンプをタップ → その店名・訪問日を表示
    let stampInfoTimer = null;
    function showStampInfo(el) {
      const box = document.getElementById('stampInfo');
      box.innerHTML = `<div class="stamp-info-name">${el.dataset.name}</div><div class="stamp-info-meta">${el.dataset.meta}</div>`;
      box.classList.add('show');
      clearTimeout(stampInfoTimer);
      stampInfoTimer = setTimeout(() => box.classList.remove('show'), 2600);
    }

    // === エリア制覇バッジ ===
    // 各エリア（市町）の店舗のうち、何%を記録したかで段階バッジを点灯する。
    const AREA_TIERS = [20, 40, 60, 80, 100];

    function renderAreaBadges(uniqueShops) {
      // 閉店した店は分母・分子の両方から除外する（達成率の母数は「営業中の店」）
      const isOpen = s => s.status !== '閉店';

      // SHOPSから「エリアごとの営業中の総店舗数」を集計（登場順を保持）
      const totalByCity = {};
      const order = [];
      SHOPS.filter(isOpen).forEach(s => {
        if (!(s.city in totalByCity)) { totalByCity[s.city] = 0; order.push(s.city); }
        totalByCity[s.city]++;
      });

      // 記録済みのユニーク店舗（営業中のみ）をエリアごとに集計
      const visitedByCity = {};
      uniqueShops.filter(isOpen).forEach(s => {
        visitedByCity[s.city] = (visitedByCity[s.city] || 0) + 1;
      });

      // エリアごとのデータを作成
      const areas = order.map(city => {
        const total = totalByCity[city];
        const visited = visitedByCity[city] || 0;
        const ratio = visited / total;                 // 0〜1
        const tiersOn = AREA_TIERS.filter(t => ratio >= t / 100 - 1e-9).length;
        return { city, total, visited, ratio, tiersOn };
      });

      // 達成率が高い順、同率なら店舗数が多い順に並べる
      areas.sort((a, b) => (b.ratio - a.ratio) || (b.total - a.total));

      // 獲得バッジ総数（全エリアの点灯段階の合計）
      const earnedBadges = areas.reduce((sum, a) => sum + a.tiersOn, 0);
      document.getElementById('areaBadgeCount').textContent = `${earnedBadges}個 獲得`;

      document.getElementById('areaGrid').innerHTML = areas.map(a => {
        const pct = Math.round(a.ratio * 100);
        const complete = a.ratio >= 1;
        const dots = AREA_TIERS.map(t =>
          `<div class="tier-dot ${a.ratio >= t / 100 - 1e-9 ? 'on' : ''}">${t}%</div>`
        ).join('');
        return `
          <div class="area-card ${complete ? 'complete' : ''}">
            <div class="area-card-head">
              <div class="area-name">${a.city}${complete ? '<span class="crown">👑</span>' : ''}</div>
              <div class="area-count">${a.visited} / ${a.total}軒</div>
            </div>
            <div class="area-pct">達成率 ${pct}%</div>
            <div class="progress-track">
              <div class="progress-fill" style="width:${pct}%"></div>
            </div>
            <div class="area-tiers">${dots}</div>
          </div>`;
      }).join('');
    }

    function render(logs) {
      // ユニークな訪問店舗（バッジ・店舗一覧で使用）
      const uniqueShops = [...new Map(logs.map(l => [l.shopId, shopOf(l)])).values()];
      const cities = new Set(uniqueShops.map(s => s.city));

      // 期間ごとの杯数
      const period = countByPeriod(logs);
      document.getElementById('cntWeek').textContent  = period.week;
      document.getElementById('cntMonth').textContent = period.month;
      document.getElementById('cntYear').textContent  = period.year;
      document.getElementById('cntTotal').textContent = period.total;

      // 全店舗の制覇率（営業中の店が母数。閉店した店は除外）
      const openShops = SHOPS.filter(s => s.status !== '閉店');
      const totalShops = openShops.length;
      const visitedOpen = uniqueShops.filter(s => s.status !== '閉店').length;
      const conqPct = totalShops ? Math.round((visitedOpen / totalShops) * 100) : 0;
      document.getElementById('conqVisited').textContent = visitedOpen;
      document.getElementById('conqTotal').textContent = totalShops;
      document.getElementById('conqFill').style.width = conqPct + '%';
      document.getElementById('conqPct').textContent = conqPct + '%';

      // 統計（上段カード）
      document.getElementById('statVisited').textContent = uniqueShops.length;
      document.getElementById('statAreas').textContent = cities.size;

      // スタンプ帳（1杯=1スタンプ）
      renderBook(logs);

      // 常連店（10杯以上記録した店）
      renderRegulars(logs);

      // 達成バッジ判定（広さ=軒数・深さ=杯数・行動・エリアを集計したコンテキストで判定）
      const badgeCtx = buildBadgeContext(logs, uniqueShops);
      let earnedCount = 0;
      const stampCard = (stamp) => {
        const { current, goal } = stamp.check(badgeCtx);
        const earned = current >= goal;
        if (earned) earnedCount++;
        const pct = Math.round((current / goal) * 100);
        return `
          <div class="stamp-card ${earned ? 'earned' : 'locked'}">
            <div class="stamp-icon">${stamp.icon}</div>
            <div class="stamp-name">${stamp.name}</div>
            <div class="stamp-desc">${stamp.desc}</div>
            <div class="progress-track">
              <div class="progress-fill" style="width:${pct}%"></div>
            </div>
            <div class="progress-text">${earned ? '達成！' : `${current} / ${goal}`}</div>
          </div>`;
      };
      // カテゴリごとにセクション分けして描画
      document.getElementById('stampGrid').innerHTML = BADGE_GROUPS.map(grp => {
        const items = STAMPS.filter(s => s.g === grp.key);
        if (items.length === 0) return '';
        const got = items.filter(s => { const r = s.check(badgeCtx); return r.current >= r.goal; }).length;
        const cards = items.map(stampCard).join('');
        return `
          <div class="stamp-group">
            <div class="stamp-group-title">${grp.label}<span class="grp-count">${got}/${items.length}</span></div>
            <div class="stamp-grid">${cards}</div>
          </div>`;
      }).join('');

      document.getElementById('statStamps').textContent = earnedCount;
      document.getElementById('stampCount').textContent = `${earnedCount} / ${STAMPS.length} 獲得`;

      // エリア制覇バッジ
      renderAreaBadges(uniqueShops);

      // 空状態
      document.getElementById('emptyNote').style.display = logs.length === 0 ? 'block' : 'none';

      // 訪問店舗リスト（同じ店は訪問回数をまとめて表示）
      const countByShop = {};
      logs.forEach(l => { countByShop[l.shopId] = (countByShop[l.shopId] || 0) + 1; });

      document.getElementById('visitedCount').textContent = `${uniqueShops.length}軒 / ${logs.length}杯`;
      const list = document.getElementById('visitedList');
      if (uniqueShops.length === 0) {
        list.innerHTML = '<p style="color:#888;font-size:14px;text-align:center;padding:1rem;">まだ記録がありません</p>';
      } else {
        // エリア（市町）ごとにグループ化。軒数の多い順、各エリアは折りたたみ
        const byCity = {};
        uniqueShops.forEach(s => { (byCity[s.city] = byCity[s.city] || []).push(s); });
        const cities = Object.keys(byCity).sort((a, b) => byCity[b].length - byCity[a].length);
        list.innerHTML = cities.map((city, ci) => {
          const items = byCity[city].map(s => `
            <a href="shops/${s.slug || ('shop' + s.id)}" class="visited-item">
              <div class="visited-icon"><i class="ti ti-bowl-chopsticks"></i></div>
              <div>
                <div class="visited-name">${s.name}</div>
                <div class="visited-meta">${s.city} ・ ${s.type}</div>
              </div>
              <span style="margin-left:auto;font-size:13px;font-weight:700;color:var(--amber);">${countByShop[s.id]}杯</span>
              <i class="ti ti-chevron-right visited-arrow" style="margin-left:8px;"></i>
            </a>`).join('');
          return `
            <div class="group-block">
              <button type="button" class="group-head" onclick="toggleGroup('area', ${ci})">
                <span>${escMy(city || 'その他')}（${byCity[city].length}軒）</span>
                <i class="ti ti-chevron-down group-chevron" id="areaChevron-${ci}"></i>
              </button>
              <div class="group-body" id="areaBody-${ci}" style="display:none;">${items}</div>
            </div>`;
        }).join('');
      }

      // 記録の履歴（1杯ごと・新しい順・削除できる）。月ごとにまとめて折りたたみ
      document.getElementById('historyCount').textContent = `${logs.length}杯`;
      const histEl = document.getElementById('historyList');
      const history = [...logs].reverse();
      if (history.length === 0) {
        histEl.innerHTML = '<div class="history-empty">まだ記録がありません</div>';
      } else {
        const itemHtml = (l) => {
          const shop = shopOf(l);
          const menu = (l.menus && l.menus.length) ? l.menus.join('・') : '';
          const date = fmtDateMy(l.visitDate || (l.savedAt ? l.savedAt.slice(0, 10) : ''));
          const meta = [date, menu].filter(Boolean).join(' ・ ');
          return `
            <div class="history-entry">
              <div class="history-item">
                ${l.photoUrl ? `<img class="history-photo" src="${l.photoUrl}" alt="写真" loading="lazy" onerror="this.style.display='none'">` : ''}
                <div class="history-main">
                  <a class="history-shop" href="shops/${shop.slug || ('shop' + shop.id)}">${escMy(shop.name)}</a>
                  <div class="history-meta">${escMy(meta)}</div>
                  <div class="history-social">
                    <span class="history-likes${l.liked ? ' liked' : ''}" data-log="${l.id}" onclick="toggleLike(this)" title="いいね"><i class="ti ti-heart${l.liked ? '-filled' : ''}"></i> <span class="like-count">${l.likeCount || 0}</span></span>
                    <span class="ulog-cmt-btn" onclick="ulogCmtToggle(${l.id})" title="コメント"><i class="ti ti-message-circle"></i><span id="ulog-cmt-count-${l.id}">${l.commentCount || 0}</span></span>
                  </div>
                </div>
                <a class="history-edit" title="編集" href="record.html?edit=${l.id}"><i class="ti ti-pencil"></i></a>
                <button class="history-del" title="削除" onclick="deleteLog(${l.id})"><i class="ti ti-trash"></i></button>
              </div>
              <div class="ulog-cmt-box" id="ulog-cmt-box-${l.id}" hidden></div>
            </div>`;
        };
        // 年月（YYYY-MM）でグループ化。新しい月が先、最新月だけ開く
        const byMonth = {};
        history.forEach(l => {
          const ds = l.visitDate || (l.savedAt ? l.savedAt.slice(0, 10) : '');
          const key = (ds && ds.length >= 7) ? ds.slice(0, 7) : '0000-00';
          (byMonth[key] = byMonth[key] || []).push(l);
        });
        const months = Object.keys(byMonth).sort().reverse();
        histEl.innerHTML = months.map((m, mi) => {
          const label = m === '0000-00' ? '日付不明' : `${m.slice(0, 4)}年${parseInt(m.slice(5, 7), 10)}月`;
          const open = mi === 0;
          const items = byMonth[m].map(itemHtml).join('');
          return `
            <div class="group-block">
              <button type="button" class="group-head" onclick="toggleGroup('month', ${mi})">
                <span>${label}（${byMonth[m].length}杯）</span>
                <i class="ti ti-chevron-down group-chevron${open ? ' open' : ''}" id="monthChevron-${mi}"></i>
              </button>
              <div class="group-body" id="monthBody-${mi}" style="display:${open ? 'block' : 'none'};">${items}</div>
            </div>`;
        }).join('');
      }
    }

    // エリア・月の折りたたみ開閉
    function toggleGroup(prefix, i) {
      const body = document.getElementById(prefix + 'Body-' + i);
      const chev = document.getElementById(prefix + 'Chevron-' + i);
      if (!body) return;
      const hidden = body.style.display === 'none';
      body.style.display = hidden ? 'block' : 'none';
      if (chev) chev.classList.toggle('open', hidden);
    }

    // 表示用ヘルパー
    function escMy(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
        ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
    function fmtDateMy(d) {
      if (!d) return '';
      const t = new Date(d);
      return isNaN(t) ? d : `${t.getFullYear()}/${t.getMonth() + 1}/${t.getDate()}`;
    }

    // 推しのうどん屋を描画
    function renderFavorites(ids) {
      const section = document.getElementById('favSection');
      const list = document.getElementById('favList');
      const cards = (ids || []).map((id, i) => {
        const s = SHOPS.find(x => x.id === id);
        if (!s) return '';
        const slug = s.slug || ('shop' + s.id);
        return `
          <a href="shops/${slug}" class="fav-card">
            <div class="fav-rank">${i + 1}</div>
            <div style="min-width:0;">
              <div class="fav-name">${escMy(s.name)}</div>
              <div class="fav-meta">${escMy(s.city)} ・ ${escMy(s.type)}</div>
            </div>
            <i class="ti ti-chevron-right" style="margin-left:auto;color:#ccc;"></i>
          </a>`;
      }).join('');
      list.innerHTML = cards;
      section.style.display = cards.trim() ? 'block' : 'none';
    }

    // 常連店を描画（同じ店を10杯以上記録＝常連認定。杯数の多い順）
    const REGULAR_SIZE = 10;
    function renderRegulars(logs) {
      const section = document.getElementById('regularSection');
      const list = document.getElementById('regularList');
      const cnt = {};
      (logs || []).forEach(l => { cnt[l.shopId] = (cnt[l.shopId] || 0) + 1; });
      const regs = Object.keys(cnt)
        .map(id => ({ id: parseInt(id, 10), visits: cnt[id] }))
        .filter(r => r.visits >= REGULAR_SIZE)
        .sort((a, b) => b.visits - a.visits);
      const cards = regs.map(r => {
        const s = SHOPS.find(x => x.id === r.id);
        if (!s) return '';
        const slug = s.slug || ('shop' + s.id);
        return `
          <a href="shops/${slug}" class="fav-card">
            <div class="fav-rank"><i class="ti ti-bowl-chopsticks"></i></div>
            <div style="min-width:0;">
              <div class="fav-name">${escMy(s.name)}</div>
              <div class="fav-meta">${escMy(s.city)} ・ 通算${r.visits}杯</div>
            </div>
            <i class="ti ti-chevron-right" style="margin-left:auto;color:#ccc;"></i>
          </a>`;
      }).join('');
      list.innerHTML = cards;
      section.style.display = cards.trim() ? 'block' : 'none';
    }

    // サーバーから記録を取得して全体を描画（削除後の再描画にも使う）
    async function loadAndRender() {
      try {
        const data = await API.get('my_logs.php');
        render(data.logs || []);
        // フォロワー・フォロー中の数値＋一覧へのリンク
        document.getElementById('followerCount').textContent = data.followerCount || 0;
        document.getElementById('followingCount').textContent = data.followingCount || 0;
        const uname = API.user && API.user.username;
        if (uname) {
          const fu = encodeURIComponent(uname);
          document.getElementById('statFollowers').href = 'follows.html?u=' + fu + '&tab=followers';
          document.getElementById('statFollowing').href = 'follows.html?u=' + fu + '&tab=following';
        }
        document.getElementById('profileStats').style.display = 'flex';
      } catch (e) {
        showToast(e.message || '記録の取得に失敗しました', { error: true });
        render([]);
      }
    }

    // いいねのトグル（ログイン必須・サーバー保存）
    async function toggleLike(el) {
      const logId = parseInt(el.dataset.log, 10);
      if (!logId || el.dataset.busy) return;
      try {
        await API.refresh();
        if (!API.isLoggedIn()) {
          location.href = 'login.html?next=' + encodeURIComponent(location.pathname + location.search);
          return;
        }
        el.dataset.busy = '1';
        const res = await API.post('like_toggle.php', { log_id: logId });
        const liked = res.liked === 1;
        el.classList.toggle('liked', liked);
        el.querySelector('i').className = 'ti ti-heart' + (liked ? '-filled' : '');
        el.querySelector('.like-count').textContent = res.count;
      } catch (e) {
        if (window.showToast) showToast(e.message || 'いいねに失敗しました', { error: true });
      } finally {
        delete el.dataset.busy;
      }
    }

    // 記録を1件削除（自分の記録のみ）
    async function deleteLog(id) {
      if (!confirm('この記録を削除しますか？\n（杯数・スタンプ・制覇率も更新されます）')) return;
      try {
        await API.refresh();
        await API.post('log_delete.php', { id: id });
        await loadAndRender();
      } catch (e) {
        showToast(e.message || '削除に失敗しました', { error: true });
      }
    }

    // === プロフィール写真（表示のみ。編集は profile-edit.html）===
    function setAvatar(url) {
      const box = document.getElementById('avatarDisplay');
      const fallback = document.getElementById('avatarFallback');
      let img = box.querySelector('img.avatar-img');
      if (url) {
        if (!img) {
          img = document.createElement('img');
          img.className = 'avatar-img';
          img.alt = 'プロフィール写真';
          box.insertBefore(img, fallback);
        }
        img.src = url;
        fallback.style.display = 'none';
      } else {
        if (img) img.remove();
        const nick = (API.user && API.user.nickname) || '';
        fallback.textContent = nick ? nick.charAt(0) : '';
        if (!nick) fallback.innerHTML = '<i class="ti ti-bowl-chopsticks"></i>';
        fallback.style.display = '';
      }
    }

    // === 初期化：ログイン必須。サーバーから記録を取得して描画 ===
    (async function init() {
      try {
        await API.refresh();
      } catch (e) {
        showToast('サーバーに接続できませんでした。時間をおいて再度お試しください。', { error: true });
        return;
      }
      if (!API.isLoggedIn()) {
        location.href = 'login.html?next=' + encodeURIComponent(location.pathname);
        return;
      }

      document.querySelector('.profile-name').textContent = u.nickname;
      document.querySelector('.profile-sub').textContent =
        u.city ? (u.city + 'で活動中') : '香川のさぬきうどんを記録中';

      // 自分の公開プロフィールへのリンク（他の会員からの見え方）
      if (u.username) {
        const link = document.getElementById('publicProfileLink');
        link.href = '/' + encodeURIComponent(u.username);
        link.style.display = 'inline-block';
      }

      // プロフィール写真の表示
      setAvatar(u.avatarUrl || null);

      // 自己紹介文
      if (u.bio) {
        const bioEl = document.getElementById('profileBio');
        bioEl.textContent = u.bio;
        bioEl.style.display = 'block';
      }

      // 推しのうどん屋を取得して描画
      try {
        const f = await API.get('favorites_get.php');
        renderFavorites(f.shopIds || []);
      } catch (e) { /* 取得失敗時は非表示のまま */ }

      // サーバーから記録を取得して描画
      await loadAndRender();
    })();
  </script>

  <!-- スタンプの店名ポップアップ -->
  <div class="stamp-info" id="stampInfo" onclick="this.classList.remove('show')"></div>

</body>
</html>
