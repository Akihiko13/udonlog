<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — うどログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: #FAFAF8;
      color: #1a1a1a;
      line-height: 1.7;
      font-size: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .card {
      background: #fff;
      border: 0.5px solid #e5e5e0;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-link {
      text-decoration: none;
      color: inherit;
    }

    .logo-title {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .logo-sub { font-size: 14px; color: #888; }

    .section-title {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .section-desc {
      font-size: 14px;
      color: #666;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    /* Xボタン */
    .btn-x {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #000;
      color: #fff;
      border: none;
      padding: 13px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-x:hover { background: #222; }

    .btn-x svg {
      width: 18px;
      height: 18px;
      fill: #fff;
      flex-shrink: 0;
    }

    /* Googleボタン */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #fff;
      color: #3c4043;
      border: 1px solid #dadce0;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 10px;
    }

    .btn-google:hover { background: #f8f9fa; border-color: #d2d3d4; }

    .btn-google svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* 区切り */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.25rem 0;
      color: #bbb;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-top: 0.5px solid #e5e5e0;
    }

    /* フォーム */
    .form-group { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 0.5px solid #d0d0ca;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: #BA7517;
      box-shadow: 0 0 0 3px rgba(186, 117, 23, 0.1);
    }

    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 42px; }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      font-size: 17px;
      padding: 0;
      line-height: 1;
    }

    .toggle-pw:hover { color: #666; }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 12px;
      color: #BA7517;
      text-decoration: none;
      margin-top: 6px;
    }

    .forgot-link:hover { text-decoration: underline; }

    .btn-login {
      width: 100%;
      background: #BA7517;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
    }

    .btn-login:hover { background: #9A6010; }

    .register-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 14px;
      color: #666;
    }

    .register-link a {
      color: #BA7517;
      text-decoration: none;
      font-weight: 500;
    }

    .register-link a:hover { text-decoration: underline; }

    /* エラーメッセージ */
    .error-msg {
      display: none;
      background: #FFF0F0;
      border: 0.5px solid #FFCCCC;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #CC3333;
      margin-bottom: 1rem;
    }

    .error-msg.show { display: block; }
  </style>
  <!-- ファビコン -->
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#BA7517">
</head>
<body>

  <div class="card">
    <h1 class="section-title">ログイン</h1>
    <p class="section-desc">アカウントにログインしてうどん記録を続けよう。</p>

    <!-- Googleログイン（表示のみ・Google Cloud Console登録後に有効化） -->
    <a href="#" class="btn-google" onclick="alert('Googleログインは準備中です。'); return false;">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Googleでログイン
    </a>

    <!-- Xログイン -->
    <a href="#" class="btn-x" onclick="alert('X（Twitter）ログインは準備中です。'); return false;">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.74l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
      Xアカウントでログイン
    </a>

    <div class="divider">または</div>

    <!-- エラーメッセージ -->
    <div class="error-msg" id="errorMsg">
      メールアドレスまたはパスワードが正しくありません。
    </div>

    <!-- メールログイン -->
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" placeholder="example@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">パスワード</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="パスワードを入力" required>
          <button type="button" class="toggle-pw" onclick="togglePassword()" id="toggleBtn">
            <i class="ti ti-eye"></i>
          </button>
        </div>
        <a href="forgot-password.html" class="forgot-link">
          パスワードをお忘れの方
        </a>
      </div>

      <button type="submit" class="btn-login">ログイン</button>
    </form>

    <div class="register-link">
      アカウントをお持ちでない方は
      <a href="register.html">無料登録</a>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const btn = document.getElementById('toggleBtn');
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = '<i class="ti ti-eye-off"></i>';
      } else {
        input.type = 'password';
        btn.innerHTML = '<i class="ti ti-eye"></i>';
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      // 現時点では会員機能未実装のためデモ表示
      alert('ログイン機能は現在準備中です。');
    }
  </script>

  <script src="header.js"></script>
</body>
</html>
