<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/">
  <title>ページが見つかりません — うどログ</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#BA7517">
  <link rel="stylesheet" href="tabler-icons.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #BA7517;
      --amber-dark: #8A5510;
      --bg: #FAFAF8;
      --white: #fff;
      --border: #e5e5e0;
      --text: #1a1a1a;
      --text-sub: #555;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Segoe UI', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .nf-wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 40px 1.5rem 72px;
      min-height: 66vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .nf-mascot { display: block; width: 130px; height: 130px; margin-bottom: 6px; }
    .nf-code {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: 3px;
      line-height: 1;
      color: var(--amber);
      margin-bottom: 10px;
    }
    .nf-title { font-size: 20px; font-weight: 800; margin-bottom: 12px; }
    .nf-text { font-size: 14px; color: var(--text-sub); line-height: 1.8; margin-bottom: 26px; }
    .nf-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .nf-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      padding: 12px 22px;
      border-radius: 99px;
      transition: background 0.15s;
    }
    .nf-btn i { font-size: 17px; }
    .nf-btn-primary { background: var(--amber-dark); color: #fff; }
    .nf-btn-primary:hover { background: #6F440C; }
    .nf-btn-secondary { background: var(--white); color: var(--amber-dark); border: 1px solid var(--amber); }
    .nf-btn-secondary:hover { background: #FFF8EE; }
  </style>
</head>
<body>

  <div class="nf-wrap">
    <img src="images/udomaru-hungry.svg" alt="うどまる" width="130" height="130" class="nf-mascot">
    <div class="nf-code">404</div>
    <h1 class="nf-title">ページが見つかりませんでした</h1>
    <p class="nf-text">お探しのページは、URLが変わったか、<br>掲載が終了した可能性があります。</p>
    <div class="nf-actions">
      <a class="nf-btn nf-btn-primary" href="/"><i class="ti ti-home"></i>トップへ戻る</a>
      <a class="nf-btn nf-btn-secondary" href="/shops.html"><i class="ti ti-search"></i>お店を探す</a>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="header.js"></script>
  <script src="analytics.js"></script>
  <script src="shops-data.js"></script>
</body>
</html>
