<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xで登録 — うどんログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: #FAFAF8;
      color: #1a1a1a;
      line-height: 1.7;
      font-size: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .card {
      background: #fff;
      border: 0.5px solid #e5e5e0;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    /* ロゴ・ヘッダー */
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-title {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .logo-sub {
      font-size: 14px;
      color: #888;
    }

    /* ステップ表示 */
    .steps {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 2rem;
    }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e5e5e0;
    }

    .step-dot.active { background: #BA7517; }
    .step-dot.done { background: #5BAD6F; }

    /* ステップ1: Xで認証 */
    .step-panel { display: none; }
    .step-panel.active { display: block; }

    .step-title {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .step-desc {
      font-size: 14px;
      color: #666;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    /* Xボタン */
    .btn-x {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #000;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-x:hover { background: #222; }

    .btn-x svg {
      width: 18px;
      height: 18px;
      fill: #fff;
      flex-shrink: 0;
    }

    /* 区切り */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.25rem 0;
      color: #bbb;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-top: 0.5px solid #e5e5e0;
    }

    /* メールリンク */
    .link-email {
      display: block;
      text-align: center;
      font-size: 14px;
      color: #BA7517;
      text-decoration: none;
    }

    .link-email:hover { text-decoration: underline; }

    /* ステップ2: 認証済み確認 */
    .x-connected {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #F0FAF3;
      border: 0.5px solid #A8D9B5;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 1.5rem;
    }

    .x-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .x-avatar svg { width: 20px; height: 20px; fill: #fff; }

    .x-name { font-size: 14px; font-weight: 500; }
    .x-handle { font-size: 12px; color: #888; }

    .check-icon {
      margin-left: auto;
      color: #5BAD6F;
      font-size: 20px;
    }

    /* フォーム */
    .form-group { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }

    .optional {
      font-size: 11px;
      color: #aaa;
      font-weight: 400;
      margin-left: 4px;
    }

    input[type="text"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 0.5px solid #d0d0ca;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #BA7517;
      box-shadow: 0 0 0 3px rgba(186, 117, 23, 0.1);
    }

    textarea { resize: vertical; min-height: 72px; line-height: 1.5; }

    .city-note {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
    }

    /* 利用規約 */
    .terms {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .terms input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin-top: 3px;
      accent-color: #BA7517;
      flex-shrink: 0;
    }

    .terms-text {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    .terms-text a { color: #BA7517; text-decoration: none; }
    .terms-text a:hover { text-decoration: underline; }

    /* 登録ボタン */
    .btn-primary {
      width: 100%;
      background: #BA7517;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-primary:hover { background: #9A6010; }
    .btn-primary:disabled { background: #d0b080; cursor: not-allowed; }

    /* ステップ3: 完了 */
    .success-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #F0FAF3;
      border: 2px solid #5BAD6F;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 28px;
      color: #5BAD6F;
    }

    .success-title {
      text-align: center;
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .success-desc {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .btn-start {
      display: block;
      width: 100%;
      background: #BA7517;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }

    .btn-start:hover { background: #9A6010; }

    /* フッター */
    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 13px;
      color: #888;
    }

    .footer-link a { color: #BA7517; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }

    /* loading */
    .loading {
      display: none;
      text-align: center;
      padding: 1rem 0;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e5e5e0;
      border-top-color: #BA7517;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 0.75rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="card">
    <!-- ロゴ -->
    <div class="logo">
      <div class="logo-title">うどんログ</div>
      <div class="logo-sub">さぬきうどん記録・交流サービス</div>
    </div>

    <!-- ステップインジケーター -->
    <div class="steps">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <div class="step-dot" id="dot3"></div>
    </div>

    <!-- ステップ1: Xで認証 -->
    <div class="step-panel active" id="step1">
      <div class="step-title">Xアカウントで登録</div>
      <p class="step-desc">Xアカウントと連携することで、うどんの感想投稿や他のユーザーとの交流ができるようになります。</p>

      <button class="btn-x" onclick="connectX()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.912-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        Xアカウントで続ける
      </button>

      <div class="divider">または</div>

      <a href="register-email.html" class="link-email">メールアドレスで登録する</a>
    </div>

    <!-- ローディング -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div style="font-size:14px; color:#888;">Xと接続しています...</div>
    </div>

    <!-- ステップ2: プロフィール入力 -->
    <div class="step-panel" id="step2">
      <div class="step-title">プロフィールを設定</div>
      <p class="step-desc">うどんログ内で表示される情報を入力してください。</p>

      <div class="x-connected">
        <div class="x-avatar">
          <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.912-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </div>
        <div>
          <div class="x-name">@your_x_account</div>
          <div class="x-handle">連携済み</div>
        </div>
        <i class="ti ti-circle-check-filled check-icon" aria-hidden="true"></i>
      </div>

      <div class="form-group">
        <label>ニックネーム</label>
        <input type="text" id="nickname" placeholder="例：さぬきうどん太郎" maxlength="20">
      </div>

      <div class="form-group">
        <label>お住まいの市町村 <span class="optional">任意</span></label>
        <select id="city">
          <option value="">選択してください</option>
          <optgroup label="東讃">
            <option>高松市</option>
            <option>さぬき市</option>
            <option>東かがわ市</option>
            <option>三木町</option>
            <option>直島町</option>
          </optgroup>
          <optgroup label="西讃">
            <option>丸亀市</option>
            <option>坂出市</option>
            <option>善通寺市</option>
            <option>観音寺市</option>
            <option>三豊市</option>
            <option>宇多津町</option>
            <option>綾川町</option>
            <option>琴平町</option>
            <option>多度津町</option>
            <option>まんのう町</option>
          </optgroup>
          <optgroup label="小豆島・離島">
            <option>小豆島町</option>
            <option>土庄町</option>
          </optgroup>
        </select>
        <div class="city-note">うどん屋の近くのユーザーと繋がりやすくなります</div>
      </div>

      <div class="form-group">
        <label>自己紹介 <span class="optional">任意</span></label>
        <textarea id="bio" placeholder="例：坂出出身、釜玉派。週5でうどん食べてます。"></textarea>
      </div>

      <div class="terms">
        <input type="checkbox" id="agree">
        <div class="terms-text">
          <a href="#">利用規約</a>および<a href="#">プライバシーポリシー</a>に同意する
        </div>
      </div>

      <button class="btn-primary" id="submit-btn" onclick="completeRegister()" disabled>登録する</button>
    </div>

    <!-- ステップ3: 完了 -->
    <div class="step-panel" id="step3">
      <div class="success-icon">
        <i class="ti ti-check" aria-hidden="true"></i>
      </div>
      <div class="success-title">登録完了！</div>
      <p class="success-desc">うどんログへようこそ。<br>さっそく今日食べたうどんを記録してみましょう。</p>
      <a href="index.html" class="btn-start">うどんログを始める →</a>
    </div>

    <!-- フッター -->
    <div class="footer-link" id="footer-link">
      すでにアカウントをお持ちの方は <a href="#">ログイン</a>
    </div>
  </div>

  <script>
    const agreeCheckbox = document.getElementById('agree');
    const submitBtn = document.getElementById('submit-btn');
    const nicknameInput = document.getElementById('nickname');

    function updateSubmitBtn() {
      const agreed = agreeCheckbox.checked;
      const hasNickname = nicknameInput.value.trim().length > 0;
      submitBtn.disabled = !(agreed && hasNickname);
    }

    agreeCheckbox.addEventListener('change', updateSubmitBtn);
    nicknameInput.addEventListener('input', updateSubmitBtn);

    function connectX() {
      document.getElementById('step1').classList.remove('active');
      document.getElementById('loading').style.display = 'block';
      document.getElementById('dot1').classList.remove('active');

      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('step2').classList.add('active');
        document.getElementById('dot1').classList.add('done');
        document.getElementById('dot2').classList.add('active');
      }, 1800);
    }

    function completeRegister() {
      document.getElementById('step2').classList.remove('active');
      document.getElementById('dot2').classList.remove('active');
      document.getElementById('dot2').classList.add('done');
      document.getElementById('dot3').classList.add('active');
      document.getElementById('step3').classList.add('active');
      document.getElementById('footer-link').style.display = 'none';
    }
  </script>

</body>
</html>
