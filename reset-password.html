<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新しいパスワードの設定 — うどログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: #FAFAF8; color: #1a1a1a; line-height: 1.7; font-size: 16px;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem 1.25rem;
    }
    .card {
      background: #fff; border: 0.5px solid #e5e5e0; border-radius: 16px;
      padding: 2.5rem 2rem; width: 100%; max-width: 420px;
    }
    .section-title { font-size: 18px; font-weight: 500; margin-bottom: 0.5rem; }
    .section-desc { font-size: 14px; color: #666; margin-bottom: 1.5rem; line-height: 1.6; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%; padding: 10px 12px; border: 0.5px solid #d0d0ca; border-radius: 8px;
      font-size: 16px; color: #1a1a1a; background: #fff; outline: none; font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus { border-color: #BA7517; box-shadow: 0 0 0 3px rgba(186, 117, 23, 0.1); }
    .field-note { font-size: 12px; color: #888; margin-top: 4px; }
    .btn-submit {
      width: 100%; background: #8A5510; color: #fff; border: none; padding: 14px;
      border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 0.5rem;
    }
    .btn-submit:hover { background: #6F440C; }
    .btn-submit:disabled { opacity: 0.5; cursor: default; }
    .back-link { text-align: center; margin-top: 1.5rem; font-size: 14px; }
    .back-link a { color: #8A5510; text-decoration: none; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }
    .back-link a:hover { text-decoration: underline; }

    .done-panel, .error-panel { display: none; text-align: center; }
    .done-icon, .error-icon {
      width: 64px; height: 64px; margin: 0 auto 1.25rem; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 32px;
    }
    .done-icon { background: #F0FAF3; border: 0.5px solid #A8D9B5; color: #5BAD6F; }
    .error-icon { background: #FDF3F2; border: 0.5px solid #F0C8C4; color: #C0392B; }
    .done-title, .error-title { font-size: 18px; font-weight: 600; margin-bottom: 0.75rem; }
    .done-desc, .error-desc { font-size: 14px; color: #666; line-height: 1.7; margin-bottom: 0.5rem; }
  </style>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#BA7517">
  <meta name="robots" content="noindex">
  <script src="api.js"></script>
  <script src="header.js"></script>
  <script src="analytics.js"></script>
  <script src="toast.js"></script>
</head>
<body>
  <div class="card">

    <!-- 入力フォーム -->
    <div id="formPanel">
      <h1 class="section-title">新しいパスワードの設定</h1>
      <p class="section-desc">新しいパスワードを入力してください。</p>

      <form onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label for="password">新しいパスワード</label>
          <input type="password" id="password" placeholder="8文字以上" autocomplete="new-password" required>
          <div class="field-note">8文字以上で設定してください</div>
        </div>
        <div class="form-group">
          <label for="password2">新しいパスワード（確認）</label>
          <input type="password" id="password2" placeholder="もう一度入力" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">パスワードを設定する</button>
      </form>

      <div class="back-link">
        <a href="login.html"><i class="ti ti-arrow-left"></i> ログインにもどる</a>
      </div>
    </div>

    <!-- 完了 -->
    <div class="done-panel" id="donePanel">
      <div class="done-icon"><i class="ti ti-circle-check"></i></div>
      <div class="done-title">パスワードを変更しました</div>
      <p class="done-desc">新しいパスワードでログインできます。</p>
      <div class="back-link">
        <a href="login.html"><i class="ti ti-arrow-right"></i> ログインへ進む</a>
      </div>
    </div>

    <!-- エラー（トークン不正・期限切れ） -->
    <div class="error-panel" id="errorPanel">
      <div class="error-icon"><i class="ti ti-alert-triangle"></i></div>
      <div class="error-title">リンクが無効です</div>
      <p class="error-desc" id="errorDesc">
        リンクの有効期限が切れているか、すでに使用されています。<br>
        お手数ですが、もう一度パスワード再設定をやり直してください。
      </p>
      <div class="back-link">
        <a href="forgot-password.html"><i class="ti ti-refresh"></i> パスワード再設定をやり直す</a>
      </div>
    </div>

  </div>

  <script>
    const token = new URLSearchParams(location.search).get('token') || '';

    // トークンが無い／形式不正ならフォームを出さずエラー表示
    if (!/^[0-9a-f]{64}$/.test(token)) {
      document.getElementById('formPanel').style.display = 'none';
      document.getElementById('errorPanel').style.display = 'block';
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const pw1 = document.getElementById('password').value;
      const pw2 = document.getElementById('password2').value;
      if (pw1.length < 8) { showToast('パスワードは8文字以上にしてください', { error: true }); return; }
      if (pw1 !== pw2) { showToast('確認用パスワードが一致しません', { error: true }); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '設定中…';
      try {
        await API.refresh();
        await API.post('password_reset.php', { token: token, password: pw1 });
        document.getElementById('formPanel').style.display = 'none';
        document.getElementById('donePanel').style.display = 'block';
      } catch (err) {
        // 期限切れ・使用済みトークンはエラーパネルに、それ以外はalertで再入力
        const msg = err.message || '';
        if (/有効期限|使用|リンク/.test(msg)) {
          document.getElementById('errorDesc').innerHTML = msg;
          document.getElementById('formPanel').style.display = 'none';
          document.getElementById('errorPanel').style.display = 'block';
        } else {
          showToast(msg || '設定に失敗しました', { error: true });
          btn.disabled = false;
          btn.textContent = 'パスワードを設定する';
        }
      }
    }
  </script>

</body>
</html>
