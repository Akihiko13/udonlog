<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="うどまる ようこそ（手を振る）">
  <title>うどまる - ようこそ</title>
  <!-- 丼 -->
  <ellipse cx="60" cy="86" rx="42" ry="26" fill="#BA7517"/>
  <ellipse cx="60" cy="80" rx="42" ry="22" fill="#FAC775"/>
  <ellipse cx="60" cy="78" rx="36" ry="17" fill="#FAF6EE"/>
  <!-- 麺ループ（左） -->
  <path d="M40 78 Q44 56 50 78" stroke="#EADBB8" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- 手を振る腕（右・体を持ち上げて挨拶） -->
  <path d="M75 73 Q92 60 90 43" stroke="#FAF6EE" stroke-width="11" fill="none" stroke-linecap="round"/>
  <path d="M75 73 Q92 60 90 43" stroke="#EADBB8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
  <circle cx="90" cy="41" r="8" fill="#FAF6EE" stroke="#EADBB8" stroke-width="2"/>
  <!-- きらめき（挨拶の弾み・4方向のキラキラ） -->
  <path d="M104 38 l2 5 5 2 -5 2 -2 5 -2-5 -5-2 5-2 z" fill="#FAC775"/>
  <path d="M100 53 l1.4 3.4 3.4 1.4 -3.4 1.4 -1.4 3.4 -1.4-3.4 -3.4-1.4 3.4-1.4 z" fill="#FAC775" opacity="0.85"/>
  <!-- 頭 -->
  <circle cx="60" cy="60" r="22" fill="#FAF6EE" stroke="#EADBB8" stroke-width="2"/>
  <!-- 顔（にっこり＋ほっぺ） -->
  <circle cx="52" cy="58" r="3.2" fill="#444441"/>
  <circle cx="68" cy="58" r="3.2" fill="#444441"/>
  <ellipse cx="48" cy="65" rx="4" ry="2.6" fill="#F0997B" opacity="0.6"/>
  <ellipse cx="72" cy="65" rx="4" ry="2.6" fill="#F0997B" opacity="0.6"/>
  <path d="M55 65 Q60 70 65 65" stroke="#444441" stroke-width="2.2" fill="none" stroke-linecap="round"/>
</svg>
