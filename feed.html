<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/">
  <title>新着投稿 — うどログ</title>
  <meta name="description" content="うどログの新着投稿。誰がいつどのお店でどんな一杯を食べたか、みんなの記録を新着順で。">
  <meta property="og:title" content="新着投稿 — うどログ">
  <meta property="og:description" content="うどログの新着投稿。みんなのうどん記録を新着順で。">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="tabler-icons.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #BA7517;
      --amber-dark: #8A5510;
      --amber-darker: #6F440C;
      --amber-light: #FFF8EE;
      --amber-border: #F0D9C0;
      --bg: #FAFAF8;
      --white: #fff;
      --border: #e5e5e0;
      --text: #1a1a1a;
      --text-sub: #666;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 16px;
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    .page-header {
      position: sticky;
      top: var(--ulog-top, 54px);
      transition: top 0.22s ease;
      background: rgba(250,250,248,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1.25rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
    }
    .header-title { font-size: 16px; font-weight: 600; }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem;
    }

    .feed-intro { color: var(--text-sub); font-size: 13px; margin-bottom: 1rem; }

    /* 新着／フォロー中 タブ */
    .feed-tabs { display: flex; margin-bottom: 1rem; border-bottom: 0.5px solid var(--border); }
    .feed-tab {
      flex: 1; background: none; border: none; padding: 12px 0;
      font-size: 14px; font-weight: 600; color: var(--text-sub);
      cursor: pointer; font-family: inherit; position: relative;
    }
    .feed-tab.active { color: var(--amber-dark); }
    .feed-tab.active::after {
      content: ''; position: absolute; left: 0; right: 0; bottom: -0.5px;
      height: 2px; background: var(--amber); border-radius: 2px;
    }

    /* 投稿カード（shop-detail の「みんなの投稿」を流用） */
    .post-card {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 10px;
    }
    .post-card:last-child { margin-bottom: 0; }

    .post-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .post-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      font-weight: 600;
      color: #fff;
      overflow: hidden;
      text-decoration: none;
    }
    .post-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }

    .post-user-name { font-size: 14px; font-weight: 600; }
    .post-user-link { color: inherit; text-decoration: none; }
    .post-user-link:hover { color: var(--amber-dark); text-decoration: underline; }
    .post-date { font-size: 12px; color: #888; margin-top: 1px; }

    /* 長い名前でもフォローボタンを押し出さない */
    .post-header-main { min-width: 0; }

    /* 投稿ヘッダーのフォローボタン（右端・コンパクト） */
    .post-follow-btn {
      margin-left: auto;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: var(--amber-dark);
      color: #fff;
      border: 1px solid var(--amber-dark);
      border-radius: 99px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
    .post-follow-btn:hover { background: var(--amber-darker); border-color: var(--amber-darker); }
    .post-follow-btn:disabled { opacity: 0.6; cursor: default; }
    /* フォロー中は白抜き（もう一度押すと解除） */
    .post-follow-btn.following {
      background: #fff;
      color: var(--amber-dark);
      border-color: #d9c3a3;
    }
    .post-follow-btn.following:hover { background: #fbeee0; }

    /* 店名（この投稿がどの店のものか） */
    .post-shop {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-weight: 600;
      color: var(--amber-dark);
      text-decoration: none;
      margin-bottom: 8px;
    }
    .post-shop:hover { text-decoration: underline; }
    .post-shop i { font-size: 14px; }

    .post-menu {
      display: inline-block;
      background: var(--amber-light);
      color: var(--amber);
      font-size: 12px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 99px;
      margin-bottom: 6px;
    }
    .post-photo {
      width: 100%;
      /* 固定200pxだとPCで超横長に切り抜かれ丼の上下が欠けるため、
         4:3の比率で見せる（縦に間延びしないよう上限だけ設ける） */
      aspect-ratio: 4 / 3;
      max-height: 420px;
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .post-photo img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: pointer; }
    .post-comment { font-size: 14px; color: var(--text); line-height: 1.6; }

    .post-likes {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 10px;
      font-size: 13px;
      color: #888;
      cursor: pointer;
      width: fit-content;
    }
    .post-likes:hover { color: #e05a77; }
    .post-likes.liked { color: #e05a77; }

    .feed-more-btn {
      display: block; width: 100%; margin-top: 14px; padding: 12px;
      background: none; border: 0.5px solid var(--amber-border); border-radius: 10px;
      color: var(--amber-dark); font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: inherit;
    }
    .feed-more-btn:hover { background: #fbf3e6; }
    .feed-more-btn:disabled { opacity: 0.5; cursor: default; }

    .feed-empty, .feed-end {
      text-align: center; color: #888; font-size: 14px; padding: 2rem 0;
    }

    /* 自動読み込み中の表示（くるくる） */
    .feed-loading {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      color: #999; font-size: 14px; padding: 1.5rem 0;
    }
    .feed-loading .ti { font-size: 20px; animation: feed-spin 0.8s linear infinite; }
    @keyframes feed-spin { to { transform: rotate(360deg); } }

    /* 写真ライトボックス */
    .photo-lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: none; align-items: center; justify-content: center; z-index: 1000; padding: 1rem;
    }
    .photo-lightbox.show { display: flex; }
    .photo-lightbox img { max-width: 100%; max-height: 100%; border-radius: 8px; }

    /* トースト */
    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a; color: #fff; padding: 12px 20px; border-radius: 99px;
      font-size: 14px; opacity: 0; transition: opacity 0.3s, transform 0.3s;
      pointer-events: none; white-space: nowrap; z-index: 1100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
  <script src="api.js"></script>
  <script src="time.js"></script>
  <script src="comments.js"></script>
  <script src="header.js"></script>
  <script src="analytics.js"></script>
</head>
<body>
  <div class="page-header">
    <span class="header-title">新着投稿</span>
  </div>

  <div class="container">
    <div class="feed-tabs">
      <button class="feed-tab active" data-mode="new" onclick="switchFeed('new')">新着</button>
      <button class="feed-tab" data-mode="following" onclick="switchFeed('following')">フォロー中</button>
    </div>
    <p class="feed-intro">みんなのうどん記録。タップして投稿者やお店を見に行けます。</p>
    <div id="feedList"></div>
    <div id="feedStatus"></div>
    <!-- 無限スクロールの見張り役（画面に入ると次の30件を自動読み込み） -->
    <div id="feedSentinel" aria-hidden="true"></div>
  </div>

  <div class="photo-lightbox" id="photoLightbox" onclick="closePhoto()">
    <img id="photoLightboxImg" src="" alt="投稿写真">
  </div>
  <div class="toast" id="toast"></div>

  <script src="shops-data.js"></script>
  <script>
    // 店ID → 店データ の逆引き（店名・きれいURL用のslugを引く）
    const SHOP_BY_ID = {};
    (typeof SHOPS !== 'undefined' ? SHOPS : []).forEach(s => { SHOP_BY_ID[s.id] = s; });

    let nextBefore = null;   // 次ページのカーソル（null＝先頭 or 続きなし）
    let hasMore = true;
    let loading = false;
    let feedMode = 'new';    // 'new'（新着）or 'following'（フォロー中）
    let feedToken = 0;       // タブ切替時に古い取得結果を破棄するためのトークン

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => (
        { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]
      ));
    }

    function formatPostDate(d) {
      if (!d) return '';
      const dt = new Date(d);
      if (isNaN(dt)) return '';
      return `${dt.getFullYear()}年${dt.getMonth() + 1}月${dt.getDate()}日`;
    }

    // 1件分のカードHTML
    function postCardHtml(p) {
      const menu = (p.menus && p.menus.length) ? p.menus.join('・') : '';
      // 投稿日時（savedAt）を相対表記に。ホバーで正確な日時を表示。
      const ts = p.savedAt || p.visitDate;
      const dateStr = window.ulogTimeAgo ? ulogTimeAgo(ts) : formatPostDate(p.visitDate || p.savedAt);
      const dateTitle = window.ulogDateFull ? ulogDateFull(ts) : '';
      const nick = p.nickname || 'うどん好き';
      const initial = escapeHtml((nick.charAt(0) || 'う'));
      const avatarInner = p.avatarUrl
        ? `<img src="${escapeHtml(p.avatarUrl)}" alt="${escapeHtml(nick)}">`
        : initial;
      const avatarHtml = p.username
        ? `<a class="post-avatar" style="background:#BA7517" href="/${encodeURIComponent(p.username)}">${avatarInner}</a>`
        : `<div class="post-avatar" style="background:#BA7517">${avatarInner}</div>`;
      const nameInner = p.username
        ? `<a class="post-user-link" href="/${encodeURIComponent(p.username)}">${escapeHtml(nick)}</a>`
        : escapeHtml(nick);

      // 投稿ヘッダーのフォローボタン（ログイン中かつ自分以外の投稿にだけ表示）。
      // 同じ人が複数投稿していても data-user で一括更新できるようにする。
      const showFollow = API.isLoggedIn && API.isLoggedIn() && !p.isSelf && p.userId;
      const followHtml = showFollow
        ? `<button class="post-follow-btn${p.isFollowing ? ' following' : ''}" data-user="${p.userId}" onclick="toggleFollow(this)">${followLabel(!!p.isFollowing)}</button>`
        : '';

      // 店名リンク（SHOPSから引く。万一データに無ければ shop-detail に id で飛ばす）
      const shop = SHOP_BY_ID[p.shopId];
      let shopHtml = '';
      if (shop) {
        const href = 'shops/' + (shop.slug || ('shop' + shop.id));
        shopHtml = `<a class="post-shop" href="${escapeHtml(href)}"><i class="ti ti-map-pin"></i>${escapeHtml(shop.name)}</a>`;
      } else if (p.shopId) {
        shopHtml = `<a class="post-shop" href="shop-detail.html?id=${p.shopId}"><i class="ti ti-map-pin"></i>お店を見る</a>`;
      }

      return `
        <div class="post-card">
          <div class="post-header">
            ${avatarHtml}
            <div class="post-header-main">
              <div class="post-user-name">${nameInner}</div>
              <div class="post-date" title="${escapeHtml(dateTitle)}">${dateStr}</div>
            </div>
            ${followHtml}
          </div>
          ${shopHtml}
          ${menu ? `<span class="post-menu">${escapeHtml(menu)}</span>` : ''}
          ${p.photoUrl ? `<div class="post-photo"><img src="${escapeHtml(p.photoUrl)}" alt="投稿写真" loading="lazy" onclick="openPhoto(this.src)" onerror="this.parentNode.style.display='none'"></div>` : ''}
          ${p.comment ? `<div class="post-comment">${escapeHtml(p.comment)}</div>` : ''}
          <div class="ulog-post-actions">
            <div class="post-likes${p.liked ? ' liked' : ''}" data-log="${p.logId}" onclick="toggleLike(this)" title="いいね">
              <i class="ti ti-heart${p.liked ? '-filled' : ''}"></i>
              <span class="post-like-count">${p.likeCount || 0}</span>
            </div>
            <div class="ulog-cmt-btn" onclick="ulogCmtToggle(${p.logId})" title="コメント">
              <i class="ti ti-message-circle"></i>
              <span id="ulog-cmt-count-${p.logId}">${p.commentCount || 0}</span>
            </div>
          </div>
          <div class="ulog-cmt-box" id="ulog-cmt-box-${p.logId}" hidden></div>
        </div>`;
    }

    // 次の30件を取得して追記
    async function loadMore() {
      if (loading || !hasMore) return;
      loading = true;
      const statusEl = document.getElementById('feedStatus');
      statusEl.innerHTML = '<div class="feed-loading"><i class="ti ti-loader-2"></i>読み込み中…</div>';

      const myToken = feedToken;
      try {
        const qs = [];
        if (feedMode === 'following') qs.push('following=1');
        if (nextBefore) qs.push('before_id=' + nextBefore);
        const q = qs.length ? ('?' + qs.join('&')) : '';
        const res = await API.get('recent_logs.php' + q);
        if (myToken !== feedToken) { loading = false; return; }   // タブが切り替わっていたら破棄
        const posts = res.posts || [];
        const listEl = document.getElementById('feedList');
        listEl.insertAdjacentHTML('beforeend', posts.map(postCardHtml).join(''));

        hasMore = !!res.hasMore;
        nextBefore = res.nextBefore;

        if (listEl.children.length === 0) {
          statusEl.innerHTML = feedMode === 'following'
            ? '<div class="feed-empty">' +
              '<img src="images/udomaru-hungry.svg" alt="うどまる" width="100" height="100" style="display:block;margin:0 auto 6px;">' +
              'フォロー中の人の新着はまだありません。<br>気になる人のプロフィールから「フォロー」してみよう。</div>'
            : '<div class="feed-empty">' +
              '<img src="images/udomaru-hungry.svg" alt="うどまる" width="100" height="100" style="display:block;margin:0 auto 6px;">' +
              'まだ公開された投稿がありません。</div>';
        } else if (hasMore) {
          statusEl.innerHTML = '';   // ボタンは出さず、スクロールで自動読み込み
          requestAnimationFrame(fillIfNeeded);   // 画面がまだ埋まっていなければ続けて読む
        } else {
          statusEl.innerHTML = '<div class="feed-end">これ以上の投稿はありません</div>';
        }
      } catch (e) {
        statusEl.innerHTML =
          '<div class="feed-empty">読み込みに失敗しました。<br>' +
          '<button class="feed-more-btn" onclick="loadMore()">もう一度試す</button></div>';
      } finally {
        loading = false;
      }
    }

    // タブ切替（新着／フォロー中）
    function switchFeed(mode) {
      if (mode === feedMode) return;
      feedMode = mode;
      feedToken++;             // 進行中の取得結果を無効化
      document.querySelectorAll('.feed-tab').forEach(function (t) {
        t.classList.toggle('active', t.dataset.mode === mode);
      });
      const listEl = document.getElementById('feedList');
      const statusEl = document.getElementById('feedStatus');
      listEl.innerHTML = '';
      statusEl.innerHTML = '';
      nextBefore = null; hasMore = true; loading = false;

      // フォロー中は未ログインだと見られない
      if (mode === 'following' && !(API.isLoggedIn && API.isLoggedIn())) {
        hasMore = false;   // スクロールしても自動読み込みしない
        statusEl.innerHTML =
          '<div class="feed-empty">フォロー中の投稿を見るには<br>' +
          '<a href="login.html?next=' + encodeURIComponent(location.pathname) + '">ログイン</a>してください。</div>';
        return;
      }
      loadMore();
    }

    // 無限スクロール：センチネルが画面に入ったら次の30件を読み込む
    function setupInfiniteScroll() {
      const sentinel = document.getElementById('feedSentinel');
      if (!sentinel || !('IntersectionObserver' in window)) return;
      const io = new IntersectionObserver(function (entries) {
        if (entries[0].isIntersecting) loadMore();
      }, { rootMargin: '400px 0px' });   // 下端に届く少し手前で先読み
      io.observe(sentinel);
    }

    // 読み込み後、まだ画面が埋まっていない（センチネルが見えている）なら続けて読む
    function fillIfNeeded() {
      if (loading || !hasMore) return;
      const s = document.getElementById('feedSentinel');
      if (s && s.getBoundingClientRect().top < window.innerHeight + 400) loadMore();
    }

    // いいねトグル（ログイン必須・サーバー保存）
    async function toggleLike(el) {
      const logId = parseInt(el.dataset.log, 10);
      if (!logId || el.dataset.busy) return;
      try {
        await API.refresh();
        if (!API.isLoggedIn()) {
          location.href = 'login.html?next=' + encodeURIComponent(location.pathname + location.search);
          return;
        }
        el.dataset.busy = '1';
        const res = await API.post('like_toggle.php', { log_id: logId });
        const liked = res.liked === 1;
        el.classList.toggle('liked', liked);
        el.querySelector('i').className = 'ti ti-heart' + (liked ? '-filled' : '');
        el.querySelector('.post-like-count').textContent = res.count;
      } catch (e) {
        showToast(e.message || 'いいねに失敗しました');
      } finally {
        delete el.dataset.busy;
      }
    }

    // フォローボタンの中身（フォロー中は白抜き＋チェック）
    function followLabel(following) {
      return following
        ? '<i class="ti ti-check"></i>フォロー中'
        : '<i class="ti ti-plus"></i>フォロー';
    }

    // 投稿ヘッダーからフォロー/解除（ログイン必須）。
    // 同じ人が複数投稿していても、全カードのボタンをまとめて更新する。
    async function toggleFollow(btn) {
      const userId = parseInt(btn.dataset.user, 10);
      if (!userId || btn.dataset.busy) return;
      const sel = '.post-follow-btn[data-user="' + userId + '"]';
      try {
        await API.refresh();
        if (!API.isLoggedIn()) {
          location.href = 'login.html?next=' + encodeURIComponent(location.pathname + location.search);
          return;
        }
        document.querySelectorAll(sel).forEach(function (b) { b.dataset.busy = '1'; b.disabled = true; });
        const res = await API.post('follow_toggle.php', { user_id: userId });
        const following = res.following === 1;
        document.querySelectorAll(sel).forEach(function (b) {
          b.classList.toggle('following', following);
          b.innerHTML = followLabel(following);
          b.disabled = false;
          delete b.dataset.busy;
        });
        showToast(following ? 'フォローしました' : 'フォローを解除しました');
      } catch (e) {
        document.querySelectorAll(sel).forEach(function (b) { b.disabled = false; delete b.dataset.busy; });
        showToast(e.message || 'フォローに失敗しました');
      }
    }

    function openPhoto(src) {
      document.getElementById('photoLightboxImg').src = src;
      document.getElementById('photoLightbox').classList.add('show');
      document.body.style.overflow = 'hidden';
    }
    function closePhoto() {
      document.getElementById('photoLightbox').classList.remove('show');
      document.body.style.overflow = '';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // いいね状態を正しく出すため、先にログイン状態を確定してから読み込む。
    // 初回読み込みが終わってから監視を始める（refresh前にIOが発火して
    // いいね状態が欠けるのを防ぐ）。
    API.refresh().catch(() => {}).finally(async () => {
      await loadMore();
      setupInfiniteScroll();
    });
  </script>
</body>
</html>
