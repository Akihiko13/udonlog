<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アカウント登録 — うどんログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: #FAFAF8;
      color: #1a1a1a;
      line-height: 1.7;
      font-size: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .card {
      background: #fff;
      border: 0.5px solid #e5e5e0;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-title {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .logo-sub { font-size: 14px; color: #888; }

    .steps {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 2rem;
    }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e5e5e0;
      transition: background 0.2s;
    }

    .step-dot.active { background: #BA7517; }
    .step-dot.done { background: #5BAD6F; }

    .step-panel { display: none; }
    .step-panel.active { display: block; }

    .step-title {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .step-desc {
      font-size: 14px;
      color: #666;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    /* Xボタン */
    .btn-x {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #000;
      color: #fff;
      border: none;
      padding: 13px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-x:hover { background: #222; }

    .btn-x svg {
      width: 18px;
      height: 18px;
      fill: #fff;
      flex-shrink: 0;
    }

    /* Googleボタン */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #fff;
      color: #3c4043;
      border: 1px solid #dadce0;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .btn-google:hover { background: #f8f9fa; border-color: #d2d3d4; }

    .btn-google svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* 区切り */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.25rem 0;
      color: #bbb;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-top: 0.5px solid #e5e5e0;
    }

    /* フォーム共通 */
    .form-group { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }

    .optional {
      font-size: 11px;
      color: #aaa;
      font-weight: 400;
      margin-left: 4px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 0.5px solid #d0d0ca;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #BA7517;
      box-shadow: 0 0 0 3px rgba(186, 117, 23, 0.1);
    }

    textarea { resize: vertical; min-height: 72px; line-height: 1.5; }

    /* パスワード入力欄 */
    .password-wrap {
      position: relative;
    }

    .password-wrap input { padding-right: 42px; }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      font-size: 17px;
      padding: 0;
      line-height: 1;
    }

    .toggle-pw:hover { color: #666; }

    /* メール登録ボタン */
    .btn-email {
      width: 100%;
      background: #BA7517;
      color: #fff;
      border: none;
      padding: 13px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.25rem;
    }

    .btn-email:hover { background: #9A6010; }
    .btn-email:disabled { background: #d0b080; cursor: not-allowed; }

    /* 認証済みバッジ（ステップ2） */
    .auth-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 1.5rem;
    }

    .auth-badge.x-badge {
      background: #F0FAF3;
      border: 0.5px solid #A8D9B5;
    }

    .auth-badge.email-badge {
      background: #FFF8EE;
      border: 0.5px solid #F0D9C0;
    }

    .badge-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .badge-icon.x { background: #000; }
    .badge-icon.x svg { width: 18px; height: 18px; fill: #fff; }
    .badge-icon.email { background: #FAEEDA; font-size: 18px; }

    .badge-label { font-size: 14px; font-weight: 500; }
    .badge-sub { font-size: 12px; color: #888; }

    .badge-check {
      margin-left: auto;
      font-size: 20px;
      color: #5BAD6F;
    }

    .city-note { font-size: 12px; color: #aaa; margin-top: 4px; }

    /* 利用規約 */
    .terms {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 1.25rem;
      margin-top: 0.25rem;
    }

    .terms input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin-top: 3px;
      accent-color: #BA7517;
      flex-shrink: 0;
    }

    .terms-text { font-size: 13px; color: #666; line-height: 1.5; }
    .terms-text a { color: #BA7517; text-decoration: none; }
    .terms-text a:hover { text-decoration: underline; }

    .btn-primary {
      width: 100%;
      background: #BA7517;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-primary:hover { background: #9A6010; }
    .btn-primary:disabled { background: #d0b080; cursor: not-allowed; }

    /* 完了 */
    .success-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #F0FAF3;
      border: 2px solid #5BAD6F;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 28px;
      color: #5BAD6F;
    }

    .success-title { text-align: center; font-size: 20px; font-weight: 500; margin-bottom: 0.5rem; }

    .success-desc {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .btn-start {
      display: block;
      width: 100%;
      background: #BA7517;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }

    .btn-start:hover { background: #9A6010; }

    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 13px;
      color: #888;
    }

    .footer-link a { color: #BA7517; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }

    .loading {
      display: none;
      text-align: center;
      padding: 1.5rem 0;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e5e5e0;
      border-top-color: #BA7517;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 0.75rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">
      <div class="logo-title">うどんログ</div>
      <div class="logo-sub">さぬきうどん記録・交流サービス</div>
    </div>

    <div class="steps">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <div class="step-dot" id="dot3"></div>
    </div>

    <!-- ステップ1: 登録方法を選ぶ -->
    <div class="step-panel active" id="step1">
      <div class="step-title">アカウント登録</div>
      <p class="step-desc">登録方法を選んでください。どちらでも無料で始められます。</p>

      <!-- Google登録（表示のみ・Google Cloud Console登録後に有効化） -->
      <button class="btn-google" onclick="alert('Googleでの登録は準備中です。')">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Googleで続ける
      </button>

      <button class="btn-x" onclick="connectX()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.912-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        Xアカウントで続ける
      </button>

      <div class="divider">または</div>

      <div class="form-group">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" placeholder="example@email.com">
      </div>

      <div class="form-group">
        <label for="password">パスワード</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="8文字以上">
          <button class="toggle-pw" type="button" onclick="togglePassword()" id="toggle-pw-btn" aria-label="パスワードを表示">
            <i class="ti ti-eye" id="pw-icon"></i>
          </button>
        </div>
      </div>

      <button class="btn-email" id="email-btn" onclick="connectEmail()" disabled>
        メールアドレスで続ける
      </button>
    </div>

    <!-- ローディング -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div style="font-size:14px; color:#888;" id="loading-text">接続しています...</div>
    </div>

    <!-- ステップ2: プロフィール入力 -->
    <div class="step-panel" id="step2">
      <div class="step-title">プロフィールを設定</div>
      <p class="step-desc">うどんログ内で表示される情報を入力してください。</p>

      <!-- X連携バッジ -->
      <div class="auth-badge x-badge" id="x-badge" style="display:none;">
        <div class="badge-icon x">
          <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.912-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </div>
        <div>
          <div class="badge-label">@your_x_account</div>
          <div class="badge-sub">Xアカウント連携済み</div>
        </div>
        <i class="ti ti-circle-check-filled badge-check" aria-hidden="true"></i>
      </div>

      <!-- メールバッジ -->
      <div class="auth-badge email-badge" id="email-badge" style="display:none;">
        <div class="badge-icon email">✉️</div>
        <div>
          <div class="badge-label" id="email-badge-addr"></div>
          <div class="badge-sub">メールアドレス登録</div>
        </div>
        <i class="ti ti-circle-check-filled badge-check" style="color:#BA7517;" aria-hidden="true"></i>
      </div>

      <div class="form-group">
        <label>ニックネーム</label>
        <input type="text" id="nickname" placeholder="例：さぬきうどん太郎" maxlength="20">
      </div>

      <div class="form-group">
        <label>お住まいの市町村 <span class="optional">任意</span></label>
        <select id="city">
          <option value="">選択してください</option>
          <optgroup label="東讃">
            <option>高松市</option>
            <option>さぬき市</option>
            <option>東かがわ市</option>
            <option>三木町</option>
            <option>直島町</option>
          </optgroup>
          <optgroup label="西讃">
            <option>丸亀市</option>
            <option>坂出市</option>
            <option>善通寺市</option>
            <option>観音寺市</option>
            <option>三豊市</option>
            <option>宇多津町</option>
            <option>綾川町</option>
            <option>琴平町</option>
            <option>多度津町</option>
            <option>まんのう町</option>
          </optgroup>
          <optgroup label="小豆島・離島">
            <option>小豆島町</option>
            <option>土庄町</option>
          </optgroup>
        </select>
        <div class="city-note">うどん屋の近くのユーザーと繋がりやすくなります</div>
      </div>

      <div class="form-group">
        <label>自己紹介 <span class="optional">任意</span></label>
        <textarea id="bio" placeholder="例：坂出出身、釜玉派。週5でうどん食べてます。"></textarea>
      </div>

      <div class="terms">
        <input type="checkbox" id="agree">
        <div class="terms-text">
          <a href="terms.html" target="_blank">利用規約</a>および<a href="privacy.html" target="_blank">プライバシーポリシー</a>に同意する
        </div>
      </div>

      <button class="btn-primary" id="submit-btn" onclick="completeRegister()" disabled>登録する</button>
    </div>

    <!-- ステップ3: 完了 -->
    <div class="step-panel" id="step3">
      <div class="success-icon">
        <i class="ti ti-check" aria-hidden="true"></i>
      </div>
      <div class="success-title">登録完了！</div>
      <p class="success-desc">うどんログへようこそ。<br>さっそく今日食べたうどんを記録してみましょう。</p>
      <a href="index.html" class="btn-start">うどんログを始める →</a>
    </div>

    <div class="footer-link" id="footer-link">
      すでにアカウントをお持ちの方は <a href="#">ログイン</a>
    </div>
  </div>

  <script>
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailBtn = document.getElementById('email-btn');
    const agreeCheckbox = document.getElementById('agree');
    const submitBtn = document.getElementById('submit-btn');
    const nicknameInput = document.getElementById('nickname');

    function validateEmail(v) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    }

    function updateEmailBtn() {
      const ok = validateEmail(emailInput.value) && passwordInput.value.length >= 8;
      emailBtn.disabled = !ok;
    }

    emailInput.addEventListener('input', updateEmailBtn);
    passwordInput.addEventListener('input', updateEmailBtn);

    function togglePassword() {
      const isText = passwordInput.type === 'text';
      passwordInput.type = isText ? 'password' : 'text';
      document.getElementById('pw-icon').className = isText ? 'ti ti-eye' : 'ti ti-eye-off';
    }

    function updateSubmitBtn() {
      submitBtn.disabled = !(agreeCheckbox.checked && nicknameInput.value.trim().length > 0);
    }

    agreeCheckbox.addEventListener('change', updateSubmitBtn);
    nicknameInput.addEventListener('input', updateSubmitBtn);

    function showStep2(method) {
      document.getElementById('step1').classList.remove('active');
      document.getElementById('loading').style.display = 'block';
      document.getElementById('dot1').classList.remove('active');

      const duration = method === 'x' ? 1800 : 900;
      document.getElementById('loading-text').textContent =
        method === 'x' ? 'Xと接続しています...' : 'メールアドレスを確認しています...';

      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('step2').classList.add('active');
        document.getElementById('dot1').classList.add('done');
        document.getElementById('dot2').classList.add('active');

        if (method === 'x') {
          document.getElementById('x-badge').style.display = 'flex';
        } else {
          const badge = document.getElementById('email-badge');
          document.getElementById('email-badge-addr').textContent = emailInput.value;
          badge.style.display = 'flex';
        }
      }, duration);
    }

    function connectX() { showStep2('x'); }
    function connectEmail() { showStep2('email'); }

    function completeRegister() {
      document.getElementById('step2').classList.remove('active');
      document.getElementById('dot2').classList.remove('active');
      document.getElementById('dot2').classList.add('done');
      document.getElementById('dot3').classList.add('active');
      document.getElementById('step3').classList.add('active');
      document.getElementById('footer-link').style.display = 'none';
    }
  </script>

</body>
</html>
