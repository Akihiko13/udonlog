<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店舗詳細 — うどんログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #BA7517;
      --amber-light: #FFF8EE;
      --amber-border: #F0D9C0;
      --bg: #FAFAF8;
      --white: #fff;
      --border: #e5e5e0;
      --text: #1a1a1a;
      --text-sub: #666;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 16px;
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    /* ヘッダー */
    .page-header {
      position: sticky;
      top: 0;
      background: rgba(250,250,248,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1.25rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--white);
      border: 0.5px solid var(--border);
      color: #444;
      text-decoration: none;
      font-size: 18px;
      flex-shrink: 0;
    }

    .back-btn:hover { background: #f5f5f0; }

    .header-title {
      font-size: 16px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem;
    }

    /* ショップヒーロー */
    .shop-hero {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem 1.5rem;
      margin-bottom: 1rem;
    }

    .shop-hero-top {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 1.25rem;
    }

    .shop-hero-icon {
      width: 60px;
      height: 60px;
      background: var(--amber);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .shop-hero-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .shop-hero-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .shop-hero-city {
      font-size: 14px;
      color: var(--text-sub);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .type-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
    }

    .type-self  { background: #EEF4FF; color: #3B6FD4; }
    .type-ippan { background: #F0FFF4; color: #2E8B57; }
    .type-men   { background: #FFF5E0; color: #BA7517; }

    /* 評価サマリー */
    .rating-summary {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--amber-light);
      border: 0.5px solid var(--amber-border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 1.25rem;
    }

    .rating-score {
      font-size: 36px;
      font-weight: 700;
      color: var(--amber);
      line-height: 1;
    }

    .rating-stars {
      display: flex;
      gap: 2px;
      margin-bottom: 4px;
    }

    .star { color: var(--amber); font-size: 16px; }
    .star.empty { color: #e0d8cc; }

    .rating-count { font-size: 13px; color: var(--text-sub); }

    .rating-bars {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-sub);
    }

    .bar-track {
      flex: 1;
      height: 6px;
      background: #e5e5e0;
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--amber);
      border-radius: 99px;
    }

    /* アクションボタン */
    .action-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-primary {
      flex: 1;
      background: var(--amber);
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: #9A6010; }

    .btn-secondary {
      flex: 1;
      background: var(--white);
      color: var(--text);
      border: 0.5px solid var(--border);
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .btn-secondary:hover { background: #f5f5f0; }

    /* セクション */
    .section {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    /* 基本情報 */
    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 0.5px solid var(--border);
      font-size: 14px;
    }

    .info-row:last-child { border-bottom: none; }

    .info-icon {
      color: var(--amber);
      font-size: 17px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .info-label { color: var(--text-sub); min-width: 70px; flex-shrink: 0; }
    .info-value { color: var(--text); font-weight: 500; }

    .map-link {
      color: var(--amber);
      text-decoration: none;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
    }

    .map-link:hover { text-decoration: underline; }

    /* 投稿一覧 */
    .posts-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .post-card {
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 10px;
    }

    .post-card:last-child { margin-bottom: 0; }

    .post-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .post-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      font-weight: 600;
      color: #fff;
    }

    .post-user-name { font-size: 14px; font-weight: 600; }
    .post-date { font-size: 12px; color: #aaa; margin-top: 1px; }

    .post-stars {
      display: flex;
      gap: 2px;
      margin-left: auto;
    }

    .post-star { font-size: 13px; color: var(--amber); }
    .post-star.empty { color: #e0d8cc; }

    .post-menu {
      display: inline-block;
      background: var(--amber-light);
      color: var(--amber);
      font-size: 12px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 99px;
      margin-bottom: 6px;
    }

    .post-photo {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 8px;
      background: #f0ede8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: #ccc;
    }

    .post-comment { font-size: 14px; color: var(--text); line-height: 1.6; }

    .post-likes {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 10px;
      font-size: 13px;
      color: #aaa;
      cursor: pointer;
    }

    .post-likes:hover { color: #e05a77; }
    .post-likes.liked { color: #e05a77; }

    /* 「もっと見る」ボタン */
    .btn-more {
      width: 100%;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      color: var(--text-sub);
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.15s;
    }

    .btn-more:hover { background: #f0ede8; }

    /* トースト */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      color: #fff;
      padding: 12px 20px;
      border-radius: 99px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .rating-bars { display: none; }
    }
  </style>
</head>

      document.getElementById('infoDish').textContent = shop.dish;
      document.getElementById('infoCity').textContent = shop.city;

      // タイプバッジ
      const badge = document.getElementById('shopTypeBadge');
      badge.textContent = shop.type;
      if (shop.type === 'セルフ') badge.className = 'type-badge type-self';
      else if (shop.type === '一般') badge.className = 'type-badge type-ippan';
      else badge.className = 'type-badge type-men';

      // 記録・地図ボタン
      document.getElementById('recordBtn').href =
        `record.html?name=${encodeURIComponent(shop.name)}&city=${encodeURIComponent(shop.city)}&type=${encodeURIComponent(shop.type)}`;
      document.getElementById('mapBtn').href =
        `https://www.google.com/maps/search/${encodeURIComponent(shop.name + ' ' + shop.city)}`;

      // 評価サマリー
      const total = Object.values(RATING_DIST).reduce((a, b) => a + b, 0);
      const avg = (Object.entries(RATING_DIST).reduce((a, [k, v]) => a + Number(k) * v, 0) / total).toFixed(1);
      document.getElementById('avgScore').textContent = avg;
      document.getElementById('reviewCount').textContent = `${total}件の記録`;

      // 星
      const starsEl = document.getElementById('avgStars');
      for (let i = 1; i <= 5; i++) {
        const s = document.createElement('span');
        s.className = 'star' + (i <= Math.round(avg) ? '' : ' empty');
        s.textContent = '★';
        starsEl.appendChild(s);
      }

      // 評価バー
      const barsEl = document.getElementById('ratingBars');
      [5,4,3,2,1].forEach(n => {
        const pct = Math.round((RATING_DIST[n] / total) * 100);
        barsEl.innerHTML += `
          <div class="bar-row">
            <span>${n}★</span>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            <span>${pct}%</span>
          </div>`;
      });

      // 投稿一覧
      document.getElementById('postsCount').textContent = `${DUMMY_POSTS.length}件表示中`;
      const postsEl = document.getElementById('postsList');
      postsEl.innerHTML = DUMMY_POSTS.map((p, i) => `
        <div class="post-card">
          <div class="post-header">
            <div class="post-avatar" style="background:${p.color}">${p.initial}</div>
            <div>
              <div class="post-user-name">${p.user}</div>
              <div class="post-date">${p.date}</div>
            </div>
            <div class="post-stars">
              ${[1,2,3,4,5].map(n => `<span class="post-star${n <= p.rating ? '' : ' empty'}">★</span>`).join('')}
            </div>
          </div>
          <span class="post-menu">${p.menu}</span>
          ${p.hasPhoto ? `<div class="post-photo" style="font-size:48px">🍜</div>` : ''}
          <div class="post-comment">${p.comment}</div>
          <div class="post-likes" onclick="toggleLike(this)">
            <i class="ti ti-heart"></i> ${p.likes}
          </div>
        </div>
      `).join('');
    }

    function toggleLike(el) {
      el.classList.toggle('liked');
      const icon = el.querySelector('i');
      const isLiked = el.classList.contains('liked');
      icon.className = isLiked ? 'ti ti-heart-filled' : 'ti ti-heart';
      const count = parseInt(el.textContent.trim());
      el.innerHTML = `<i class="ti ti-heart${isLiked ? '-filled' : ''}"></i> ${isLiked ? count + 1 : count - 1}`;
      el.classList.toggle('liked', isLiked);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>

</body>
</html>
