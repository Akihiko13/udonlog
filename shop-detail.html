<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店舗詳細 — うどログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #BA7517;
      --amber-light: #FFF8EE;
      --amber-border: #F0D9C0;
      --bg: #FAFAF8;
      --white: #fff;
      --border: #e5e5e0;
      --text: #1a1a1a;
      --text-sub: #666;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 16px;
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    /* ヘッダー */
    .page-header {
      position: sticky;
      top: 54px;
      background: rgba(250,250,248,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1.25rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--white);
      border: 0.5px solid var(--border);
      color: #444;
      text-decoration: none;
      font-size: 18px;
      flex-shrink: 0;
    }

    .back-btn:hover { background: #f5f5f0; }

    .header-title {
      font-size: 16px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem;
    }

    /* ショップヒーロー */
    .shop-hero {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem 1.5rem;
      margin-bottom: 1rem;
    }

    .shop-hero-top {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 1.25rem;
    }

    .shop-hero-icon {
      width: 60px;
      height: 60px;
      background: var(--amber);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .shop-hero-icon img { width: 78%; height: 78%; object-fit: contain; }
    .shop-hero-icon i { color: #fff; font-size: 30px; line-height: 1; }
    .post-photo img { width: 100%; height: 100%; object-fit: contain; }

    .shop-hero-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .shop-hero-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .shop-hero-city {
      font-size: 14px;
      color: var(--text-sub);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .type-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
    }

    .type-self  { background: #EEF4FF; color: #3B6FD4; }
    .type-ippan { background: #F0FFF4; color: #2E8B57; }
    .type-men   { background: #FFF5E0; color: #BA7517; }

    /* 評価サマリー */
    .rating-summary {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--amber-light);
      border: 0.5px solid var(--amber-border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 1.25rem;
    }

    .rating-score {
      font-size: 36px;
      font-weight: 700;
      color: var(--amber);
      line-height: 1;
    }

    .rating-stars {
      display: flex;
      gap: 2px;
      margin-bottom: 4px;
    }

    .star { color: var(--amber); font-size: 16px; }
    .star.empty { color: #e0d8cc; }

    .rating-count { font-size: 13px; color: var(--text-sub); }

    .rating-bars {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-sub);
    }

    .bar-track {
      flex: 1;
      height: 6px;
      background: #e5e5e0;
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--amber);
      border-radius: 99px;
    }

    /* アクションボタン */
    .my-rating {
      background: #FFF8EE;
      border: 0.5px solid #F0D9C0;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .my-rating-label {
      font-size: 14px;
      font-weight: 600;
      color: #8a6a3a;
    }

    .my-stars { display: flex; gap: 4px; }

    .my-star {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 26px;
      color: #e0d8cc;
      padding: 0;
      line-height: 1;
      transition: color 0.1s, transform 0.1s;
    }

    .my-star.active { color: var(--amber); }
    .my-star:hover { transform: scale(1.15); }

    .my-rating-text {
      font-size: 13px;
      color: #999;
      margin-left: auto;
    }

    /* 未記録の人は評価できない（星を無効化） */
    .my-rating.locked .my-star {
      pointer-events: none;
      color: #e6e0d6;
      cursor: default;
    }
    .my-rating.locked .my-rating-text { color: #b0a690; }

    /* あなたの訪問回数 */
    .my-visit {
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #BA7517 0%, #D89030 100%);
      color: #fff;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 1.25rem;
    }

    .my-visit-icon { font-size: 22px; line-height: 1; }
    .my-visit-icon img { width: 24px; height: 24px; object-fit: contain; vertical-align: middle; }
    .my-visit-icon i { font-size: 22px; line-height: 1; }

    /* 未記録の状態：アンバーをやめて控えめなグレー案内に */
    .my-visit.my-visit-empty {
      background: #f3f1ee;
      color: #888;
      border: 0.5px solid #ddd9d2;
    }
    .my-visit.my-visit-empty .my-visit-icon { opacity: 0.5; }
    .my-visit.my-visit-empty .my-visit-label { font-size: 14px; }

    .my-visit-num { font-size: 22px; font-weight: 800; }
    .my-visit-num small { font-size: 13px; font-weight: 600; margin-left: 1px; }
    .my-visit-label { font-size: 13px; opacity: 0.95; }
    .my-visit-sub { font-size: 12px; opacity: 0.85; margin-left: auto; text-align: right; }

    /* スマホでは2行に折り返す（1行目: あなたの訪問 ○杯／2行目: 最後の訪問…）*/
    @media (max-width: 480px) {
      .my-visit { flex-wrap: wrap; justify-content: center; }
      .my-visit-label { white-space: nowrap; }
      .my-visit-sub {
        flex-basis: 100%;
        margin-left: 0;
        text-align: center;
        margin-top: 2px;
      }
    }

    /* この店の常連カード（10杯でコンプリート＝常連認定） */
    .loyalty-card {
      background: linear-gradient(160deg, #FFFDF8 0%, #FBF3E6 100%);
      border: 0.5px solid #F0D9C0;
      border-radius: 14px;
      padding: 14px 16px 16px;
      margin-bottom: 1.25rem;
    }

    .loyalty-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 700;
      color: var(--amber);
      margin-bottom: 12px;
    }

    .loyalty-tag {
      background: var(--amber);
      color: #fff;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 99px;
    }

    .loyalty-slots {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .loy-slot {
      aspect-ratio: 1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
    }

    .loy-slot.empty {
      border: 2px dashed #e0d3bb;
      color: #d8cdb8;
    }

    .loy-slot.filled {
      background: #fff;
      border: 2px solid var(--amber);
      box-shadow: 0 1px 3px rgba(186,117,23,0.15);
    }

    .loy-slot.filled img { width: 20px; height: 20px; object-fit: contain; }
    .loy-slot.filled i { color: var(--amber); font-size: 17px; line-height: 1; }

    .loyalty-note {
      font-size: 12px;
      color: #8a6a3a;
      margin-top: 10px;
      text-align: center;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-primary {
      flex: 1;
      background: var(--amber);
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: #9A6010; }

    .btn-secondary {
      flex: 1;
      background: var(--white);
      color: var(--text);
      border: 0.5px solid var(--border);
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .btn-secondary:hover { background: #f5f5f0; }

    /* ブログ記事リンク（記事がある店だけ表示） */
    .btn-blog {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      margin-top: 10px;
      background: #FFF8EE;
      color: var(--amber);
      border: 0.5px solid #F0D9C0;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }

    .btn-blog:hover { background: #FBEFDD; }
    .btn-blog .ti-external-link { font-size: 15px; opacity: 0.7; }

    /* セクション */
    .section {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    /* 基本情報 */
    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 0.5px solid var(--border);
      font-size: 14px;
    }

    .info-row:last-child { border-bottom: none; }

    .info-icon {
      color: var(--amber);
      font-size: 17px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .info-label { color: var(--text-sub); min-width: 70px; flex-shrink: 0; }
    .info-value { color: var(--text); font-weight: 500; }

    .map-link {
      color: var(--amber);
      text-decoration: none;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
    }

    .map-link:hover { text-decoration: underline; }

    /* 投稿一覧 */
    .posts-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .post-card {
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 10px;
    }

    .post-card:last-child { margin-bottom: 0; }

    .post-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .post-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      font-weight: 600;
      color: #fff;
    }

    .post-user-name { font-size: 14px; font-weight: 600; }

    /* 投稿者のXリンク（黒背景のXマークだけがリンク） */
    .post-x-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      background: #000;
      color: #fff;
      border-radius: 5px;
      margin-left: 6px;
      font-size: 10px;
      vertical-align: middle;
      text-decoration: none;
    }
    .post-x-badge:hover { opacity: 0.85; }
    .post-date { font-size: 12px; color: #aaa; margin-top: 1px; }

    .post-stars {
      display: flex;
      gap: 2px;
      margin-left: auto;
    }

    .post-star { font-size: 13px; color: var(--amber); }
    .post-star.empty { color: #e0d8cc; }

    .post-menu {
      display: inline-block;
      background: var(--amber-light);
      color: var(--amber);
      font-size: 12px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 99px;
      margin-bottom: 6px;
    }

    .post-photo {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 8px;
      background: #f0ede8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: #ccc;
    }

    .post-comment { font-size: 14px; color: var(--text); line-height: 1.6; }

    .post-likes {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 10px;
      font-size: 13px;
      color: #aaa;
      cursor: pointer;
    }

    .post-likes:hover { color: #e05a77; }
    .post-likes.liked { color: #e05a77; }

    /* 「もっと見る」ボタン */
    .btn-more {
      width: 100%;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      color: var(--text-sub);
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.15s;
    }

    .btn-more:hover { background: #f0ede8; }

    /* トースト */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      color: #fff;
      padding: 12px 20px;
      border-radius: 99px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .rating-bars { display: none; }
    }
  </style>

  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">

  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#BA7517">
  <script src="api.js"></script>
  <meta name="description" content="お店の情報とみんなの投稿。あなたの訪問記録・常連カードも。">

  <meta property="og:site_name" content="うどログ">
  <meta property="og:title" content="店舗詳細｜うどログ">
  <meta property="og:description" content="お店の情報とみんなの投稿。あなたの訪問記録・常連カードも。">

</head>
<body>

  <!-- ヘッダー -->
  <div class="page-header">
    <a href="shops.html" class="back-btn">
      <i class="ti ti-arrow-left"></i>
    </a>
    <div class="header-title" id="headerTitle">店舗詳細</div>
  </div>

  <div class="container">

    <!-- ショップヒーロー -->
    <div class="shop-hero">
      <div class="shop-hero-top">
        <div class="shop-hero-icon"><i class="ti ti-bowl-chopsticks"></i></div>
        <div>
          <div class="shop-hero-name" id="shopName">—</div>
          <div class="shop-hero-meta">
            <span class="shop-hero-city">
              <i class="ti ti-map-pin" style="font-size:13px"></i>
              <span id="shopCity">—</span>
            </span>
            <span class="type-badge" id="shopTypeBadge">—</span>
          </div>
        </div>
      </div>

      <!-- 閉店バナー（status="閉店"の店のみ表示） -->
      <div id="closedBanner" style="display:none; margin-top:12px; background:#f3f1ee; border:0.5px solid #ddd9d2; border-radius:10px; padding:10px 14px; font-size:13px; color:#888;">
        <i class="ti ti-circle-x"></i> このお店は閉店しました。記録はできませんが、これまでの記録は残ります。
      </div>

      <!-- 評価サマリー -->
      <div class="rating-summary">
        <div>
          <div class="rating-score" id="avgScore">4.2</div>
          <div class="rating-stars" id="avgStars"></div>
          <div class="rating-count" id="reviewCount">38人のおすすめ度</div>
        </div>
        <div class="rating-bars" id="ratingBars"></div>
      </div>

      <!-- あなたのおすすめ度（記録した人だけ設定可・いつでも変更可） -->
      <div class="my-rating" id="myRating">
        <div class="my-rating-label">あなたのおすすめ度</div>
        <div class="my-stars" id="myStars">
          <button class="my-star" type="button" data-val="1" onclick="setMyRating(1)">★</button>
          <button class="my-star" type="button" data-val="2" onclick="setMyRating(2)">★</button>
          <button class="my-star" type="button" data-val="3" onclick="setMyRating(3)">★</button>
          <button class="my-star" type="button" data-val="4" onclick="setMyRating(4)">★</button>
          <button class="my-star" type="button" data-val="5" onclick="setMyRating(5)">★</button>
        </div>
        <div class="my-rating-text" id="myRatingText">タップして評価</div>
      </div>

      <!-- あなたの訪問回数（この店をこれまで何回記録したか） -->
      <div class="my-visit" id="myVisit" style="display:none;">
        <span class="my-visit-icon"><i class="ti ti-bowl-chopsticks"></i></span>
        <span class="my-visit-label">あなたの訪問</span>
        <span class="my-visit-num" id="myVisitNum">0<small>杯</small></span>
        <span class="my-visit-sub" id="myVisitSub"></span>
      </div>

      <!-- この店の常連カード（10杯でコンプリート＝常連認定） -->
      <div class="loyalty-card" id="loyaltyCard" style="display:none;">
        <div class="loyalty-head">
          <span id="loyaltyTitle">常連カード</span>
          <span class="loyalty-tag" id="loyaltyTag" style="display:none;">🏅 常連認定</span>
        </div>
        <div class="loyalty-slots" id="loyaltySlots"></div>
        <div class="loyalty-note" id="loyaltyNote"></div>
      </div>

      <!-- アクションボタン -->
      <div class="action-buttons">
        <a id="recordBtn" href="#" class="btn-primary">
          <i class="ti ti-plus"></i> お店を記録する
        </a>
        <a id="mapBtn" href="#" target="_blank" rel="noopener" class="btn-secondary">
          <i class="ti ti-map"></i> 地図を見る
        </a>
      </div>

      <!-- ブログ記事リンク（shop.blog がある店だけ表示） -->
      <a id="blogBtn" href="#" target="_blank" rel="noopener" class="btn-blog" style="display:none;">
        <i class="ti ti-notebook"></i> ブログで詳しく読む
        <i class="ti ti-external-link"></i>
      </a>
    </div>

    <!-- 基本情報 -->
    <div class="section">
      <div class="section-title">基本情報</div>
      <div class="info-row">
        <i class="ti ti-bowl-chopsticks info-icon"></i>
        <span class="info-label">スタイル</span>
        <span class="info-value" id="infoType">—</span>
      </div>
      <div class="info-row">
        <i class="ti ti-star info-icon"></i>
        <span class="info-label">代表メニュー</span>
        <span class="info-value" id="infoDish">—</span>
      </div>
      <div class="info-row">
        <i class="ti ti-map-pin info-icon"></i>
        <span class="info-label">エリア</span>
        <span class="info-value" id="infoCity">—</span>
      </div>
      <div class="info-row">
        <i class="ti ti-clock info-icon"></i>
        <span class="info-label">営業時間</span>
        <span class="info-value" id="infoHours">—</span>
      </div>
      <div class="info-row">
        <i class="ti ti-calendar-off info-icon"></i>
        <span class="info-label">定休日</span>
        <span class="info-value" id="infoClosed">—</span>
      </div>
      <div class="info-row">
        <i class="ti ti-parking info-icon"></i>
        <span class="info-label">駐車場</span>
        <span class="info-value" id="infoParking">—</span>
      </div>
    </div>

    <!-- 投稿一覧 -->
    <div class="section">
      <div class="posts-header">
        <div class="section-title" style="margin-bottom:0">みんなの投稿</div>
        <span style="font-size:13px;color:#aaa;" id="postsCount"></span>
      </div>
      <div id="postsList"></div>
      <button class="btn-more" onclick="alert('会員登録後にすべての投稿を見ることができます。')">
        もっと見る <i class="ti ti-chevron-down"></i>
      </button>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="shops-data.js"></script>
  <script>

    // 投稿日の表示用フォーマット（2026-06-14 → 2026年6月14日）
    // この店の常連カードを描画（visits=この店の記録杯数）
    // 10杯で1枚コンプリート＝常連認定。10杯を超えたら次のカードへ進む。
    const LOYALTY_SIZE = 10;
    function renderLoyaltyCard(visits, shopName) {
      const card = document.getElementById('loyaltyCard');
      card.style.display = 'block';

      const cardNo = Math.ceil(visits / LOYALTY_SIZE);          // 何枚目のカードか
      const fill = visits - (cardNo - 1) * LOYALTY_SIZE;        // 今のカードの押印数(1〜10)
      const isRegular = visits >= LOYALTY_SIZE;                 // 10杯以上で常連

      // スタンプのマスを生成
      let slots = '';
      for (let i = 0; i < LOYALTY_SIZE; i++) {
        const cupNo = (cardNo - 1) * LOYALTY_SIZE + i + 1;      // 通算の杯数
        if (i < fill) {
          slots += `<div class="loy-slot filled" title="${cupNo}杯目"><i class="ti ti-bowl-chopsticks"></i></div>`;
        } else {
          slots += `<div class="loy-slot empty">${i + 1}</div>`;
        }
      }
      document.getElementById('loyaltySlots').innerHTML = slots;

      // タイトル・常連タグ
      document.getElementById('loyaltyTitle').textContent =
        isRegular ? `🏅 ${shopName}の常連！` : `${shopName}の常連カード`;
      document.getElementById('loyaltyTag').style.display = isRegular ? '' : 'none';

      // 案内文
      const note = document.getElementById('loyaltyNote');
      if (!isRegular) {
        note.textContent = `常連まで あと${LOYALTY_SIZE - visits}杯`;
      } else if (fill === LOYALTY_SIZE) {
        note.textContent = `常連カード${cardNo}枚コンプリート！（通算${visits}杯）`;
      } else {
        note.textContent = `常連カード${cardNo}枚目を集め中（通算${visits}杯）`;
      }
    }

    // 定休日の表示整形（「月曜」→「月曜日」。空欄は案内文）
    function formatClosed(c) {
      if (!c || !c.trim()) return '店舗にご確認ください';
      return c.replace(/曜(?!日)/g, '曜日');   // 「曜」の後に「日」が無ければ補う
    }

    function formatPostDate(d) {
      if (!d) return '';
      const dt = new Date(d);
      if (isNaN(dt)) return '';
      return `${dt.getFullYear()}年${dt.getMonth() + 1}月${dt.getDate()}日`;
    }

    // 投稿コメントのHTMLエスケープ（表示崩れ・タグ混入を防ぐ）
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => (
        { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]
      ));
    }

    // ダミー評価分布
    const RATING_DIST = { 5: 22, 4: 10, 3: 4, 2: 1, 1: 1 };

    // URLパラメータからお店を取得
    const params = new URLSearchParams(location.search);
    const shopId = parseInt(params.get('id'));
    const shop = SHOPS.find(s => s.id === shopId);

    if (!shop) {
      document.body.innerHTML = '<div style="padding:2rem;text-align:center;"><p>店舗が見つかりませんでした。</p><a href="shops.html">店舗一覧へ戻る</a></div>';
    } else {
      // 基本情報を表示
      document.title = `${shop.name} — うどログ`;
      document.getElementById('headerTitle').textContent = shop.name;
      document.getElementById('shopName').textContent = shop.name;
      document.getElementById('shopCity').textContent = shop.city;
      document.getElementById('infoType').textContent = shop.type + '式';
      document.getElementById('infoDish').textContent = shop.dish;
      document.getElementById('infoCity').textContent = shop.city;
      // 営業時間・定休日は店ごとのデータ（未設定なら案内文を表示）
      document.getElementById('infoHours').textContent = shop.hours || '店舗にご確認ください';
      document.getElementById('infoClosed').textContent = formatClosed(shop.closed);
      document.getElementById('infoParking').textContent = shop.parking || '不明';

      // タイプバッジ
      const badge = document.getElementById('shopTypeBadge');
      badge.textContent = shop.type;
      if (shop.type === 'セルフ') badge.className = 'type-badge type-self';
      else if (shop.type === '一般') badge.className = 'type-badge type-ippan';
      else badge.className = 'type-badge type-men';

      // 閉店している店は、バナーを出して記録ボタンを無効化する
      const recordBtn = document.getElementById('recordBtn');
      if (shop.status === '閉店') {
        document.getElementById('closedBanner').style.display = 'block';
        recordBtn.removeAttribute('href');
        recordBtn.classList.add('btn-disabled');
        recordBtn.style.pointerEvents = 'none';
        recordBtn.style.opacity = '0.5';
        recordBtn.innerHTML = '<i class="ti ti-circle-x"></i> 閉店しました';
      } else {
        recordBtn.href =
          `record.html?id=${shop.id}&name=${encodeURIComponent(shop.name)}&city=${encodeURIComponent(shop.city)}&type=${encodeURIComponent(shop.type)}`;
      }
      document.getElementById('mapBtn').href =
        `https://www.google.com/maps/search/${encodeURIComponent(shop.name + ' ' + shop.city)}`;

      // ブログ記事リンク（shop.blog が登録されている店だけボタンを表示）
      if (shop.blog) {
        const blogBtn = document.getElementById('blogBtn');
        blogBtn.href = shop.blog;
        blogBtn.style.display = 'flex';
      }

      // 評価サマリー
      const total = Object.values(RATING_DIST).reduce((a, b) => a + b, 0);
      const avg = (Object.entries(RATING_DIST).reduce((a, [k, v]) => a + Number(k) * v, 0) / total).toFixed(1);
      document.getElementById('avgScore').textContent = avg;
      document.getElementById('reviewCount').textContent = `${total}人のおすすめ度`;

      // 星
      const starsEl = document.getElementById('avgStars');
      for (let i = 1; i <= 5; i++) {
        const s = document.createElement('span');
        s.className = 'star' + (i <= Math.round(avg) ? '' : ' empty');
        s.textContent = '★';
        starsEl.appendChild(s);
      }

      // 評価バー
      const barsEl = document.getElementById('ratingBars');
      [5,4,3,2,1].forEach(n => {
        const pct = Math.round((RATING_DIST[n] / total) * 100);
        barsEl.innerHTML += `
          <div class="bar-row">
            <span>${n}★</span>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            <span>${pct}%</span>
          </div>`;
      });

      // みんなの投稿・あなたの訪問回数・おすすめ度をサーバーから取得して表示
      loadShopActivity();
    }

    // この店のアクティビティ（全会員の公開投稿＋自分の訪問数・評価）をサーバーから取得
    let myActivity = null;   // ログイン中かつ自分の集計（{count,lastVisit,rating}）/ 未ログインはnull
    async function loadShopActivity() {
      let data;
      try { await API.refresh(); } catch (e) {}
      try {
        data = await API.get('shop_logs.php?shop_id=' + shopId);
      } catch (e) {
        data = { posts: [], my: null };
      }
      myActivity = data.my || null;
      renderPosts(data.posts || []);
      renderMyVisit(myActivity);
      renderRatingUI(myActivity);
    }

    // みんなの投稿（ニックネーム＋Xリンクで交流）
    function renderPosts(posts) {
      document.getElementById('postsCount').textContent = posts.length ? `${posts.length}件` : '';
      const postsEl = document.getElementById('postsList');
      const moreBtn = document.querySelector('.btn-more');
      if (moreBtn) moreBtn.style.display = 'none';

      if (posts.length === 0) {
        postsEl.innerHTML =
          '<div style="text-align:center;color:#aaa;font-size:14px;padding:1.5rem 0;">' +
          'まだ投稿がありません。<br>' +
          '<a href="record.html?id=' + shop.id +
            '&name=' + encodeURIComponent(shop.name) +
            '&city=' + encodeURIComponent(shop.city) +
            '&type=' + encodeURIComponent(shop.type) +
          '" style="color:#BA7517;text-decoration:none;font-weight:600;">最初の記録を投稿する</a></div>';
        return;
      }
      postsEl.innerHTML = posts.map(p => {
        const menu = (p.menus && p.menus.length) ? p.menus.join('・') : '';
        const dateStr = formatPostDate(p.visitDate || p.savedAt);
        const nick = p.nickname || 'うどん好きさん';
        const initial = escapeHtml((nick.charAt(0) || 'う'));
        const xBadge = p.xHandle
          ? `<a class="post-x-badge" href="https://x.com/${encodeURIComponent(p.xHandle)}" target="_blank" rel="noopener" title="Xを見る"><i class="ti ti-brand-x"></i></a>`
          : '';
        const nameHtml = `<div class="post-user-name">${escapeHtml(nick)}${xBadge}</div>`;
        return `
          <div class="post-card">
            <div class="post-header">
              <div class="post-avatar" style="background:#BA7517">${initial}</div>
              <div>
                ${nameHtml}
                <div class="post-date">${dateStr}</div>
              </div>
            </div>
            ${menu ? `<span class="post-menu">${escapeHtml(menu)}</span>` : ''}
            ${p.comment ? `<div class="post-comment">${escapeHtml(p.comment)}</div>` : ''}
          </div>`;
      }).join('');
    }

    // あなたの訪問回数＋常連カード
    function renderMyVisit(my) {
      const myVisit = document.getElementById('myVisit');
      const count = my ? my.count : 0;
      if (count > 0) {
        myVisit.classList.remove('my-visit-empty');
        myVisit.style.display = 'flex';
        document.getElementById('myVisitNum').style.display = '';
        document.getElementById('myVisitNum').innerHTML = `${count}<small>杯</small>`;
        document.querySelector('#myVisit .my-visit-label').textContent = 'あなたの訪問';
        const last = formatPostDate(my.lastVisit);
        document.getElementById('myVisitSub').textContent = last ? `最後の訪問：${last}` : '';
        renderLoyaltyCard(count, shop.name);
      } else {
        myVisit.classList.add('my-visit-empty');
        myVisit.style.display = 'flex';
        document.getElementById('myVisitNum').style.display = 'none';
        document.querySelector('#myVisit .my-visit-label').textContent =
          'あなたはまだこの店を記録していません';
        document.getElementById('myVisitSub').textContent = '';
        document.getElementById('loyaltyCard').style.display = 'none';
      }
    }

    function toggleLike(el) {
      el.classList.toggle('liked');
      const icon = el.querySelector('i');
      const isLiked = el.classList.contains('liked');
      icon.className = isLiked ? 'ti ti-heart-filled' : 'ti ti-heart';
      const count = parseInt(el.textContent.trim());
      el.innerHTML = `<i class="ti ti-heart${isLiked ? '-filled' : ''}"></i> ${isLiked ? count + 1 : count - 1}`;
      el.classList.toggle('liked', isLiked);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // === あなたのおすすめ度（店ごとに保存） ===
    // ※ B（会員DB）版では shopRatings の読み書きをサーバー保存に差し替える
    const MY_RATING_LABELS = ['', 'いまいち', 'まあまあ', 'おすすめ', 'かなりおすすめ', '超おすすめ！'];

    function paintMyStars(val) {
      document.querySelectorAll('.my-star').forEach((b, i) => {
        b.classList.toggle('active', i < val);
      });
      document.getElementById('myRatingText').textContent =
        val > 0 ? MY_RATING_LABELS[val] : 'タップして評価';
    }

    // 評価UIの初期化（サーバーから取得した自分の集計に基づく）
    function renderRatingUI(my) {
      paintMyStars(my && my.rating ? my.rating : 0);
      const can = !!(my && my.count > 0);   // 1回以上記録した人だけ評価可
      document.getElementById('myRating').classList.toggle('locked', !can);
      if (!can) {
        document.getElementById('myRatingText').textContent =
          (my ? '記録すると評価できます' : 'ログインして記録すると評価できます');
      }
    }

    // おすすめ度を保存（サーバー）。記録がない人は不可。
    async function setMyRating(val) {
      if (!myActivity || myActivity.count <= 0) {
        showToast('記録するとおすすめ度を付けられます');
        return;
      }
      try {
        await API.refresh();
        await API.post('rating_set.php', { shop_id: shopId, score: val });
        myActivity.rating = val;
        paintMyStars(val);
        showToast('おすすめ度を保存しました');
      } catch (e) {
        showToast(e.message || '保存に失敗しました');
      }
    }
  </script>

  <script src="header.js"></script>
</body>
</html>
