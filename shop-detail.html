<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店舗詳細 — うどんログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #BA7517;
      --amber-light: #FFF8EE;
      --amber-border: #F0D9C0;
      --bg: #FAFAF8;
      --white: #fff;
      --border: #e5e5e0;
      --text: #1a1a1a;
      --text-sub: #666;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 16px;
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    /* ヘッダー */
    .page-header {
      position: sticky;
      top: 54px;
      background: rgba(250,250,248,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1.25rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--white);
      border: 0.5px solid var(--border);
      color: #444;
      text-decoration: none;
      font-size: 18px;
      flex-shrink: 0;
    }

    .back-btn:hover { background: #f5f5f0; }

    .header-title {
      font-size: 16px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem;
    }

    /* ショップヒーロー */
    .shop-hero {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem 1.5rem;
      margin-bottom: 1rem;
    }

    .shop-hero-top {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 1.25rem;
    }

    .shop-hero-icon {
      width: 60px;
      height: 60px;
      background: var(--amber);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .shop-hero-icon img { width: 78%; height: 78%; object-fit: contain; }
    .post-photo img { width: 100%; height: 100%; object-fit: contain; }

    .shop-hero-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .shop-hero-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .shop-hero-city {
      font-size: 14px;
      color: var(--text-sub);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .type-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
    }

    .type-self  { background: #EEF4FF; color: #3B6FD4; }
    .type-ippan { background: #F0FFF4; color: #2E8B57; }
    .type-men   { background: #FFF5E0; color: #BA7517; }

    /* 評価サマリー */
    .rating-summary {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--amber-light);
      border: 0.5px solid var(--amber-border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 1.25rem;
    }

    .rating-score {
      font-size: 36px;
      font-weight: 700;
      color: var(--amber);
      line-height: 1;
    }

    .rating-stars {
      display: flex;
      gap: 2px;
      margin-bottom: 4px;
    }

    .star { color: var(--amber); font-size: 16px; }
    .star.empty { color: #e0d8cc; }

    .rating-count { font-size: 13px; color: var(--text-sub); }

    .rating-bars {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-sub);
    }

    .bar-track {
      flex: 1;
      height: 6px;
      background: #e5e5e0;
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--amber);
      border-radius: 99px;
    }

    /* アクションボタン */
    .my-rating {
      background: #FFF8EE;
      border: 0.5px solid #F0D9C0;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .my-rating-label {
      font-size: 14px;
      font-weight: 600;
      color: #8a6a3a;
    }

    .my-stars { display: flex; gap: 4px; }

    .my-star {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 26px;
      color: #e0d8cc;
      padding: 0;
      line-height: 1;
      transition: color 0.1s, transform 0.1s;
    }

    .my-star.active { color: var(--amber); }
    .my-star:hover { transform: scale(1.15); }

    .my-rating-text {
      font-size: 13px;
      color: #999;
      margin-left: auto;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-primary {
      flex: 1;
      background: var(--amber);
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: #9A6010; }

    .btn-secondary {
      flex: 1;
      background: var(--white);
      color: var(--text);
      border: 0.5px solid var(--border);
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .btn-secondary:hover { background: #f5f5f0; }

    /* セクション */
    .section {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    /* 基本情報 */
    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 0.5px solid var(--border);
      font-size: 14px;
    }

    .info-row:last-child { border-bottom: none; }

    .info-icon {
      color: var(--amber);
      font-size: 17px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .info-label { color: var(--text-sub); min-width: 70px; flex-shrink: 0; }
    .info-value { color: var(--text); font-weight: 500; }

    .map-link {
      color: var(--amber);
      text-decoration: none;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
    }

    .map-link:hover { text-decoration: underline; }

    /* 投稿一覧 */
    .posts-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .post-card {
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 10px;
    }

    .post-card:last-child { margin-bottom: 0; }

    .post-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .post-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      font-weight: 600;
      color: #fff;
    }

    .post-user-name { font-size: 14px; font-weight: 600; }
    .post-date { font-size: 12px; color: #aaa; margin-top: 1px; }

    .post-stars {
      display: flex;
      gap: 2px;
      margin-left: auto;
    }

    .post-star { font-size: 13px; color: var(--amber); }
    .post-star.empty { color: #e0d8cc; }

    .post-menu {
      display: inline-block;
      background: var(--amber-light);
      color: var(--amber);
      font-size: 12px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 99px;
      margin-bottom: 6px;
    }

    .post-photo {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 8px;
      background: #f0ede8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: #ccc;
    }

    .post-comment { font-size: 14px; color: var(--text); line-height: 1.6; }

    .post-likes {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 10px;
      font-size: 13px;
      color: #aaa;
      cursor: pointer;
    }

    .post-likes:hover { color: #e05a77; }
    .post-likes.liked { color: #e05a77; }

    /* 「もっと見る」ボタン */
    .btn-more {
      width: 100%;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      color: var(--text-sub);
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.15s;
    }

    .btn-more:hover { background: #f0ede8; }

    /* トースト */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      color: #fff;
      padding: 12px 20px;
      border-radius: 99px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .rating-bars { display: none; }
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <div class="page-header">
    <a href="shops.html" class="back-btn">
      <i class="ti ti-arrow-left"></i>
    </a>
    <div class="header-title" id="headerTitle">店舗詳細</div>
  </div>

  <div class="container">

    <!-- ショップヒーロー -->
    <div class="shop-hero">
      <div class="shop-hero-top">
        <div class="shop-hero-icon"><img src="kakeudon.png" alt="うどん"></div>
        <div>
          <div class="shop-hero-name" id="shopName">—</div>
          <div class="shop-hero-meta">
            <span class="shop-hero-city">
              <i class="ti ti-map-pin" style="font-size:13px"></i>
              <span id="shopCity">—</span>
            </span>
            <span class="type-badge" id="shopTypeBadge">—</span>
          </div>
        </div>
      </div>

      <!-- 閉店バナー（status="閉店"の店のみ表示） -->
      <div id="closedBanner" style="display:none; margin-top:12px; background:#f3f1ee; border:0.5px solid #ddd9d2; border-radius:10px; padding:10px 14px; font-size:13px; color:#888;">
        <i class="ti ti-circle-x"></i> このお店は閉店しました。記録はできませんが、これまでの記録は残ります。
      </div>

      <!-- 評価サマリー -->
      <div class="rating-summary">
        <div>
          <div class="rating-score" id="avgScore">4.2</div>
          <div class="rating-stars" id="avgStars"></div>
          <div class="rating-count" id="reviewCount">38人のおすすめ度</div>
        </div>
        <div class="rating-bars" id="ratingBars"></div>
      </div>

      <!-- あなたのおすすめ度（お店ごとに1回・いつでも変更可） -->
      <div class="my-rating">
        <div class="my-rating-label">あなたのおすすめ度</div>
        <div class="my-stars" id="myStars">
          <button class="my-star" type="button" data-val="1" onclick="setMyRating(1)">★</button>
          <button class="my-star" type="button" data-val="2" onclick="setMyRating(2)">★</button>
          <button class="my-star" type="button" data-val="3" onclick="setMyRating(3)">★</button>
          <button class="my-star" type="button" data-val="4" onclick="setMyRating(4)">★</button>
          <button class="my-star" type="button" data-val="5" onclick="setMyRating(5)">★</button>
        </div>
        <div class="my-rating-text" id="myRatingText">タップして評価</div>
      </div>

      <!-- アクションボタン -->
      <div class="action-buttons">
        <a id="recordBtn" href="#" class="btn-primary">
          <i class="ti ti-plus"></i> 食べた！記録する
        </a>
        <a id="mapBtn" href="#" target="_blank" rel="noopener" class="btn-secondary">
          <i class="ti ti-map"></i> 地図を見る
        </a>
      </div>
    </div>

    <!-- 基本情報 -->
    <div class="section">
      <div class="section-title">基本情報</div>
      <div class="info-row">
        <i class="ti ti-bowl-chopsticks info-icon"></i>
        <span class="info-label">スタイル</span>
        <span class="info-value" id="infoType">—</span>
      </div>
      <div class="info-row">
        <i class="ti ti-star info-icon"></i>
        <span class="info-label">代表メニュー</span>
        <span class="info-value" id="infoDish">—</span>
      </div>
      <div class="info-row">
        <i class="ti ti-map-pin info-icon"></i>
        <span class="info-label">エリア</span>
        <span class="info-value" id="infoCity">—</span>
      </div>
      <div class="info-row">
        <i class="ti ti-clock info-icon"></i>
        <span class="info-label">営業時間</span>
        <span class="info-value" id="infoHours">—</span>
      </div>
      <div class="info-row">
        <i class="ti ti-calendar-off info-icon"></i>
        <span class="info-label">定休日</span>
        <span class="info-value" id="infoClosed">—</span>
      </div>
    </div>

    <!-- 投稿一覧 -->
    <div class="section">
      <div class="posts-header">
        <div class="section-title" style="margin-bottom:0">みんなの投稿</div>
        <span style="font-size:13px;color:#aaa;" id="postsCount"></span>
      </div>
      <div id="postsList"></div>
      <button class="btn-more" onclick="alert('会員登録後にすべての投稿を見ることができます。')">
        もっと見る <i class="ti ti-chevron-down"></i>
      </button>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="shops-data.js"></script>
  <script>

    // 投稿日の表示用フォーマット（2026-06-14 → 2026年6月14日）
    function formatPostDate(d) {
      if (!d) return '';
      const dt = new Date(d);
      if (isNaN(dt)) return '';
      return `${dt.getFullYear()}年${dt.getMonth() + 1}月${dt.getDate()}日`;
    }

    // 投稿コメントのHTMLエスケープ（表示崩れ・タグ混入を防ぐ）
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => (
        { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]
      ));
    }

    // ダミー評価分布
    const RATING_DIST = { 5: 22, 4: 10, 3: 4, 2: 1, 1: 1 };

    // URLパラメータからお店を取得
    const params = new URLSearchParams(location.search);
    const shopId = parseInt(params.get('id'));
    const shop = SHOPS.find(s => s.id === shopId);

    if (!shop) {
      document.body.innerHTML = '<div style="padding:2rem;text-align:center;"><p>店舗が見つかりませんでした。</p><a href="shops.html">店舗一覧へ戻る</a></div>';
    } else {
      // 基本情報を表示
      document.title = `${shop.name} — うどんログ`;
      document.getElementById('headerTitle').textContent = shop.name;
      document.getElementById('shopName').textContent = shop.name;
      document.getElementById('shopCity').textContent = shop.city;
      document.getElementById('infoType').textContent = shop.type + '式';
      document.getElementById('infoDish').textContent = shop.dish;
      document.getElementById('infoCity').textContent = shop.city;
      // 営業時間・定休日は店ごとのデータ（未設定なら案内文を表示）
      document.getElementById('infoHours').textContent = shop.hours || '店舗にご確認ください';
      document.getElementById('infoClosed').textContent = shop.closed || '店舗にご確認ください';

      // タイプバッジ
      const badge = document.getElementById('shopTypeBadge');
      badge.textContent = shop.type;
      if (shop.type === 'セルフ') badge.className = 'type-badge type-self';
      else if (shop.type === '一般') badge.className = 'type-badge type-ippan';
      else badge.className = 'type-badge type-men';

      // 閉店している店は、バナーを出して記録ボタンを無効化する
      const recordBtn = document.getElementById('recordBtn');
      if (shop.status === '閉店') {
        document.getElementById('closedBanner').style.display = 'block';
        recordBtn.removeAttribute('href');
        recordBtn.classList.add('btn-disabled');
        recordBtn.style.pointerEvents = 'none';
        recordBtn.style.opacity = '0.5';
        recordBtn.innerHTML = '<i class="ti ti-circle-x"></i> 閉店しました';
      } else {
        recordBtn.href =
          `record.html?id=${shop.id}&name=${encodeURIComponent(shop.name)}&city=${encodeURIComponent(shop.city)}&type=${encodeURIComponent(shop.type)}`;
      }
      document.getElementById('mapBtn').href =
        `https://www.google.com/maps/search/${encodeURIComponent(shop.name + ' ' + shop.city)}`;

      // 評価サマリー
      const total = Object.values(RATING_DIST).reduce((a, b) => a + b, 0);
      const avg = (Object.entries(RATING_DIST).reduce((a, [k, v]) => a + Number(k) * v, 0) / total).toFixed(1);
      document.getElementById('avgScore').textContent = avg;
      document.getElementById('reviewCount').textContent = `${total}人のおすすめ度`;

      // あなたのおすすめ度を復元
      restoreMyRating();

      // 星
      const starsEl = document.getElementById('avgStars');
      for (let i = 1; i <= 5; i++) {
        const s = document.createElement('span');
        s.className = 'star' + (i <= Math.round(avg) ? '' : ' empty');
        s.textContent = '★';
        starsEl.appendChild(s);
      }

      // 評価バー
      const barsEl = document.getElementById('ratingBars');
      [5,4,3,2,1].forEach(n => {
        const pct = Math.round((RATING_DIST[n] / total) * 100);
        barsEl.innerHTML += `
          <div class="bar-row">
            <span>${n}★</span>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            <span>${pct}%</span>
          </div>`;
      });

      // 投稿一覧（この店舗の記録を localStorage から取得）
      // ※ B（会員DB）版では、ここを「全会員の公開投稿を取得」に差し替える
      const allLogs = JSON.parse(localStorage.getItem('logs') || '[]');
      const posts = allLogs.filter(l => l.shopId === shopId).reverse(); // 新しい順

      document.getElementById('postsCount').textContent = posts.length ? `${posts.length}件` : '';
      const postsEl = document.getElementById('postsList');
      const moreBtn = document.querySelector('.btn-more');
      if (moreBtn) moreBtn.style.display = 'none';

      if (posts.length === 0) {
        postsEl.innerHTML =
          '<div style="text-align:center;color:#aaa;font-size:14px;padding:1.5rem 0;">' +
          'まだ投稿がありません。<br>' +
          '<a href="record.html?id=' + shop.id +
            '&name=' + encodeURIComponent(shop.name) +
            '&city=' + encodeURIComponent(shop.city) +
            '&type=' + encodeURIComponent(shop.type) +
          '" style="color:#BA7517;text-decoration:none;font-weight:600;">最初の記録を投稿する</a></div>';
      } else {
        postsEl.innerHTML = posts.map(p => {
          const menu = (p.menus && p.menus.length) ? p.menus.join('・') : (p.menu || '');
          const dateStr = formatPostDate(p.visitDate || p.savedAt);
          return `
            <div class="post-card">
              <div class="post-header">
                <div class="post-avatar" style="background:#BA7517">あ</div>
                <div>
                  <div class="post-user-name">あなた</div>
                  <div class="post-date">${dateStr}</div>
                </div>
              </div>
              ${menu ? `<span class="post-menu">${escapeHtml(menu)}</span>` : ''}
              ${p.comment ? `<div class="post-comment">${escapeHtml(p.comment)}</div>` : ''}
              ${p.photoCount ? `<div style="font-size:12px;color:#aaa;margin-top:8px;"><i class="ti ti-camera"></i> 写真${p.photoCount}枚</div>` : ''}
            </div>`;
        }).join('');
      }
    }

    function toggleLike(el) {
      el.classList.toggle('liked');
      const icon = el.querySelector('i');
      const isLiked = el.classList.contains('liked');
      icon.className = isLiked ? 'ti ti-heart-filled' : 'ti ti-heart';
      const count = parseInt(el.textContent.trim());
      el.innerHTML = `<i class="ti ti-heart${isLiked ? '-filled' : ''}"></i> ${isLiked ? count + 1 : count - 1}`;
      el.classList.toggle('liked', isLiked);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // === あなたのおすすめ度（店ごとに保存） ===
    // ※ B（会員DB）版では shopRatings の読み書きをサーバー保存に差し替える
    const MY_RATING_LABELS = ['', 'いまいち', 'まあまあ', 'おすすめ', 'かなりおすすめ', '超おすすめ！'];

    function paintMyStars(val) {
      document.querySelectorAll('.my-star').forEach((b, i) => {
        b.classList.toggle('active', i < val);
      });
      document.getElementById('myRatingText').textContent =
        val > 0 ? MY_RATING_LABELS[val] : 'タップして評価';
    }

    function setMyRating(val) {
      const ratings = JSON.parse(localStorage.getItem('shopRatings') || '{}');
      ratings[shopId] = val;
      localStorage.setItem('shopRatings', JSON.stringify(ratings));
      paintMyStars(val);
      showToast('おすすめ度を保存しました');
    }

    function restoreMyRating() {
      const ratings = JSON.parse(localStorage.getItem('shopRatings') || '{}');
      paintMyStars(ratings[shopId] || 0);
    }
  </script>

  <script src="header.js"></script>
</body>
</html>
