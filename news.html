<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お知らせ一覧 — うどログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #BA7517;
      --amber-dark: #8A5510;
      --amber-darker: #6F440C;
      --bg: #FAFAF8;
      --white: #fff;
      --border: #e5e5e0;
      --text: #1a1a1a;
      --text-sub: #555;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      font-size: 15px;
      padding-bottom: 4rem;
    }

    .page-header {
      position: sticky;
      top: 54px;
      background: rgba(250,250,248,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1.25rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--white);
      border: 0.5px solid var(--border);
      color: #444;
      text-decoration: none;
      font-size: 18px;
      flex-shrink: 0;
    }

    .back-btn:hover { background: #f5f5f0; }

    .header-title { font-size: 16px; font-weight: 600; }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.25rem;
    }

    .doc-title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    /* お知らせ1件 */
    .news-item {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem 1.25rem;
      margin-bottom: 12px;
    }

    .news-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .news-date { font-size: 12px; color: #999; }

    .news-tag {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 99px;
      white-space: nowrap;
    }

    /* カテゴリ別の色 */
    .news-tag.cat-新店  { background: #E9F7EC; color: #2E8B57; border: 0.5px solid #BFE6C9; }
    .news-tag.cat-閉店  { background: #F3F1EE; color: #888;    border: 0.5px solid #DDD9D2; }
    .news-tag.cat-機能  { background: #FFF1E0; color: #BA7517; border: 0.5px solid #F0D9C0; }
    .news-tag.cat-メンテ { background: #EAF2FB; color: #3A6EA5; border: 0.5px solid #C7DBF0; }
    .news-tag.cat-トピックス { background: #F3EEFB; color: #7A5BB0; border: 0.5px solid #DED0F0; }

    .news-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }

    .news-body {
      font-size: 14px;
      color: var(--text-sub);
      white-space: pre-wrap;
    }

    .news-empty {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      padding: 3rem 0;
    }

    .news-more-btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 11px;
      background: none;
      border: 0.5px solid #F0D9C0;
      border-radius: 10px;
      color: var(--amber-dark);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .news-more-btn:hover { background: #FFF1E0; }

    .footer-links {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 14px;
    }

    .footer-links a { color: var(--amber-dark); text-decoration: none; }
    .footer-links a:hover { text-decoration: underline; }
  </style>
  <!-- ファビコン -->
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#BA7517">
  <script src="api.js"></script>
  <meta name="description" content="うどログからのお知らせ・新店情報・機能追加。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="うどログ">
  <meta property="og:title" content="お知らせ｜うどログ">
  <meta property="og:description" content="うどログからのお知らせ・新店情報・機能追加。">
  <meta property="og:url" content="https://udolog.com/news.html">
  <meta property="og:image" content="https://udolog.com/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@kagawan13">
  <meta name="twitter:title" content="お知らせ｜うどログ">
  <meta name="twitter:description" content="うどログからのお知らせ・新店情報・機能追加。">
  <meta name="twitter:image" content="https://udolog.com/og-image.png">
  <script src="header.js"></script>
  <script src="analytics.js"></script>
</head>
<body>

  <div class="page-header">
    <a href="/" class="back-btn"><i class="ti ti-arrow-left"></i></a>
    <div class="header-title">お知らせ一覧</div>
  </div>

  <div class="container">
    <h1 class="doc-title">お知らせ一覧</h1>
    <div id="newsList"></div>

    <div class="footer-links">
      <a href="/">トップへ戻る</a>
    </div>
  </div>

  <script src="news.js"></script>
  <script>
    // カテゴリごとのアイコン
    const CAT_ICON = { '新店': '', '閉店': '', '機能': '', 'メンテ': '', 'トピックス': '' };

    function formatNewsDate(d) {
      const dt = new Date(d);
      if (isNaN(dt)) return d;
      return `${dt.getFullYear()}年${dt.getMonth() + 1}月${dt.getDate()}日`;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => (
        { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]
      ));
    }

    const list = document.getElementById('newsList');
    if (!NEWS || NEWS.length === 0) {
      list.innerHTML = '<div class="news-empty">お知らせはまだありません。</div>';
    } else {
      // 10件ずつ表示（「もっと見る」で追加）
      const NEWS_STEP = 10;
      let shownNews = 0;

      function newsItemHtml(n) {
        return `
          <div class="news-item">
            <div class="news-meta">
              <span class="news-tag cat-${n.category}">${n.category}</span>
              <span class="news-date">${formatNewsDate(n.date)}</span>
            </div>
            <div class="news-title">${escapeHtml(n.title)}</div>
            ${n.body ? `<div class="news-body">${escapeHtml(n.body)}</div>` : ''}
          </div>`;
      }

      function appendMoreNews() {
        const next = NEWS.slice(shownNews, shownNews + NEWS_STEP);
        list.insertAdjacentHTML('beforeend', next.map(newsItemHtml).join(''));
        shownNews += next.length;

        let btn = document.getElementById('newsMore');
        const remaining = NEWS.length - shownNews;
        if (remaining <= 0) {
          if (btn) btn.remove();
          return;
        }
        if (!btn) {
          btn = document.createElement('button');
          btn.id = 'newsMore';
          btn.type = 'button';
          btn.className = 'news-more-btn';
          btn.addEventListener('click', appendMoreNews);
          list.after(btn);
        }
        btn.textContent = `もっと見る（残り${remaining}件）`;
      }

      appendMoreNews();
    }
  </script>

</body>
</html>
